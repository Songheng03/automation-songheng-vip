<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#7B68EE"/>
    </linearGradient>
  </defs>
  <!-- Robot head -->
  <rect x="36" y="24" width="56" height="48" rx="8" ry="8" fill="url(#g)"/>
  <!-- Eyes -->
  <circle cx="48" cy="42" r="6" fill="#fff"/>
  <circle cx="80" cy="42" r="6" fill="#fff"/>
  <!-- Mouth -->
  <rect x="52" y="54" width="24" height="4" rx="2" fill="#fff"/>
  <!-- Antenna -->
  <line x1="64" y1="24" x2="64" y2="10" stroke="#4A90D9" stroke-width="3" stroke-linecap="round"/>
  <circle cx="64" cy="8" r="4" fill="#7B68EE"/>
  <!-- Body / gear suggestion -->
  <rect x="44" y="76" width="40" height="28" rx="6" fill="#5A5FE0"/>
  <!-- Gear teeth left -->
  <rect x="34" y="82" width="12" height="6" rx="2" fill="#7B68EE"/>
  <rect x="34" y="92" width="12" height="6" rx="2" fill="#7B68EE"/>
  <!-- Gear teeth right -->
  <rect x="82" y="82" width="12" height="6" rx="2" fill="#7B68EE"/>
  <rect x="82" y="92" width="12" height="6" rx="2" fill="#7B68EE"/>
  <!-- Arms -->
  <rect x="30" y="78" width="8" height="24" rx="4" fill="#4A90D9"/>
  <rect x="90" y="78" width="8" height="24" rx="4" fill="#4A90D9"/>
</svg>
