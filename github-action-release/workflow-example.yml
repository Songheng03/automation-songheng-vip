name: AI Code Review
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    name: AI-Powered Code Review
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run AI Code Review
        uses: automation-songheng/ai-code-review-action@v1
        id: review
        with:
          api-key: ${{ secrets.AI_REVIEW_KEY }}
          review-level: standard
          max-files: 10
      
      - name: Summary
        run: |
          echo "Reviewed ${{ steps.review.outputs.files-reviewed }} files"
          echo "Found ${{ steps.review.outputs.issues-found }} issues"
          echo "${{ steps.review.outputs.review-summary }}"
