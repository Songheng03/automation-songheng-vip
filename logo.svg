<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#grad)" opacity="0.15"/>
  <!-- Brain/network icon -->
  <circle cx="100" cy="75" r="20" fill="none" stroke="url(#grad)" stroke-width="3"/>
  <circle cx="75" cy="120" r="16" fill="none" stroke="url(#grad)" stroke-width="3"/>
  <circle cx="125" cy="120" r="16" fill="none" stroke="url(#grad)" stroke-width="3"/>
  <!-- Connection lines (neural network) -->
  <line x1="100" y1="95" x2="75" y2="104" stroke="url(#grad)" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="95" x2="125" y2="104" stroke="url(#grad)" stroke-width="2" opacity="0.6"/>
  <line x1="75" y1="120" x2="125" y2="120" stroke="url(#grad)" stroke-width="2" opacity="0.4"/>
  <!-- Abstract data/graph bars -->
  <rect x="155" y="135" width="8" height="25" rx="3" fill="url(#grad)" opacity="0.7"/>
  <rect x="145" y="125" width="8" height="35" rx="3" fill="url(#grad)" opacity="0.5"/>
  <rect x="135" y="130" width="8" height="30" rx="3" fill="url(#grad)" opacity="0.3"/>
  <!-- Dollar/micropayment indicator -->
  <text x="100" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="url(#grad)" opacity="0.8">x402</text>
  <!-- Agent/robot indicator dots -->
  <circle cx="100" cy="70" r="3" fill="url(#grad)"/>
  <circle cx="110" cy="67" r="2" fill="url(#grad)" opacity="0.6"/>
  <circle cx="90" cy="67" r="2" fill="url(#grad)" opacity="0.6"/>
</svg>
