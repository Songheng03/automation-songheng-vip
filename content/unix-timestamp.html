<header><h1>⏰ Unix Timestamp Converter</h1><nav><a href="/">Home</a><a href="/dev-tools.html">Tools</a><a href="/api-playground.html">API</a></nav></header>
<main>
<div class="live-box">
  <div class="label">Current Unix Timestamp</div>
  <div class="now" id="liveSec">0</div>
  <div class="now-sec" id="liveMs">0</div>
  <div class="now-sec" id="liveDate">—</div>
</div>
<div class="converter">
  <h3>🔄 Convert Timestamp ↔ Date</h3>
  <div class="input-row">
    <input type="text" id="tsInput" placeholder="Enter Unix timestamp or date... (e.g., 1718764800 or 2026-06-19)">
    <button onclick="convert()">Convert</button>
  </div>
  <div class="result-grid" id="results"></div>
</div>

<footer><p>my-automaton · Free Unix Timestamp Converter · <a href="/dev-tools.html">All Tools</a> · <a href="/api-docs.html">API Docs</a></p></footer>
<script>
function updateLive(){
  const now=Date.now();
  const sec=Math.floor(now/1000);
  document.getElementById('liveSec').textContent=sec.toLocaleString();
  document.getElementById('liveMs').textContent=now.toLocaleString()+' ms';
  document.getElementById('liveDate').textContent=new Date().toUTCString();
}
updateLive();
setInterval(updateLive,1000);

function convert(){
  const input=document.getElementById('tsInput').value.trim();
  if(!input)return;

  let timestamp;
  // Try as number (timestamp)
  if(/^\d+$/.test(input)){
    timestamp=parseInt(input);
    if(timestamp<1e12)timestamp*=1000; // seconds to ms
  }else{
    // Try as date
    const d=new Date(input);
    if(isNaN(d.getTime())){
      document.getElementById('results').innerHTML='<div class="result-item"><span class="val">Invalid date or timestamp</span></div>';
      return;
    }
    timestamp=d.getTime();
  }

  const date=new Date(timestamp);
  document.getElementById('results').innerHTML=`
    <div class="result-item"><span class="key">Unix (seconds)</span><span class="val">${Math.floor(timestamp/1000).toLocaleString()}</span></div>
    <div class="result-item"><span class="key">Unix (milliseconds)</span><span class="val">${timestamp.toLocaleString()}</span></div>
    <div class="result-item"><span class="key">UTC</span><span class="val date">${date.toUTCString()}</span></div>
    <div class="result-item"><span class="key">Local</span><span class="val date">${date.toString()}</span></div>
    <div class="result-item"><span class="key">ISO 8601</span><span class="val">${date.toISOString()}</span></div>
    <div class="result-item"><span class="key">Day of Week</span><span class="val date">${date.toLocaleDateString('en-US',{weekday:'long'})}</span></div>
  `;
}

document.getElementById('tsInput').value=Math.floor(Date.now()/1000);
convert();
</script>
