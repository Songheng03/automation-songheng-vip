<style>
:root{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--accent:#38bdf8;--green:#4ade80;--border:#334155}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--card);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap}
header h1{font-size:1.25rem;color:var(--accent)}
nav a{color:var(--muted);text-decoration:none;margin-left:1rem;font-size:.875rem}
main{max-width:650px;margin:2rem auto;padding:0 1.5rem}
.picker-row{display:flex;gap:1rem;flex-wrap:wrap;align-items:flex-start;margin-bottom:1.5rem}
.color-preview{width:120px;height:120px;border-radius:12px;border:2px solid var(--border);transition:background .1s;flex-shrink:0}
@media(max-width:400px){.color-preview{width:80px;height:80px}}
.color-inputs{flex:1;display:grid;gap:.5rem}
.input-row{display:flex;align-items:center;gap:.5rem}
.input-row label{font-size:.65rem;color:var(--muted);width:36px;font-family:"Fira Code",monospace}
.input-row input{flex:1;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:.4rem .6rem;font-family:"Fira Code",monospace;font-size:.75rem}
.input-row input:focus{outline:none;border-color:var(--accent)}
.input-row .copy-btn{padding:.3rem .7rem;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;font-size:.6rem}
.input-row .copy-btn:hover{border-color:var(--accent)}
.color-picker-wrap{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem}
.color-picker-wrap input[type="color"]{width:36px;height:36px;border:none;cursor:pointer;background:none;padding:0}
.color-picker-wrap input[type="color"]::-webkit-color-swatch-wrapper{padding:0}
.color-picker-wrap input[type="color"]::-webkit-color-swatch{border:2px solid var(--border);border-radius:6px}
.harmony h3{font-size:.8rem;color:var(--accent);margin-bottom:.75rem}

.harmony-swatch .swatch-label{font-size:.55rem;color:var(--muted);font-family:"Fira Code",monospace}
footer{text-align:center;padding:2rem;color:var(--muted);font-size:.8rem;border-top:1px solid var(--border);margin-top:2rem}footer a{color:var(--accent)}

<body>
<header><h1>🎯 Color Picker</h1><nav><a href="/">Home</a><a href="/dev-tools.html">Tools</a><a href="/api-playground.html">API</a></nav></header>
<main>
<div class="color-picker-wrap">
  <input type="color" id="nativePicker" value="#667eea" oninput="fromNative()">
  <span style="font-size:.7rem;color:var(--muted)">Click to open native picker, or type values below</span>
</div>
<div class="picker-row">
  <div class="color-preview" id="preview"></div>
  <div class="color-inputs">
    <div class="input-row"><label>HEX</label><input id="hexInput" value="#667eea" oninput="fromHex()"><button class="copy-btn" onclick="copyVal('hexInput')">Copy</button></div>
    <div class="input-row"><label>RGB</label><input id="rgbInput" value="rgb(102, 126, 234)" oninput="fromRGB()"><button class="copy-btn" onclick="copyVal('rgbInput')">Copy</button></div>
    <div class="input-row"><label>HSL</label><input id="hslInput" value="hsl(229, 76%, 66%)"><button class="copy-btn" onclick="copyVal('hslInput')">Copy</button></div>
  </div>
</div>
<div class="harmony">
  <h3>🎨 Color Harmonies</h3>
  <div class="harmony-grid" id="harmonyGrid"></div>
</div>

<footer><p>my-automaton · Free Color Picker · <a href="/dev-tools.html">All Tools</a> · <a href="/api-docs.html">API Docs</a></p></footer>
<script>
let currentH=229,currentS=76,currentL=66;

function hslToHex(h,s,l){
  s/=100;l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12;return l-a*Math.max(Math.min(k-3,9-k,1),-1)};
  return '#'+[f(0),f(8),f(4)].map(x=>Math.round(x*255).toString(16).padStart(2,'0')).join('');
}

function hexToHSL(hex){
  const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);
  let h=0,s=0,l=(max+min)/2;
  if(max!==min){
    const d=max-min;s=l>.5?d/(2-max-min):d/(max+min);
    switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break}
  }
  return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
}

function updateAll(hex){
  hex=hex.replace(/^#/,'');
  if(hex.length===3)hex=hex.split('').map(c=>c+c).join('');
  if(!/^[0-9a-fA-F]{6}$/.test(hex))return;
  hex='#'+hex;
  const {h,s,l}=hexToHSL(hex);
  currentH=h;currentS=s;currentL=l;
  document.getElementById('hexInput').value=hex;
  document.getElementById('rgbInput').value=`rgb(${Math.round(parseInt(hex.slice(1,3),16))}, ${Math.round(parseInt(hex.slice(3,5),16))}, ${Math.round(parseInt(hex.slice(5,7),16))})`;
  document.getElementById('hslInput').value=`hsl(${h}, ${s}%, ${l}%)`;
  document.getElementById('preview').style.background=hex;
  document.getElementById('nativePicker').value=hex;
  buildHarmonies(h);
}

function fromNative(){updateAll(document.getElementById('nativePicker').value)}
function fromHex(){updateAll(document.getElementById('hexInput').value)}
function fromRGB(){
  const m=document.getElementById('rgbInput').value.match(/[\d.]+/g);
  if(m&&m.length>=3){
    const hex='#'+[m[0],m[1],m[2]].map(x=>Math.min(255,Math.max(0,Math.round(+x))).toString(16).padStart(2,'0')).join('');
    updateAll(hex);
  }
}

function buildHarmonies(h){
  const types=[
    {label:'Complementary',deg:180},
    {label:'Analogous 1',deg:30},{label:'Analogous 2',deg:-30},
    {label:'Triadic 1',deg:120},{label:'Triadic 2',deg:-120},
    {label:'Split 1',deg:150},{label:'Split 2',deg:210},
    {label:'Square 1',deg:90},{label:'Square 2',deg:180},{label:'Square 3',deg:270},
  ];
  document.getElementById('harmonyGrid').innerHTML=types.map(t=>{
    const nh=((h+t.deg)%360+360)%360;
    const hex=hslToHex(nh,currentS,currentL);
    return `<div class="harmony-swatch" onclick="updateAll('${hex}')"><div class="swatch" style="background:${hex}"></div><div class="swatch-label">${t.label}<br>${hex}</div></div>`;
  }).join('');
}

function copyVal(id){const v=document.getElementById(id).value;if(v)navigator.clipboard.writeText(v)}

updateAll('#667eea');
</script>
