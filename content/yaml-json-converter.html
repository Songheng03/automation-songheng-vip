<script>
let currentDirection = 'yaml2json';
let lastValidOutput = '';

const directionBtns = document.querySelectorAll('#direction button');
directionBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    directionBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentDirection = btn.dataset.dir;
    updateLabels();
    clearOutput();
    clearErrors();
    if (lastValidOutput) doConvert();
  });
});

function updateLabels() {
  if (currentDirection === 'yaml2json') {
    document.getElementById('inputLabel').innerHTML = '📥 YAML Input';
    document.getElementById('inputBadge').textContent = 'YAML';
    document.getElementById('outputLabel').innerHTML = '📤 JSON Output';
    document.getElementById('outputBadge').textContent = 'JSON';
    document.getElementById('inputArea').placeholder = 'Paste your YAML here...';
    document.getElementById('indentInfo').textContent = 'Output: indented with 2 spaces';
  } else {
    document.getElementById('inputLabel').innerHTML = '📥 JSON Input';
    document.getElementById('inputBadge').textContent = 'JSON';
    document.getElementById('outputLabel').innerHTML = '📤 YAML Output';
    document.getElementById('outputBadge').textContent = 'YAML';
    document.getElementById('inputArea').placeholder = 'Paste your JSON here...';
    document.getElementById('indentInfo').textContent = 'Output: standard YAML formatting';
  }
}

function clearOutput() {
  document.getElementById('outputArea').value = '';
  document.getElementById('outputMsg').textContent = '';
}

function clearErrors() {
  document.getElementById('inputError').textContent = '';
  document.getElementById('outputMsg').textContent = '';
}

function showInputError(msg) {
  document.getElementById('inputError').textContent = '❌ ' + msg;
}

function showOutputSuccess(msg) {
  document.getElementById('outputMsg').textContent = '✅ ' + msg;
}

function doConvert() {
  const input = document.getElementById('inputArea').value.trim();
  clearErrors();
  clearOutput();

  if (!input) {
    showInputError('Nothing to convert');
    return;
  }

  try {
    if (currentDirection === 'yaml2json') {
      const parsed = jsyaml.load(input);
      if (parsed === null || parsed === undefined) {
        showInputError('Empty YAML document');
        return;
      }
      const json = JSON.stringify(parsed, null, 2);
      document.getElementById('outputArea').value = json;
      lastValidOutput = json;
      showOutputSuccess(`Converted successfully (${getComplexity(parsed)})`);
    } else {
      const parsed = JSON.parse(input);
      if (parsed === null || parsed === undefined) {
        showInputError('Empty JSON document');
        return;
      }
      const yaml = jsyaml.dump(parsed, { indent: 2, lineWidth: -1, noRefs: true, sortKeys: false });
      document.getElementById('outputArea').value = yaml;
      lastValidOutput = yaml;
      showOutputSuccess(`Converted successfully (${getComplexity(parsed)})`);
    }
  } catch (e) {
    showInputError(e.message);
  }
}

function getComplexity(obj) {
  if (typeof obj !== 'object' || obj === null) return 'scalar';
  const keys = Object.keys(obj);
  let totalKeys = keys.length;
  let maxDepth = 0;
  function walk(o, d) {
    if (d > maxDepth) maxDepth = d;
    if (typeof o === 'object' && o !== null) {
      for (const v of Object.values(o)) {
        walk(v, d + 1);
        totalKeys++;
      }
    }
  }
  walk(obj, 0);
  return `${totalKeys} keys, depth ${maxDepth}`;
}

function swapSides() {
  const inputVal = document.getElementById('inputArea').value;
  const outputVal = document.getElementById('outputArea').value;
  document.getElementById('inputArea').value = outputVal;
  document.getElementById('outputArea').value = '';
  clearErrors();
  clearOutput();

  // Toggle direction
  currentDirection = currentDirection === 'yaml2json' ? 'json2yaml' : 'yaml2json';
  directionBtns.forEach(b => {
    b.classList.toggle('active', b.dataset.dir === currentDirection);
  });
  updateLabels();
}

function copyOutput() {
  const output = document.getElementById('outputArea').value;
  if (!output) return;
  navigator.clipboard.writeText(output).then(() => {
    showOutputSuccess('Copied to clipboard!');
  }).catch(() => {
    document.getElementById('outputArea').select();
    document.execCommand('copy');
    showOutputSuccess('Copied to clipboard!');
  });
}

function clearAll() {
  document.getElementById('inputArea').value = '';
  document.getElementById('outputArea').value = '';
  clearErrors();
  clearOutput();
  lastValidOutput = '';
}

// Live conversion on input (debounced)
let debounceTimer;
document.getElementById('inputArea').addEventListener('input', () => {
  const val = document.getElementById('inputArea').value;
  document.getElementById('charCount').textContent = val.length;
  document.getElementById('lineCount').textContent = val ? val.split('\n').length : 0;

  clearTimeout(debounceTimer);
  if (val.trim()) {
    debounceTimer = setTimeout(doConvert, 400);
  } else {
    clearOutput();
    clearErrors();
  }
});

function loadSample(name) {
  if (currentDirection !== 'yaml2json') {
    currentDirection = 'yaml2json';
    directionBtns.forEach(b => b.classList.toggle('active', b.dataset.dir === 'yaml2json'));
    updateLabels();
  }
  document.getElementById('inputArea').value = samples[name].trim();
  clearErrors();
  clearOutput();
  doConvert();
  document.getElementById('charCount').textContent = samples[name].length;
  document.getElementById('lineCount').textContent = samples[name].split('\n').length;
}

// Initial state
updateLabels();
</script>
