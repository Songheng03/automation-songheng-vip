<header><h1>⚡ CSS Minifier & Beautifier</h1><nav><a href="/">Home</a><a href="/dev-tools.html">Tools</a><a href="/api-playground.html">API</a></nav></header>
<main>
<div class="presets"><span style="font-size:.6rem;color:var(--muted);align-self:center">Samples:</span>

  background: #1e293b;

  border-radius: 12px;
  padding: 1.5rem;
  transition: border-color 0.2s;
}

<script>
const presets={
  card:`.card {\n  background: #1e293b;\n  border: 1px solid #334155;\n  border-radius: 12px;\n  padding: 1.5rem;\n}\n.card:hover {\n  border-color: #38bdf8;\n}`,
  button:`.btn {\n  padding: 0.5rem 1.5rem;\n  border: none;\n  border-radius: 8px;\n  cursor: pointer;\n  font-weight: 600;\n}\n.btn-primary {\n  background: #38bdf8;\n  color: #0f172a;\n}`,
  layout:`.grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));\n  gap: 1rem;\n}\n.grid-item {\n  background: #1e293b;\n  border-radius: 8px;\n  padding: 1rem;\n}`
};
function loadPreset(k){document.getElementById('cssInput').value=presets[k];processCSS()}

function processCSS(){
  const raw=document.getElementById('cssInput').value.trim();
  document.getElementById('inputSize').textContent=raw.length+' bytes';
  if(!raw){document.getElementById('cssOutput').textContent='';return}

  // Minify
  let min=raw
    .replace(/\/\*[\s\S]*?\*\//g,'')  // comments
    .replace(/\s+/g,' ')
    .replace(/\s*{\s*/g,'{')
    .replace(/\s*}\s*/g,'}')
    .replace(/\s*;\s*/g,';')
    .replace(/\s*:\s*/g,':')
    .replace(/\s*,\s*/g,',')
    .replace(/;\s*}/g,'}')
    .trim();

  const indentVal=document.getElementById('indent').value;
  const indent=indentVal==='tab'?'\t':' '.repeat(parseInt(indentVal));

  let output;
  if(indentVal==='0'){
    output=min;
  }else{
    // Beautify
    output=min.replace(/\{/g,' {\n'+indent).replace(/\}/g,'\n}\n').replace(/;/g,';\n'+indent);
    // Clean up: remove extra indent before }
    output=output.replace(/\n\s*\}/g,'\n}');
    // Remove trailing whitespace
    output=output.split('\n').map(l=>l.trimRight()).join('\n').trim();
  }

  document.getElementById('cssOutput').textContent=output;
  document.getElementById('outputSize').textContent=output.length+' bytes';

  const pct=raw.length?((raw.length-output.length)/raw.length*100).toFixed(1):0;
  document.getElementById('reduction').textContent=pct>0?`↓ ${pct}% smaller`:'0% change';
}

function copyOutput(){const v=document.getElementById('cssOutput').textContent;if(v)navigator.clipboard.writeText(v)}
function downloadOutput(){const v=document.getElementById('cssOutput').textContent;if(!v)return;const b=new Blob([v],{type:'text/css'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='output.css';a.click()}

setTimeout(processCSS,50);
</script>
