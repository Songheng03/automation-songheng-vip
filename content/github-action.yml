# GitHub Action: AI Code Review by my-automaton
# 
# Automatically review every pull request for bugs, security issues,
# and performance problems. Free tier: 3 reviews/day.
# 
# Install: Copy this file to .github/workflows/ai-code-review.yml
# Upgrade: https://automation.songheng.vip/upgrade

name: AI Code Review
on:
  pull_request:
    types: [opened, synchronize]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    name: AI-Powered Code Review
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- . | head -c 30000)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send for AI Review
        id: review
        run: |
          RESPONSE=$(curl -s -X POST https://automation.songheng.vip/free/review \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg code "${{ steps.diff.outputs.diff }}" '{code:$code, language:"javascript"}')")
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT
          
          # Check if we hit free limit
          ERROR=$(echo "$RESPONSE" | jq -r '.error // empty')
          if [ -n "$ERROR" ]; then
            echo "⚠️ $ERROR"
            echo "💡 Upgrade at https://automation.songheng.vip/upgrade"
          fi

      - name: Post Review Comment
        if: steps.review.outputs.response != ''
        uses: actions/github-script@v7
        with:
          script: |
            const response = JSON.parse('${{ steps.review.outputs.response }}');
            const result = response.result;
            if (!result) {
              console.log('No review result:', response.error || 'unknown');
              return;
            }
            
            // Parse review into structured comment
            const body = `## 🤖 AI Code Review
            ${result}
            
            ---
            *Powered by [my-automaton MCP Server](https://automation.songheng.vip/mcp-server)
            · [Upgrade for unlimited reviews](https://automation.songheng.vip/upgrade)*`;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
