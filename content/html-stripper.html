<script>
const presets={
  article:'<article><h2>Breaking News</h2><p>Scientists discover new quantum state at <strong>room temperature</strong>.</p><p>"This changes everything," said Dr. Smith. <a href="#">Read more</a></p><footer>Published: June 2026</footer></article>',
  email:'<div style="font-family:sans-serif"><h1>Welcome to our service!</h1><p>Hi <strong>John</strong>,</p><p>Your account is now active. <a href="https://example.com">Click here</a> to get started.</p><p>Best,<br/>The Team</p></div>',
  table:'<table><thead><tr><th>Name</th><th>Score</th></tr></thead><tbody><tr><td>Alice</td><td>95</td></tr><tr><td>Bob</td><td>87</td></tr></tbody></table>'
};
function loadPreset(k){document.getElementById('htmlInput').value=presets[k];stripTags()}

function stripTags(){
  const html=document.getElementById('htmlInput').value;
  const preserveBreaks=document.getElementById('preserveBreaks').checked;
  const decodeEntities=document.getElementById('decodeEntities').checked;
  const trimWS=document.getElementById('trimWS').checked;

  // Create a temporary DOM
  const div=document.createElement('div');
  div.innerHTML=html;

  // Handle breaks
  if(preserveBreaks){
    div.querySelectorAll('br').forEach(br=>br.replaceWith('\n'));
    div.querySelectorAll('p,div,li,h1,h2,h3,h4,h5,h6,tr,section,article,header,footer').forEach(el=>{
      el.insertAdjacentText('beforeend','\n');
    });
  }

  let text=div.textContent||'';

  if(decodeEntities){
    const txt=document.createElement('textarea');
    txt.innerHTML=text;
    text=txt.value;
  }

  if(trimWS){
    text=text.replace(/\n{3,}/g,'\n\n').trim();
  }

  document.getElementById('textOutput').value=text;

  const origLen=html.length;
  const cleanLen=text.length;
  const reduction=origLen?Math.round((1-cleanLen/origLen)*100):0;
  document.getElementById('stats').innerHTML=`HTML: ${origLen.toLocaleString()} chars → Clean: ${cleanLen.toLocaleString()} chars (−${reduction}%)`;
}

function copyText(){const t=document.getElementById('textOutput').value;if(t)navigator.clipboard.writeText(t)}

setTimeout(stripTags,50);
</script>
