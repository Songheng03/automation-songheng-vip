<body>
<header><h1>👁️ CSV Viewer</h1><nav><a href="/">Home</a><a href="/dev-tools.html">Tools</a><a href="/api-playground.html">API</a></nav></header>
<main>
<div class="presets"><span style="font-size:.6rem;color:var(--muted);align-self:center">Samples:</span>
  <button onclick="loadPreset('users')">Users</button>
  <button onclick="loadPreset('products')">Products</button>
  <button onclick="loadPreset('orders')">Orders</button>
</div>
<div class="upload-row">
  <label>Delimiter:</label>
  <select id="delimiter" onchange="parseCSV()">
    <option value=",">Comma (,)</option>
    <option value=";">Semicolon (;)</option>
    <option value="\t">Tab</option>
    <option value="|">Pipe (|)</option>
  </select>
  <textarea id="csvInput" placeholder="Paste CSV here...">Name,Age,Email,City
John Doe,30,john@example.com,San Francisco
Jane Smith,25,jane@example.com,New York
Bob Johnson,42,bob@example.com,Chicago
Alice Brown,28,alice@example.com,Seattle</textarea>
  <button onclick="parseCSV()">🔄 Parse</button>
</div>
<div class="search-row">
  <input type="text" id="searchInput" placeholder="🔍 Filter rows..." oninput="filterTable()">
  <span style="font-size:.6rem;color:var(--muted);align-self:center" id="filterCount"></span>
</div>
<div class="stats">
  <span id="rowCount">0 rows</span>
  <div style="display:flex;gap:.3rem">
    <button class="btn btn-green" onclick="exportJSON()">📥 JSON</button>
    <button class="btn btn-primary" onclick="exportCSV()">📥 CSV</button>
  </div>
</div>
<div class="table-wrap"><table id="dataTable"><thead></thead><tbody></tbody></table></div>
</main>
<footer><p>my-automaton · Free CSV Viewer · <a href="/dev-tools.html">All Tools</a> · <a href="/api-docs.html">API Docs</a></p></footer>
<script>
const presets={
  users:'Name,Age,Email,City\nJohn Doe,30,john@example.com,San Francisco\nJane Smith,25,jane@example.com,New York\nBob Johnson,42,bob@example.com,Chicago\nAlice Brown,28,alice@example.com,Seattle\nMike Davis,35,mike@example.com,Austin',
  products:'ID,Product,Price,Stock,Category\nP001,Wireless Mouse,29.99,142,Electronics\nP002,USB-C Hub,49.99,78,Electronics\nP003,Mechanical Keyboard,89.99,56,Electronics\nP004,Laptop Stand,34.99,200,Accessories\nP005,Webcam 4K,129.99,23,Electronics',
  orders:'OrderID,Customer,Amount,Status,Date\nORD001,John Doe,149.97,Completed,2026-06-15\nORD002,Jane Smith,89.99,Pending,2026-06-17\nORD003,Bob Johnson,279.98,Shipped,2026-06-18\nORD004,Alice Brown,49.99,Cancelled,2026-06-19'
};

function loadPreset(k){document.getElementById('csvInput').value=presets[k];parseCSV()}

let allRows=[],headers=[];
function parseCSV(){
  const raw=document.getElementById('csvInput').value;
  const delim=getDelim();
  const lines=raw.trim().split('\n');
  if(lines.length<1)return;
  
  headers=parseLine(lines[0],delim);
  allRows=lines.slice(1).map(l=>parseLine(l,delim));
  
  // Pad rows to match headers
  allRows.forEach(row=>{while(row.length<headers.length)row.push('');row.length=headers.length});
  
  filterTable();
  document.getElementById('rowCount').textContent=`${allRows.length} rows, ${headers.length} columns`;
}

function getDelim(){
  const v=document.getElementById('delimiter').value;
  if(v==='\\t')return '\t';
  return v;
}

function parseLine(line,delim){
  const result=[];
  let current='',inQuotes=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){inQuotes=!inQuotes;continue}
    if(ch===delim&&!inQuotes){result.push(current.trim());current='';continue}
    current+=ch;
  }
  result.push(current.trim());
  return result;
}

let sortCol=-1,sortDir=1;
function sortBy(col){
  if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=1}
  renderTable(allRows);
}

function filterTable(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const filtered=q?allRows.filter(r=>r.some(c=>c.toLowerCase().includes(q))):allRows;
  document.getElementById('filterCount').textContent=q&&filtered.length!==allRows.length?`Showing ${filtered.length}/${allRows.length}`:'';
  renderTable(filtered);
}

function renderTable(rows){
  const thead=document.querySelector('#dataTable thead');
  thead.innerHTML='<tr>'+headers.map((h,i)=>`<th onclick="sortBy(${i})" class="${i===sortCol?'sorted':''}">${escapeHtml(h)}<span class="sort-arrow">${i===sortCol?(sortDir===1?'▲':'▼'):'⇅'}</span></th>`).join('')+'</tr>';
  
  let displayRows=[...rows];
  if(sortCol>=0)displayRows.sort((a,b)=>{const va=a[sortCol]||'',vb=b[sortCol]||'';const na=parseFloat(va),nb=parseFloat(vb);if(!isNaN(na)&&!isNaN(nb))return (na-nb)*sortDir;return va.localeCompare(vb)*sortDir});

  const tbody=document.querySelector('#dataTable tbody');
  tbody.innerHTML=displayRows.map(r=>'<tr>'+r.map(c=>`<td>${escapeHtml(c)}</td>`).join('')+'</tr>').join('');
}

function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function exportJSON(){
  const data=allRows.map(r=>{const obj={};headers.forEach((h,i)=>obj[h]=r[i]||'');return obj});
  download(JSON.stringify(data,null,2),'data.json','application/json');
}

function exportCSV(){
  const delim=getDelim();
  const csv=[headers.join(delim),...allRows.map(r=>r.map(c=>c.includes(delim)?'"'+c+'"':c).join(delim))].join('\n');
  download(csv,'data.csv','text/csv');
}

function download(content,filename,mime){
  const blob=new Blob([content],{type:mime});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
}

setTimeout(parseCSV,50);
</script>
<script src="/conversion-banner.js" defer></script>
