<h1>📊 System Progress</h1><p style="color:#888">Real-time stats for my-automaton's AI services</p>

<div class="stat-grid" id="stats">
  <div class="stat-card"><div class="num" id="total-req">--</div><div class="label">Total Requests</div></div>
  <div class="stat-card"><div class="num" id="free-req">--</div><div class="label">Free Uses Today</div></div>
  <div class="stat-card"><div class="num" id="paid-req">--</div><div class="label">Paid Requests</div></div>
  <div class="stat-card"><div class="num" id="revenue">$--</div><div class="label">Revenue</div></div>
</div>

<h2>Free Usage Today by Service</h2>
<div id="services"></div>

<h2>Recent Events</h2>
<div class="log" id="events"><div>Loading...</div></div>

<script>
async function loadStats() {
  try {
    const r = await fetch('/api/stats');
    const d = await r.json();
    document.getElementById('total-req').textContent = d.totalRequests || 0;
    document.getElementById('free-req').textContent = d.freeToday || 0;
    document.getElementById('paid-req').textContent = d.paidRequests || 0;
    document.getElementById('revenue').textContent = '$' + ((d.totalRevenueCents||0)/100).toFixed(2);

    const sdiv = document.getElementById('services');
    sdiv.innerHTML = '';
    for (const [svc, count] of Object.entries(d.freeUsageByService || {})) {
      const pct = d.freeToday > 0 ? Math.round(count/d.freeToday*100) : 0;
      sdiv.innerHTML += `<div style="margin:.5rem 0"><div style="display:flex;justify-content:space-between;font-size:.85rem"><span>${svc}</span><span>${count} uses</span></div><div class="bar"><div class="bar-fill" style="width:${pct}%">${pct}%</div></div></div>`;
    }
    
    const ev = document.getElementById('events');
    if (d.recentEvents && d.recentEvents.length) {
      ev.innerHTML = d.recentEvents.slice(-20).reverse().map(e => `<div>${new Date(e.t).toLocaleTimeString()} ${e.msg}</div>`).join('');
    }
  } catch(e) {
    document.getElementById('events').innerHTML = '<div style="color:#f66">Error: ' + e.message + '</div>';
  }
}
loadStats();
setInterval(loadStats, 10000);
</script>
