<script>
let tab=0;
function setTab(t){tab=t;update();renderTabs()}
function renderTabs(){
  document.querySelectorAll('.tabs button').forEach((b,i)=>b.classList.toggle('active',i===tab));
  const c=document.getElementById('tabContent');
  if(tab===0)c.innerHTML='<div class="input-row"><span class="label-text">What is</span><input type="number" id="pct" value="15" oninput="update()" placeholder="%"><span style="color:var(--muted)">% of</span><input type="number" id="num" value="200" oninput="update()" placeholder="Number"><span style="color:var(--muted)">?</span></div>';
  else if(tab===1)c.innerHTML='<div class="input-row"><input type="number" id="part" value="30" oninput="update()" placeholder="Part"><span style="color:var(--muted)">is what % of</span><input type="number" id="whole" value="200" oninput="update()" placeholder="Whole"><span style="color:var(--muted)">?</span></div>';
  else c.innerHTML='<div class="input-row"><span style="color:var(--muted)">From</span><input type="number" id="old" value="100" oninput="update()" placeholder="Old"><span style="color:var(--muted)">to</span><input type="number" id="newv" value="125" oninput="update()" placeholder="New"></div>';
  update();
}
function update(){
  const rn=document.getElementById('resultNum'),rd=document.getElementById('resultDesc'),f=document.getElementById('formula');
  if(tab===0){const p=parseFloat(document.getElementById('pct')?.value)||0,n=parseFloat(document.getElementById('num')?.value)||0;const r=(p/100)*n;rn.textContent=r.toFixed(2);rd.textContent=p+'% of '+n+' = '+r.toFixed(2);f.innerHTML='<strong>Formula:</strong> ('+p+' ÷ 100) × '+n+' = '+r.toFixed(2)}
  else if(tab===1){const p=parseFloat(document.getElementById('part')?.value)||0,w=parseFloat(document.getElementById('whole')?.value)||1;const r=(p/w)*100;rn.textContent=r.toFixed(2)+'%';rd.textContent=p+' is '+r.toFixed(2)+'% of '+w;f.innerHTML='<strong>Formula:</strong> ('+p+' ÷ '+w+') × 100 = '+r.toFixed(2)+'%'}
  else{const o=parseFloat(document.getElementById('old')?.value)||0,n=parseFloat(document.getElementById('newv')?.value)||0;const diff=n-o;const r=o!==0?(diff/Math.abs(o))*100:0;const arrow=r>=0?'↑':'↓';rn.innerHTML='<span style="color:'+(r>=0?'var(--green)':'var(--yellow)')+'">'+arrow+' '+Math.abs(r).toFixed(2)+'%</span>';rd.textContent='From '+o+' to '+n+' = '+r.toFixed(2)+'% change';f.innerHTML='<strong>Formula:</strong> (('+n+' − '+o+') ÷ |'+o+'|) × 100 = '+r.toFixed(2)+'%'}}
renderTabs();
</script><script src="/conversion-banner.js" defer></script>
