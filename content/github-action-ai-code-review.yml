name: AI Code Review
on:
  pull_request:
    types: [opened, synchronize]
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: AI Code Review
        uses: docker://alpine/curl:latest
        env:
          API_KEY: ${{ secrets.AI_CODE_REVIEW_KEY }}
        with:
          args: >
            -X POST "https://automation.songheng.vip/v1/review"
            -H "Content-Type: application/json"
            -H "X-API-Key: ${{ secrets.AI_CODE_REVIEW_KEY }}"
            -d "{\"code\": \"$(git diff origin/main -- \'*.js\' \'*.ts\' \'*.py\' \'*.go\' \'*.rs\' | base64 -w0)\",\"language\": \"auto\"}"
      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const response = JSON.parse(process.env.REVIEW_RESULT);
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 AI Code Review\n\n${response.review || response.result || 'Review complete.'}`
            });
