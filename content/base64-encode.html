<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64 Encoder/Decoder — Encode Text to Base64 Online Free | my-automaton</title>
<meta name="description" content="Encode text to Base64 and decode Base64 back to text. Supports Unicode via encodeURIComponent. Swap input/output, copy output. Free, client-side, no signup.">
<meta name="keywords" content="base64 encoder, base64 decoder, base64 text, encode base64, decode base64, base64 online, free base64 tool, text to base64">
<style>
:root{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--accent:#38bdf8;--green:#4ade80;--border:#334155}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--card);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem}
header h1{font-size:1.25rem;color:var(--accent)}
nav a{color:var(--muted);text-decoration:none;margin-left:1rem;font-size:0.875rem}
nav a:hover{color:var(--accent)}
.promo-bar{background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;text-align:center;padding:0.5rem;font-size:0.85rem}
.promo-bar a{color:#fbbf24;font-weight:600}
main{max-width:950px;margin:2rem auto;padding:0 1rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem}
.card h2{font-size:1.1rem;margin-bottom:1rem;color:var(--accent)}
.io-row{display:flex;gap:1rem;flex-wrap:wrap}
.io-box{flex:1;min-width:300px}
.io-box label{display:block;font-size:0.8rem;color:var(--muted);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.05em}
textarea{width:100%;min-height:160px;background:#0f172a;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:1rem;font-family:'Fira Code',monospace;font-size:0.85rem;resize:vertical}
textarea:focus{outline:none;border-color:var(--accent)}
.btn-row{display:flex;gap:0.75rem;flex-wrap:wrap;margin:1rem 0;justify-content:center}
.btn{padding:0.65rem 1.25rem;border:none;border-radius:8px;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-primary{background:var(--accent);color:#0f172a}
.btn-primary:hover{filter:brightness(1.1)}
.btn-green{background:var(--green);color:#0f172a}
.btn-green:hover{filter:brightness(1.1)}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-secondary:hover{background:#475569}
footer{text-align:center;padding:2rem;color:var(--muted);font-size:0.8rem;border-top:1px solid var(--border);margin-top:2rem}
footer a{color:var(--accent)}
</style>
</head>
<body>
<header>
<h1>🔐 Base64 Encoder & Decoder</h1>
<nav>
<a href="/">Home</a><a href="/api-docs.html">API</a><a href="/dev-tools.html">All Tools</a><a href="/blog.html">Blog</a>
</nav>
</header>
<div class="promo-bar">🚀 Need AI text analysis? Try our <a href="/api-docs.html">paid API</a> — from 1¢/request.</div>
<main>
<div class="card">
<h2>📝 Encode / Decode</h2>
<div class="io-row">
<div class="io-box">
<label>Plain Text</label>
<textarea id="plainInput" placeholder="Enter text to encode..." oninput="autoEncode()"></textarea>
</div>
<div class="io-box">
<label>Base64</label>
<textarea id="base64Input" placeholder="Paste Base64 to decode..." oninput="autoDecode()"></textarea>
</div>
</div>
<div class="btn-row">
<button class="btn btn-primary" onclick="encodeText()">🔒 Encode →</button>
<button class="btn btn-secondary" onclick="decodeText()">🔓 ← Decode</button>
<button class="btn btn-secondary" onclick="swapIO()">🔄 Swap</button>
<button class="btn btn-green" onclick="copyBase64()">📋 Copy Base64</button>
<button class="btn btn-secondary" onclick="clearAll()">🗑 Clear</button>
</div>
</div>
</main>
<footer><p>my-automaton · <a href="/">Home</a> · <a href="/dev-tools.html">All Tools</a></p></footer>
<script>
function encodeText(){
  const plain=document.getElementById('plainInput').value;
  if(!plain) return;
  try{ document.getElementById('base64Input').value=btoa(unescape(encodeURIComponent(plain))); }
  catch(e){ document.getElementById('base64Input').value='Encoding error: '+e.message; }
}
function decodeText(){
  const b64=document.getElementById('base64Input').value.trim();
  if(!b64) return;
  try{ document.getElementById('plainInput').value=decodeURIComponent(escape(atob(b64))); }
  catch(e){ document.getElementById('plainInput').value='Decoding error (maybe not valid Base64?): '+e.message; }
}
function autoEncode(){ if(document.getElementById('plainInput').value.length>2) encodeText(); }
function autoDecode(){ if(document.getElementById('base64Input').value.length>4) decodeText(); }
function swapIO(){
  const p=document.getElementById('plainInput'), b=document.getElementById('base64Input');
  [p.value,b.value]=[b.value,p.value];
}
function copyBase64(){
  const t=document.getElementById('base64Input').value;
  if(!t) return;
  navigator.clipboard.writeText(t).then(()=>{
    const btn=document.querySelector('.btn-green'); btn.textContent='✅ Copied!';
    setTimeout(()=>btn.textContent='📋 Copy Base64',1500);
  });
}
function clearAll(){
  document.getElementById('plainInput').value='';
  document.getElementById('base64Input').value='';
}
</script>
<script src="/conversion-banner.js" defer></script>
</body>
</html>
