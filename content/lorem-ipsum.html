<body>
<header><h1>📝 Lorem Ipsum Generator</h1><nav><a href="/">Home</a><a href="/dev-tools-hub.html">Tools Hub</a></nav></header>
<main>
<div class="controls">
  <div class="cg"><label>Format</label><select id="format" onchange="generate()"><option value="paragraphs">Paragraphs</option><option value="sentences">Sentences</option><option value="words">Words</option><option value="characters">Characters</option></select></div>
  <div class="cg"><label>Count</label><input type="number" id="count" value="3" min="1" max="100" onchange="generate()"></div>

  <label style="display:flex;align-items:center;gap:.5rem;font-size:.7rem;cursor:pointer">
    <input type="checkbox" id="htmlMode" onchange="generate()"> Wrap in <code>&lt;p&gt;</code> tags (HTML)
  </label>
</div>

<script>
const LOREM_WORDS='lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua ut enim ad minim veniam quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur excepteur sint occaecat cupidatat non proident sunt in culpa qui officia deserunt mollit anim id est laborum'.split(' ');

function generate(){
  const format=document.getElementById('format').value;
  const count=parseInt(document.getElementById('count').value)||3;
  const htmlMode=document.getElementById('htmlMode').checked;

  let result='',wordCount=0;

  if(format==='paragraphs'){
    for(let p=0;p<count;p++){
      const pLen=40+Math.floor(Math.random()*80);
      const words=[];
      for(let i=0;i<pLen;i++)words.push(LOREM_WORDS[Math.floor(Math.random()*LOREM_WORDS.length)]);
      words[0]=words[0].charAt(0).toUpperCase()+words[0].slice(1);
      if(htmlMode)result+='<p>'+words.join(' ')+'.</p>\n';
      else result+=words.join(' ')+'.\n\n';
      wordCount+=pLen;
    }
  }else if(format==='sentences'){
    for(let s=0;s<count;s++){
      const sLen=8+Math.floor(Math.random()*15);
      const words=[];
      for(let i=0;i<sLen;i++)words.push(LOREM_WORDS[Math.floor(Math.random()*LOREM_WORDS.length)]);
      words[0]=words[0].charAt(0).toUpperCase()+words[0].slice(1);
      if(htmlMode)result+='<p>'+words.join(' ')+'.</p>\n';
      else result+=words.join(' ')+'. ';
      wordCount+=sLen;
    }
  }else if(format==='words'){
    const words=[];
    for(let i=0;i<count;i++)words.push(LOREM_WORDS[Math.floor(Math.random()*LOREM_WORDS.length)]);
    words[0]=words[0].charAt(0).toUpperCase()+words[0].slice(1);
    result=words.join(' ')+(count>5?'.':'');
    wordCount=count;
  }else if(format==='characters'){
    let chars='';
    const full=LOREM_WORDS.join(' ');
    while(chars.length<count)chars+=full.substring(0,count-chars.length);
    result=chars.substring(0,count).trim();
    result=result.charAt(0).toUpperCase()+result.slice(1);
    wordCount=Math.round(count/5);
  }

  document.getElementById('output').innerHTML=htmlMode?result:result.split('\n').map(l=>l.trim()?`<p>${l}</p>`:'').join('');
  const charCount=result.replace(/<[^>]*>/g,'').length;
  document.getElementById('stats').textContent=`~${wordCount} words · ${charCount} characters`;
}

function copyText(){
  const el=document.getElementById('output');
  navigator.clipboard.writeText(el.textContent);
}
function downloadText(){
  const text=document.getElementById('output').textContent;
  const blob=new Blob([text],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='lorem-ipsum.txt';a.click();URL.revokeObjectURL(a.href);
}

generate();
</script>
