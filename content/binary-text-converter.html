<script>
let tab='text';
function setTab(t){tab=t;renderUI();convert()}
function renderUI(){
  const c=document.getElementById('tabContent');
  const err=document.getElementById('errorMsg');err.textContent='';
  if(tab==='text'){c.innerHTML='<label>Enter Text</label><textarea id="textInput" placeholder="Type text to encode..." oninput="convert()">Hello World!</textarea>'}
  else if(tab==='fromBin'){c.innerHTML='<label>Enter Binary (space-separated bytes)</label><textarea id="binInput" placeholder="01001000 01101001" oninput="convert()"></textarea>'}
  else if(tab==='fromHex'){c.innerHTML='<label>Enter Hexadecimal</label><textarea id="hexInput" placeholder="48 65 6c 6c 6f" oninput="convert()"></textarea>'}
  else{c.innerHTML='<label>Enter Base64</label><textarea id="b64Input" placeholder="SGVsbG8=" oninput="convert()"></textarea>'}
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tabs button')[tab==='text'?0:tab==='fromBin'?1:tab==='fromHex'?2:3].classList.add('active');
}
function strToBytes(s){const e=new TextEncoder();return e.encode(s)}
function bytesToStr(b){const d=new TextDecoder();return d.decode(new Uint8Array(b))}
function bytesToBin(bytes){return Array.from(bytes).map(b=>b.toString(2).padStart(8,'0')).join(' ')}
function bytesToHex(bytes){return Array.from(bytes).map(b=>b.toString(16).padStart(2,'0')).join(' ')}
function bytesToB64(bytes){let bin='';for(const b of bytes)bin+=String.fromCharCode(b);return btoa(bin)}
function convert(){
  const err=document.getElementById('errorMsg');err.textContent='';
  try{
    let bytes=[];
    if(tab==='text'){const s=document.getElementById('textInput')?.value||'';bytes=strToBytes(s)}
    else if(tab==='fromBin'){const s=document.getElementById('binInput')?.value||'';const parts=s.trim().split(/\s+/);bytes=parts.map(p=>{if(!/^[01]+$/.test(p))throw new Error('Invalid binary: '+p);return parseInt(p,2)})}
    else if(tab==='fromHex'){const s=document.getElementById('hexInput')?.value||'';const parts=s.trim().split(/\s+/);bytes=parts.map(p=>{if(!/^[0-9a-fA-F]+$/.test(p))throw new Error('Invalid hex: '+p);return parseInt(p,16)})}
    else{const s=document.getElementById('b64Input')?.value||'';try{const bin=atob(s);bytes=[];for(let i=0;i<bin.length;i++)bytes.push(bin.charCodeAt(i))}catch(e){throw new Error('Invalid Base64')}}
    if(bytes.length===0)return;
    document.getElementById('outBinary').value=bytesToBin(bytes);
    document.getElementById('outHex').value=bytesToHex(bytes);
    document.getElementById('outBase64').value=bytesToB64(bytes);
    if(tab!=='text'&&bytes.length>0){const s=bytesToStr(bytes);
      // Auto-fill text input in non-text modes
    }
  }catch(e){err.textContent='❌ '+e.message}
}
function copyResult(){const out=document.getElementById('outBinary')?.value||'';if(out)navigator.clipboard.writeText(out)}
function swapIO(){
  if(tab==='text'){document.getElementById('textInput').value=document.getElementById('outBinary').value||'';convert()}
}
renderUI();
