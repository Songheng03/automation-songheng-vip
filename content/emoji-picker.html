let cat='all';
function splitEmojis(s){return[...s].filter(c=>c.trim())}
function setCat(c){cat=c;document.querySelectorAll('.cat-tabs button').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase().includes(c)||(c==='all'&&b.textContent==='All')));document.getElementById('searchInput').value='';renderEmojis()}
function renderEmojis(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  let emojis;
  if(cat==='all'){
    emojis=Object.values(emojiData).flatMap(s=>splitEmojis(s));
    emojis=[...new Set(emojis)];
  }else{
    const data=emojiData[cat]||'';
    emojis=splitEmojis(data);
  }
  if(q)emojis=emojis.filter(e=>e.includes(q)||emojiNames[e]?.toLowerCase().includes(q));
  document.getElementById('catInfo').textContent=emojis.length+' emojis';
  document.getElementById('emojiGrid').innerHTML=emojis.map(e=>'<div class="emoji-item" onclick="copyEmoji(this,\''+e+'\')" title="Click to copy!">'+e+'</div>').join('');
}
function copyEmoji(el,emoji){
  navigator.clipboard.writeText(emoji);
  const toast=document.getElementById('toast');
  toast.textContent='✅ Copied '+emoji+'!';toast.classList.add('show');
  el.style.transform='scale(1.2)';setTimeout(()=>el.style.transform='',200);
  setTimeout(()=>toast.classList.remove('show'),1200);
}
const emojiNames={
