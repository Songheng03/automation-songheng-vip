#preview table{width:100%;border-collapse:collapse;margin:12px 0;font-size:.85rem}

.drag-handle:hover{background:var(--accent)}
@media(max-width:768px){
  .main{flex-direction:column}
  .drag-handle{width:100%;height:3px;cursor:row-resize}
  #editor,#preview{min-height:250px}

<script>
// Simple GFM markdown parser
function parseMarkdown(text) {
  let html = text;
  
  // Escape HTML
  html = html.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  
  // Code blocks (must be first)
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_,lang,code) => {
    return `<pre><code class="language-${lang}">${code.trim()}</code></pre>`;
  });
  
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  
  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/__([^_]+)__/g, '<strong>$1</strong>');
  
  // Italic
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  html = html.replace(/_([^_]+)_/g, '<em>$1</em>');
  
  // Strikethrough
  html = html.replace(/~~([^~]+)~~/g, '<del>$1</del>');
  
  // Images
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
  
  // Links
  html = html.replace(/\[([^\]]*)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  
  // Horizontal rules
  html = html.replace(/^([-*_]){3,}\s*$/gm, '<hr>');
  
  // Tables
  html = parseTables(html);
  
  // Blockquotes
  html = html.replace(/^&gt; (.*)$/gm, (_,content) => `<blockquote>${content}</blockquote>`);
  // Merge adjacent blockquotes
  html = html.replace(/<\/blockquote>\n<blockquote>/g, '\n');
  
  // Task lists
  html = html.replace(/^[\s]*- \[x\] (.*)$/gm, '<li><input type="checkbox" checked disabled> $1</li>');
  html = html.replace(/^[\s]*- \[ \] (.*)$/gm, '<li><input type="checkbox" disabled> $1</li>');
  
  // Ordered lists
  html = html.replace(/^\d+\. (.*)$/gm, '<li>$1</li>');
  // Wrap consecutive <li> in <ol> or <ul>
  html = wrapLists(html);
  
  // Unordered lists
  html = html.replace(/^[\s]*[-*+] (.*)$/gm, '<li>$1</li>');
  html = wrapLists(html);
  
  // Headers
  html = html.replace(/^###### (.*)$/gm, '<h6>$1</h6>');
  html = html.replace(/^##### (.*)$/gm, '<h5>$1</h5>');
  html = html.replace(/^#### (.*)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.*)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.*)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.*)$/gm, '<h1>$1</h1>');
  
  // Paragraphs (lines that start with text)
  html = html.replace(/^(?!<[a-z/])(.+)$/gm, '<p>$1</p>');
  
  // Clean up empty <p>
  html = html.replace(/<p>\s*<\/p>/g, '');
  
  return html;
}

function parseTables(text) {
  return text.replace(/(\|[^\n]+\|\n)(\|[-:\s|]+\|\n)((?:\|[^\n]+\|\n?)+)/g, (_,header,sep,rows) => {
    const heads = header.split('|').filter(c=>c.trim());
    let tableHtml = '<table><thead><tr>';
    heads.forEach(h => tableHtml += `<th>${h.trim()}</th>`);
    tableHtml += '</tr></thead><tbody>';
    const rowLines = rows.trim().split('\n');
    rowLines.forEach(line => {
      const cols = line.split('|').filter(c => c.length > 0 || line.includes('||'));
      tableHtml += '<tr>';
      cols.forEach(c => tableHtml += `<td>${c.trim()}</td>`);
      tableHtml += '</tr>';
    });
    tableHtml += '</tbody></table>';
    return tableHtml;
  });
}

function wrapLists(html) {
  // Wrap consecutive <li> in <ul>
  return html.replace(/(<li>[\s\S]*?<\/li>(\n<li>[\s\S]*?<\/li>)*)/g, '<ul>$1</ul>');
}

function insertMarkdown(text) {
  const ta = document.getElementById('editor');
  const start = ta.selectionStart;
  const end = ta.selectionEnd;
  const before = ta.value.substring(0, start);
  const after = ta.value.substring(end);
  ta.value = before + text + after;
  ta.focus();
  ta.selectionStart = ta.selectionEnd = start + text.length;
  updatePreview();
}

function updatePreview() {
  const text = document.getElementById('editor').value;
  document.getElementById('preview').innerHTML = parseMarkdown(text);
  document.getElementById('charCount').textContent = text.length + ' chars';
  document.getElementById('wordCount').textContent = text.trim() ? text.trim().split(/\s+/).length + ' words' : '0 words';
}

function copyHTML() {
  const html = document.getElementById('preview').innerHTML;
  navigator.clipboard.writeText(html).then(() => {
    const btn = [...document.querySelectorAll('.tb-btn')].find(b=>b.textContent.includes('Copy HTML'));
    if(btn){btn.textContent='✅ Copied!';setTimeout(()=>btn.textContent='📋 Copy HTML',1500);}
  });
}

function downloadMD() {
  const text = document.getElementById('editor').value;
  const blob = new Blob([text], {type:'text/markdown'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'document.md'; a.click();
  URL.revokeObjectURL(url);
}

// Drag to resize panes
let dragging = false;
const dragHandle = document.getElementById('dragHandle');
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');

dragHandle.addEventListener('mousedown', e => {
  dragging = true;
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});

document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const main = document.querySelector('.main');
  const rect = main.getBoundingClientRect();
  if (window.innerWidth > 768) {
    const pct = ((e.clientX - rect.left) / rect.width) * 100;
    editor.parentElement.style.flex = pct + '%';
    preview.parentElement.style.flex = (100 - pct) + '%';
  } else {
    const pct = ((e.clientY - rect.top) / rect.height) * 100;
    editor.parentElement.style.flex = `0 0 ${pct}%`;
    preview.parentElement.style.flex = `0 0 ${100-pct}%`;
  }
});

document.addEventListener('mouseup', () => {
  dragging = false;
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
});

// Init
document.getElementById('editor').addEventListener('input', updatePreview);
updatePreview();
</script>
