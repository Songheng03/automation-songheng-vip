<script>
const PRESETS = {
  user: JSON.stringify({ id: 1, name: "Alice", email: "alice@example.com", age: 30, isActive: true, roles: ["admin", "editor"], address: { street: "123 Main St", city: "SF", zip: "94105" }, metadata: null }, null, 2),
  api: JSON.stringify({ status: "ok", data: { id: "abc123", title: "Hello", body: "World", tags: ["news", "tech"], author: { name: "Bob", avatar: null }, publishedAt: "2026-06-17T00:00:00Z", viewCount: 1234 } }, null, 2),
  config: JSON.stringify({ appName: "MyApp", version: "2.1.0", debug: false, port: 8080, database: { host: "localhost", port: 5432, name: "mydb", poolSize: 10, ssl: true }, features: { darkMode: true, notifications: false, exportFormats: ["pdf", "csv", "json"] }, rateLimit: { windowMs: 900000, max: 100 } }, null, 2),
  deep: JSON.stringify({ level1: { level2: { level3: { level4: { level5: { name: "deep", value: 42, tags: ["a","b","c"] } } } } } }, null, 2)
};

function loadPreset(name) {
  document.getElementById('input').value = PRESETS[name] || '';
  convert();
}

const autoTimer = { id: null };
function autoConvert() {
  if (autoTimer.id) clearTimeout(autoTimer.id);
  autoTimer.id = setTimeout(convert, 400);
}

function showError(msg) {
  const bar = document.getElementById('errorBar');
  if (msg) { bar.textContent = msg; bar.style.display = 'block'; }
  else { bar.style.display = 'none'; }
}

function toPascal(str) {
  return str.replace(/[^a-zA-Z0-9_]/g, '_').replace(/(?:^|_)(\w)/g, (_, c) => c.toUpperCase()).replace(/^(\d)/, '_$1');
}

function inferTypeName(key) {
  const s = toPascal(key);
  if (s.endsWith('s') && s.length > 3) return s.slice(0, -1);
  return s;
}

const seenTypes = new Map();
let rootTypeName = '';

function jsonToType(value, name, depth = 0, opts = {}) {
  if (value === null) return 'null';
  if (value === undefined) return 'undefined';
  
  const t = typeof value;
  if (t === 'string') return 'string';
  if (t === 'number') return 'number';
  if (t === 'boolean') return 'boolean';
  if (t === 'bigint') return 'bigint';
  
  if (Array.isArray(value)) {
    if (value.length === 0) return 'unknown[]';
    const itemTypes = [...new Set(value.map(v => jsonToType(v, name + 'Item', depth + 1, opts)))];
    if (itemTypes.length === 1) return itemTypes[0] + '[]';
    if (opts.exportType === 'zod') return `z.array(z.union([${itemTypes.join(', ')}]))`;
    return `(${itemTypes.join(' | ')})[]`;
  }
  
  if (t === 'object') {
    const typeName = depth === 0 ? name : (name || 'Anonymous' + depth);
    const existing = seenTypes.get(JSON.stringify(Object.keys(value).sort()));
    if (existing && depth > 0) return existing;
    
    const props = Object.entries(value).map(([k, v]) => {
      const valType = jsonToType(v, toPascal(k), depth + 1, opts);
      const optionalFlag = opts.optional ? '?' : '';
      const readonlyFlag = opts.readonly ? 'readonly ' : '';
      return { key: k, type: valType, optional: opts.optional, readonly: opts.readonly };
    });
    
    seenTypes.set(JSON.stringify(Object.keys(value).sort()), typeName);
    
    if (opts.exportType === 'zod') {
      const fields = props.map(p => `  ${p.key}: z.${zodTypeFromStr(p.type)}`).join(',\n');
      return `z.object({\n${fields}\n})`;
    }
    
    const decl = opts.exportType === 'type' ? 'type' : 'interface';
    const fields = props.map(p => {
      const opt = p.optional ? '?' : '';
      const ro = p.readonly ? 'readonly ' : '';
      return `  ${ro}${p.key}${opt}: ${p.type};`;
    }).join('\n');
    
    return `${decl} ${typeName} {\n${fields}\n}`;
  }
  
  return 'unknown';
}

function zodTypeFromStr(str) {
  if (str === 'string') return 'string()';
  if (str === 'number') return 'number()';
  if (str === 'boolean') return 'boolean()';
  if (str === 'null') return 'null()';
  if (str === 'undefined') return 'undefined()';
  if (str.endsWith('[]')) return `array(${zodTypeFromStr(str.slice(0, -2))})`;
  if (str.startsWith('z.')) return str;
  if (str.includes(' | ')) return `union([${str.split(' | ').map(s => zodTypeFromStr(s.trim())).join(', ')}])`;
  if (str.includes('{')) return str;
  return 'any()';
}

function convert() {
  showError(null);
  const raw = document.getElementById('input').value.trim();
  const output = document.getElementById('output');
  const strict = document.getElementById('strict').checked;
  const optional = document.getElementById('optional').checked;
  const readonly = document.getElementById('readonly').checked;
  const exportType = document.getElementById('exportType').value;
  
  if (!raw) {
    output.innerHTML = '<div class="placeholder-text">Paste JSON on the left → TypeScript appears here ✨</div>';
    return;
  }
  
  let parsed;
  try { parsed = JSON.parse(raw); }
  catch (e) {
    showError(`Invalid JSON: ${e.message}`);
    output.innerHTML = `<div class="placeholder-text" style="color:var(--red)">⚠ Invalid JSON</div>`;
    return;
  }
  
  seenTypes.clear();
  const opts = { strict, optional, readonly, exportType };
  
  try {
    let result = jsonToType(parsed, 'Root', 0, opts);
    result = result.replace(/\ninterface /g, '\n\nexport interface ').replace(/^interface /, 'export interface ');
    if (exportType === 'zod') result = 'import { z } from "zod";\n\n' + result + ';';
    output.innerHTML = syntaxHighlight(result);
  } catch (e) {
    showError(`Generation error: ${e.message}`);
    output.innerHTML = `<div class="placeholder-text" style="color:var(--red)">⚠ Error generating types</div>`;
  }
}

function syntaxHighlight(code) {
  const escape = str => str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const lines = escape(code).split('\n');
  return lines.map(line => {
    return line
      .replace(/(\/\/.*)/g, '<span class="comment">$1</span>')
      .replace(/\b(export|import|from|interface|type|extends|implements|const|let|var|function|return|if|else|as|in|of|keyof|typeof)\b/g, '<span class="keyword">$1</span>')
      .replace(/\b(string|number|boolean|null|undefined|void|any|never|unknown|object|Record|Partial|Required|Pick|Omit|Readonly|Promise|Array)\b/g, '<span class="type">$1</span>')
      .replace(/"([^"]+)"/g, '<span class="string">"$1"</span>')
      .replace(/\b(\d+\.?\d*)\b/g, '<span class="number">$1</span>')
      .replace(/(\{|\[|\]|\}|\(|\)|:|;|,)/g, '<span class="punctuation">$1</span>');
  }).join('\n');
}

async function copyOutput() {
  const text = document.getElementById('output').textContent;
  try {
    await navigator.clipboard.writeText(text);
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  } catch(e) {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }
}

// Trigger on Enter in textarea
document.getElementById('input').addEventListener('keydown', (e) => {
  if (e.key === 'Tab') { e.preventDefault(); const ta = e.target; const start = ta.selectionStart; ta.value = ta.value.substring(0, start) + '  ' + ta.value.substring(ta.selectionEnd); ta.selectionStart = ta.selectionEnd = start + 2; }
});

// Load default preset
loadPreset('user');
</script>
