<div style="background:#161b22;border-bottom:1px solid #30363d;padding:10px 20px;font-size:.85rem;display:flex;gap:16px;align-items:center;flex-wrap:wrap"><a href="/" style="color:#58a6ff;text-decoration:none;font-weight:600">🏠 Home</a><span style="color:#484f58">|</span><a href="/pricing.html" style="color:#8b949e;text-decoration:none">Pricing</a><a href="/api-docs.html" style="color:#8b949e;text-decoration:none">API</a><a href="/playground.html" style="color:#8b949e;text-decoration:none">Playground</a></div>

<h1>📊 Live Dashboard</h1>
<div class="grid" id="stats-grid">
  <div class="card"><div class="label">Total Visitors</div><div class="value blue" id="total-visits">—</div><div class="sub">all time</div></div>
  <div class="card"><div class="label">Unique IPs</div><div class="value green" id="unique-ips">—</div><div class="sub">distinct visitors</div></div>
  <div class="card"><div class="label">Today</div><div class="value yellow" id="today-visits">—</div><div class="sub">visits today</div></div>
  <div class="card"><div class="label">Today Unique</div><div class="value purple" id="today-unique">—</div><div class="sub">unique today</div></div>
  <div class="card"><div class="label">Wallet</div><div class="value blue" style="font-size:1rem;word-break:break-all;">0x76eADdEBF...dd113</div><div class="sub">Base (USDC)</div></div>
</div>

<button class="refresh" onclick="refresh()">🔄 Refresh Data</button>

<h2>📈 Last 7 Days</h2>
<table id="trend-table">
<thead><tr><th>Date</th><th>Visits</th><th>Unique</th><th>Bar</th></tr></thead>
<tbody id="trend-body"></tbody>
</table>

<h2>🏆 Top Pages</h2>
<table id="pages-table">
<thead><tr><th>Page</th><th>Views</th></tr></thead>
<tbody id="pages-body"></tbody>
</table>

<script>
async function refresh() {
  try {
    const r = await fetch('/api/visitors');
    const d = await r.json();
    
    document.getElementById('total-visits').textContent = d.totalVisits.toLocaleString();
    document.getElementById('unique-ips').textContent = d.uniqueVisitors.toLocaleString();
    document.getElementById('today-visits').textContent = d.todayVisits.toLocaleString();
    document.getElementById('today-unique').textContent = d.todayUnique.toLocaleString();
    
    // Trend table
    const trendBody = document.getElementById('trend-body');
    trendBody.innerHTML = '';
    const maxVal = Math.max(...d.last7Days.map(x => x.visits), 1);
    d.last7Days.forEach(day => {
      const pct = (day.visits / maxVal * 100).toFixed(0);
      trendBody.innerHTML += `<tr><td>${day.date}</td><td>${day.visits}</td><td>${day.uniqueIPs}</td><td><div style="background:#1f6feb;height:20px;width:${pct}%;border-radius:4px;min-width:4px;"></div></td></tr>`;
    });
    
    // Pages table
    const pagesBody = document.getElementById('pages-body');
    pagesBody.innerHTML = '';
    d.topPages.forEach(p => {
      pagesBody.innerHTML += `<tr><td><code>${p.page}</code></td><td>${p.count}</td></tr>`;
    });
    
  } catch(e) {
    document.getElementById('total-visits').textContent = '⚠️';
  }
}
refresh();
setInterval(refresh, 30000);
</script>
