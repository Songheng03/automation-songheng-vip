<body>
<header><h1>📐 JSON Schema Generator</h1><nav><a href="/">Home</a><a href="/dev-tools.html">Tools</a><a href="/api-playground.html">API</a></nav></header>
<main>
<div class="presets"><span style="font-size:.6rem;color:var(--muted);align-self:center">Samples:</span>
  <button onclick="loadPreset('user')">User</button>
  <button onclick="loadPreset('product')">Product</button>
  <button onclick="loadPreset('nested')">Nested</button>
</div>
<div class="panel">
  <div class="box">
    <h3>📥 JSON Input <span class="size" id="inputSize">0 bytes</span></h3>
    <textarea id="jsonInput" placeholder='Paste JSON here...' oninput="generateSchema()">{"name":"John Doe","age":30,"email":"john@example.com","isActive":true,"tags":["developer","python"],"address":{"city":"San Francisco","zip":"94105"}}</textarea>
    <div class="error-msg" id="errorMsg"></div>
  </div>
  <div class="box">
    <h3>📤 JSON Schema <span class="size" id="outputSize">0 bytes</span></h3>
    <textarea id="schemaOutput" readonly placeholder='Schema will appear here...'></textarea>
    <div class="info-row">
      <div><span style="color:var(--accent);margin-right:1rem" id="stats"></span></div>
      <div class="btn-row" style="margin:0">
        <button class="btn btn-green" onclick="copySchema()">📋 Copy</button>
        <button class="btn btn-primary" onclick="downloadSchema()">💾 Download .json</button>
      </div>
    </div>
  </div>
</div>
</main>
<footer><p>my-automaton · Free JSON Schema Generator · <a href="/dev-tools.html">All Tools</a> · <a href="/api-docs.html">API Docs</a></p></footer>
<script>
const presets={
  user:'{"name":"John Doe","age":30,"email":"john@example.com","isActive":true,"tags":["developer","python"],"score":95.5}',
  product:'{"id":"prod_123","title":"Wireless Mouse","price":29.99,"inStock":true,"categories":["electronics","peripherals"],"rating":4.5,"reviews":128}',
  nested:'{"company":{"name":"Acme Inc","founded":2015,"departments":[{"name":"Engineering","headcount":42,"remote":true},{"name":"Marketing","headcount":12,"remote":false}]},"public":true}'
};

function loadPreset(k){
  document.getElementById('jsonInput').value=presets[k];
  generateSchema();
}

function inferType(val){
  if(val===null)return 'null';
  if(Array.isArray(val)){
    if(val.length===0)return 'array';
    return {type:'array',items:inferType(val[0])};
  }
  const t=typeof val;
  if(t==='object')return inferObject(val);
  if(t==='number')return Number.isInteger(val)?'integer':'number';
  return t;
}

function inferObject(obj){
  const props={};
  const required=[];
  for(const[k,v]of Object.entries(obj)){
    props[k]=inferType(v);
    required.push(k);
  }
  return {type:'object',properties:props,required};
}

function generateSchema(){
  const raw=document.getElementById('jsonInput').value.trim();
  document.getElementById('errorMsg').style.display='none';
  document.getElementById('inputSize').textContent=raw.length+' bytes';

  if(!raw){document.getElementById('schemaOutput').value='';return}

  let parsed;
  try{parsed=JSON.parse(raw)}catch(e){
    document.getElementById('errorMsg').textContent='Invalid JSON: '+e.message;
    document.getElementById('errorMsg').style.display='block';
    return;
  }

  const schema={
    $schema:'https://json-schema.org/draft-07/schema#',
    title:'Generated Schema',
    description:'Auto-generated from JSON input',
    ...(Array.isArray(parsed)?{type:'array',items:inferType(parsed[0]||{})}:inferType(parsed))
  };

  if(Array.isArray(parsed)&&parsed.length>0) schema.minItems=1;

  const output=JSON.stringify(schema,null,2);
  document.getElementById('schemaOutput').value=output;
  document.getElementById('outputSize').textContent=output.length+' bytes';
  
  const objKeys=Array.isArray(parsed)?(parsed[0]?Object.keys(parsed[0]).length:0):Object.keys(parsed).length;
  document.getElementById('stats').textContent=`${objKeys} fields · draft-07`;
}

function copySchema(){const s=document.getElementById('schemaOutput').value;if(s)navigator.clipboard.writeText(s)}
function downloadSchema(){
  const s=document.getElementById('schemaOutput').value;
  if(!s)return;
  const blob=new Blob([s],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='schema.json';a.click();
  URL.revokeObjectURL(url);
}

setTimeout(generateSchema,50);
</script>
