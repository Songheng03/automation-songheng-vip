<h1>⏰ Timestamp Converter</h1>
<p>Convert Unix timestamps (seconds since epoch) to readable dates.</p>
<div class="controls" style="flex-wrap:wrap">
<input type="text" id="timestamp" value="1719500000" placeholder="Enter Unix timestamp (seconds)" style="flex:1;min-width:200px">
<button class="btn btn-primary" onclick="convert()">⟳ Convert</button>
<button class="now-btn" onclick="document.getElementById('timestamp').value=Math.floor(Date.now()/1000);convert()">🕐 Now</button>
</div>
<div class="output-box" id="output"></div>
<div class="controls" style="gap:8px">
<button class="btn btn-secondary" onclick="convertFromDate()">📅 Date → Timestamp</button>
<input type="datetime-local" id="dateInput" style="background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#c9d1d9;padding:8px">
</div>
<script>
function convert(){const ts=document.getElementById('timestamp').value.trim();const out=document.getElementById('output');const num=parseInt(ts);if(isNaN(num)){out.innerHTML='<div style="color:#f85149">Invalid timestamp. Enter a number.</div>';return;}const d=new Date(num*1000);const utc=d.toUTCString();const local=d.toLocaleString();const iso=d.toISOString();const relative=Math.floor(Date.now()/1000)-num;const relStr=relative<0?`${Math.abs(relative)}s in the future`:relative<60?`${relative}s ago`:relative<3600?`${Math.floor(relative/60)}m ago`:relative<86400?`${Math.floor(relative/3600)}h ago`:relative<2592000?`${Math.floor(relative/86400)}d ago`:relative<31536000?`${Math.floor(relative/2592000)}mo ago`:`${Math.floor(relative/31536000)}y ago`;out.innerHTML=`<div class="row"><span class="label">Unix Timestamp</span><span class="value">${num}</span></div><div class="row"><span class="label">UTC</span><span class="value">${utc}</span></div><div class="row"><span class="label">Local</span><span class="value">${local}</span></div><div class="row"><span class="label">ISO 8601</span><span class="value" style="font-size:.8rem">${iso}</span></div><div class="row"><span class="label">Relative</span><span class="value">${relStr}</span></div>`;}
function convertFromDate(){const val=document.getElementById('dateInput').value;if(!val)return;const d=new Date(val);const ts=Math.floor(d.getTime()/1000);document.getElementById('timestamp').value=ts;convert();}
convert();
</script>
