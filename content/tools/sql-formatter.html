<body>
<div class="container">

</div>
</div>

<script>
const KEYWORDS=['SELECT','FROM','WHERE','AND','OR','NOT','IN','LIKE','BETWEEN','IS','NULL','AS','ON','JOIN','LEFT','RIGHT','INNER','OUTER','FULL','CROSS','GROUP','BY','ORDER','HAVING','LIMIT','OFFSET','UNION','ALL','DISTINCT','INSERT','INTO','VALUES','UPDATE','SET','DELETE','CREATE','TABLE','ALTER','DROP','INDEX','PRIMARY','KEY','FOREIGN','REFERENCES','CONSTRAINT','DEFAULT','CHECK','UNIQUE','VIEW','TRIGGER','PROCEDURE','FUNCTION','BEGIN','END','IF','THEN','ELSE','CASE','WHEN','EXISTS','ANY','SOME','ASC','DESC'];
const FUNCTIONS=['COUNT','SUM','AVG','MIN','MAX','COALESCE','NULLIF','CAST','CONVERT','DATE','YEAR','MONTH','DAY','HOUR','MINUTE','SECOND','NOW','CURRENT_TIMESTAMP','CONCAT','SUBSTRING','TRIM','UPPER','LOWER','LENGTH','ROUND','FLOOR','CEIL','ABS','POWER','SQRT'];

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function formatSQL(){
  const input=document.getElementById('input').value.trim();
  const output=document.getElementById('output');
  const uppercase=document.getElementById('uppercase').checked;
  
  if(!input){output.innerHTML='<span style="color:#f87171">Please paste a SQL query</span>';return}
  
  let sql=input;
  
  // Normalize whitespace
  sql=sql.replace(/\s+/g,' ').trim();
  
  // Add newlines before major keywords
  const majorKeywords=['SELECT','FROM','WHERE','GROUP BY','ORDER BY','HAVING','LIMIT','UNION','INSERT INTO','VALUES','UPDATE','SET','DELETE FROM','CREATE TABLE','ALTER TABLE','DROP TABLE'];
  majorKeywords.forEach(kw=>{
    const regex=new RegExp('\\b'+kw+'\\b','gi');
    sql=sql.replace(regex,'\n'+kw);
  });
  
  // Add newlines before JOIN
  sql=sql.replace(/\b(JOIN)\b/gi,'\n$1');
  
  // Add newlines before AND/OR in WHERE
  sql=sql.replace(/\b(AND|OR)\b(?=[^']*'(?:[^']*'[^']*')*[^']*$)/gi,'\n  $1');
  
  // Indent subqueries
  const lines=sql.split('\n');
  let indent=0;
  const formatted=lines.map(line=>{
    line=line.trim();
    if(!line)return '';
    
    if(line.match(/^\s*\)/))indent--;
    const result='  '.repeat(Math.max(0,indent))+line;
    if(line.match(/\(\s*$/))indent++;
    
    return result;
  }).filter(l=>l).join('\n');
  
  // Apply uppercase
  let result=uppercase?formatted.toUpperCase():formatted;
  
  // Syntax highlighting
  output.innerHTML=highlightSQL(result);
}

function minifySQL(){
  const input=document.getElementById('input').value.trim();
  const output=document.getElementById('output');
  
  if(!input){output.innerHTML='<span style="color:#f87171">Please paste a SQL query</span>';return}
  
  const minified=input.replace(/\s+/g,' ').trim();
  output.innerHTML=highlightSQL(minified);
}

function highlightSQL(sql){
  let html=escapeHtml(sql);
  
  // Comments
  html=html.replace(/(--[^\n]*)/g,'<span class="sql-comment">$1</span>');
  html=html.replace(/(\/\*[\s\S]*?\*\/)/g,'<span class="sql-comment">$1</span>');
  
  // Strings
  html=html.replace(/'([^']*)'/g,'<span class="sql-string">\'$1\'</span>');
  
  // Numbers
  html=html.replace(/\b(\d+(?:\.\d+)?)\b/g,'<span class="sql-number">$1</span>');
  
  // Functions
  FUNCTIONS.forEach(fn=>{
    const regex=new RegExp('\\b('+fn+')\\s*\\(','gi');
    html=html.replace(regex,'<span class="sql-function">$1</span>(');
  });
  
  // Keywords
  KEYWORDS.forEach(kw=>{
    const regex=new RegExp('\\b('+kw+')\\b','gi');
    html=html.replace(regex,'<span class="sql-keyword">$1</span>');
  });
  
  // Operators
  html=html.replace(/([=&lt;&gt;!]=?|[&lt;&gt;])/g,'<span class="sql-operator">$1</span>');
  
  return html;
}

function copyResult(){
  const text=document.getElementById('output').textContent;
  if(text==='Your formatted SQL will appear here...')return;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.querySelector('.btn-copy');
    btn.textContent='✓ Copied!';
    setTimeout(()=>{btn.textContent='📋 Copy Result'},2000);
  });
}

// Auto-format on load if there's input
if(document.getElementById('input').value)formatSQL();
</script>
