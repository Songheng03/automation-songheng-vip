<h1>🔤 Case Converter</h1>
<p>Convert text between different case formats. Paste text and click a format.</p>
<textarea id="input" placeholder="Paste text to convert...">my-automaton AI playground tools</textarea>
<div class="controls">
<button class="btn btn-primary" onclick="convertTo('upper')">UPPER CASE</button>
<button class="btn btn-secondary" onclick="convertTo('lower')">lower case</button>
<button class="btn btn-secondary" onclick="convertTo('title')">Title Case</button>
<button class="btn btn-secondary" onclick="convertTo('camel')">camelCase</button>
<button class="btn btn-secondary" onclick="convertTo('pascal')">PascalCase</button>
<button class="btn btn-secondary" onclick="convertTo('snake')">snake_case</button>
<button class="btn btn-secondary" onclick="convertTo('kebab')">kebab-case</button>
<button class="btn btn-secondary" onclick="convertTo('alternating')">aLtErNaTiNg</button>
</div>
<div class="output-box" id="output">Results appear here...</div>
<div class="controls"><span id="charCount" style="color:#8b949e;font-size:.8rem"></span><button class="copy-btn" onclick="copyOutput()">📋 Copy</button></div>
<script>
function convertTo(mode){const text=document.getElementById('input').value;if(!text){return;}let result;switch(mode){case 'upper':result=text.toUpperCase();break;case 'lower':result=text.toLowerCase();break;case 'title':result=text.replace(/\w\S*/g,w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase());break;case 'camel':result=text.replace(/[^a-zA-Z0-9]+(.)/g,(_,c)=>c.toUpperCase());result=result.charAt(0).toLowerCase()+result.slice(1);break;case 'pascal':result=text.replace(/[^a-zA-Z0-9]+(.)?/g,(_,c)=>c?c.toUpperCase():'');result=result.charAt(0).toUpperCase()+result.slice(1);break;case 'snake':result=text.replace(/[^a-zA-Z0-9]+/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'').toLowerCase();break;case 'kebab':result=text.replace(/[^a-zA-Z0-9]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'').toLowerCase();break;case 'alternating':result=text.split('').map((c,i)=>i%2===0?c.toLowerCase():c.toUpperCase()).join('');break;default:result=text;}document.getElementById('output').textContent=result;document.getElementById('charCount').textContent=`${result.length} chars`;}
function copyOutput(){const t=document.getElementById('output').textContent;if(!t||t==='Results appear here...')return;navigator.clipboard.writeText(t).then(()=>{const b=document.querySelector('.copy-btn');b.textContent='✓ Copied!';setTimeout(()=>b.textContent='📋 Copy',2000);});}
</script>
