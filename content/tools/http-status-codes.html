<script>
const codes=[[100,"Continue"],[101,"Switching Protocols"],[200,"OK"],[201,"Created"],[204,"No Content"],[301,"Moved Permanently"],[302,"Found"],[304,"Not Modified"],[400,"Bad Request"],[401,"Unauthorized"],[402,"Payment Required"],[403,"Forbidden"],[404,"Not Found"],[405,"Method Not Allowed"],[408,"Request Timeout"],[409,"Conflict"],[410,"Gone"],[429,"Too Many Requests"],[500,"Internal Server Error"],[502,"Bad Gateway"],[503,"Service Unavailable"],[504,"Gateway Timeout"]];
function render(list){document.getElementById('list').innerHTML=list.map(([c,n])=>'<div class="card"><div><span class="code">'+c+'</span> <strong>'+n+'</strong></div></div>').join('')}
render(codes);
function filter(){const q=document.getElementById('search').value.toLowerCase();render(codes.filter(([c,n])=>String(c)===q||n.toLowerCase().includes(q)))}
