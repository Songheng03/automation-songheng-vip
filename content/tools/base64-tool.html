<body>
  <div class="container">
    <header>
      <div class="breadcrumb"><a href="/">Home</a> / <a href="/tools">Tools</a> / Base64 Tool</div>
      <h1>Base64 Encoder / Decoder</h1>
      <p>Encode text to Base64 or decode Base64 back to plain text</p>
    </header>

    <div class="tool-area">
      <div class="mode-selector">
        <button class="mode-btn active" data-mode="encode" onclick="setMode('encode')">Encode</button>
        <button class="mode-btn" data-mode="decode" onclick="setMode('decode')">Decode</button>
      </div>

      <textarea id="inputText" placeholder="Type or paste text here...">Hello, World!</textarea>
      <div class="char-count" id="inputChars">13 characters</div>

      <div class="controls">
        <button class="btn-primary" onclick="processText()">⟳ Convert</button>
        <button class="swap-btn" onclick="swapIO()">⇅ Swap Input/Output</button>
        <button class="btn-secondary" onclick="document.getElementById('inputText').value='';document.getElementById('outputText').value='';updateCharCount()">Clear</button>
        <button class="btn-secondary" onclick="copyOutput()">📋 Copy</button>
      </div>

      <div class="output-area">
        <label>Output</label>
        <textarea id="outputText" placeholder="Result will appear here..." readonly></textarea>
        <div class="char-count" id="outputChars">0 characters</div>
        <div class="copy-notice" id="copyNotice">✓ Copied to clipboard</div>
      </div>
    </div>

    <footer>
      <p>my-automaton · <a href="/tools">Free Tools</a> · <a href="/api-docs">API</a> · <a href="/dashboard">Dashboard</a></p>
    </footer>
  </div>

  <script>
    let currentMode = 'encode';

    function setMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
      document.getElementById('inputText').placeholder = mode === 'encode' ? 'Type or paste text to encode...' : 'Paste Base64 string to decode...';
      processText();
    }

    function processText() {
      const input = document.getElementById('inputText').value;
      const output = document.getElementById('outputText');
      const outChars = document.getElementById('outputChars');
      
      try {
        if (currentMode === 'encode') {
          output.value = btoa(unescape(encodeURIComponent(input)));
        } else {
          output.value = decodeURIComponent(escape(atob(input.trim())));
        }
      } catch(e) {
        output.value = 'Error: ' + (currentMode === 'decode' ? 'Invalid Base64 string' : e.message);
      }
      
      outChars.textContent = output.value.length + ' characters';
      document.getElementById('copyNotice').style.display = 'none';
    }

    function swapIO() {
      const input = document.getElementById('inputText');
      const output = document.getElementById('outputText');
      const temp = input.value;
      input.value = output.value || input.value;
      output.value = '';
      updateCharCount();
    }

    function updateCharCount() {
      const input = document.getElementById('inputText');
      document.getElementById('inputChars').textContent = input.value.length + ' characters';
    }

    function copyOutput() {
      const output = document.getElementById('outputText');
      if (!output.value) return;
      navigator.clipboard.writeText(output.value).then(() => {
        const notice = document.getElementById('copyNotice');
        notice.style.display = 'block';
        setTimeout(() => notice.style.display = 'none', 2000);
      });
    }

    // Auto-process on input change
    document.getElementById('inputText').addEventListener('input', () => {
      updateCharCount();
      processText();
    });

    // Process on load
    processText();
  </script>
