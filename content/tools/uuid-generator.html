<script>
// ─── ID Generators ───
function uuidV4() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function uuidV7() {
  const now = Date.now();
  const hex = now.toString(16).padStart(12, '0');
  const rand1 = Math.random().toString(16).substring(2, 6);
  const ver = '7';
  const rand2 = (Math.random() * 16 | 0).toString(16);
  const vari = (8 + Math.random() * 4 | 0).toString(16);
  const rand3 = Math.random().toString(16).substring(2, 14);
  return `${hex.slice(0,8)}-${hex.slice(8,12)}-${ver}${rand1.slice(0,3)}-${vari}${rand2}-${rand3.slice(0,12)}`;
}

function ulid() {
  const chars = '0123456789ABCDEFGHJKMNPQRSTVWXYZ';
  const time = Date.now().toString(32).toUpperCase().padStart(10, '0');
  let random = '';
  for (let i = 0; i < 16; i++) random += chars[Math.random() * chars.length | 0];
  return time + random;
}

function nanoid(length = 21) {
  const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz_-';
  let id = '';
  for (let i = 0; i < length; i++) id += chars[Math.random() * chars.length | 0];
  return id;
}

function randomString(length = 16) {
  const chars = '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
  let result = '';
  for (let i = 0; i < length; i++) result += chars[Math.random() * chars.length | 0];
  return result;
}

function cuid() {
  const letter = 'abcdefghijklmnopqrstuvwxyz';
  const c = letter[Math.random() * letter.length | 0];
  const ts = Date.now().toString(36);
  const counter = Math.random().toString(36).substring(2, 6);
  const rand = Math.random().toString(36).substring(2, 6);
  return `c${ts}${counter}${rand}${c}`;
}

// ─── Format ───
function applyFormat(id, opts) {
  if (opts.uppercase) id = id.toUpperCase();
  if (!opts.hyphens && id.includes('-')) id = id.replace(/-/g, '');
  if (opts.prefix && !id.startsWith(opts.prefix)) id = opts.prefix + id;
  return id;
}

// ─── Generate ───
function generate() {
  const type = document.querySelector('.type-btn.active')?.dataset.type || 'uuid-v4';
  const count = Math.min(100, Math.max(1, parseInt(document.getElementById('count').value) || 1));
  const opts = {
    uppercase: document.getElementById('uppercase').checked,
    hyphens: document.getElementById('hyphens').checked,
    prefix: document.getElementById('prefix').value || '',
    length: parseInt(document.getElementById('length').value) || 21
  };

  const generators = {
    'uuid-v4': uuidV4,
    'uuid-v7': uuidV7,
    'ulid': ulid,
    'nanoid': () => nanoid(opts.length),
    'random': () => randomString(opts.length),
    'cuid': cuid
  };

  const gen = generators[type] || uuidV4;
  const results = [];
  for (let i = 0; i < count; i++) results.push(applyFormat(gen(), opts));

  document.getElementById('output').value = results.join('\n');
  document.getElementById('resultCount').textContent = results.length;
}

function copyAll() {
  const text = document.getElementById('output').value;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const msg = document.getElementById('copyMsg');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 1500);
  });
}

function download() {
  const text = document.getElementById('output').value;
  if (!text) return;
  const blob = new Blob([text], {type: 'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ids-${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
}

// ─── Type selector ───
document.querySelectorAll('.type-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const type = btn.dataset.type;
    document.getElementById('lengthOpt').style.display = ['nanoid','random'].includes(type) ? 'flex' : 'none';
    document.getElementById('prefixOpt').style.display = 'flex';
    generate();
  });
});

// ─── Auto-generate on load ───
document.addEventListener('DOMContentLoaded', generate);
['count','uppercase','hyphens','length','prefix'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('change', generate);
});
</script>
