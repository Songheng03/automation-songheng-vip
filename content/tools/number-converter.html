<h1>🔢 Number Base Converter</h1>
<p>Convert between binary, decimal, hex, octal, and ASCII character codes.</p>
<div class="controls">
<select id="inputBase"><option value="10">Decimal</option><option value="16">Hex</option><option value="2">Binary</option><option value="8">Octal</option></select>
<input type="text" id="input" value="255" placeholder="Enter number" style="flex:1">
<button class="btn btn-primary" onclick="convert()">⟳ Convert</button>
</div>
<div class="grid">
<div class="card"><div class="label">🔢 Decimal</div><div class="value clickable" id="dec" onclick="copyVal('dec')">255</div></div>
<div class="card"><div class="label">🔤 Hex</div><div class="value clickable" id="hex" onclick="copyVal('hex')">FF</div></div>
<div class="card"><div class="label">⚡ Binary</div><div class="value clickable" style="font-size:.8rem" id="bin" onclick="copyVal('bin')">11111111</div></div>
<div class="card"><div class="label">🔮 Octal</div><div class="value clickable" id="oct" onclick="copyVal('oct')">377</div></div>
</div>
<div class="card" style="margin-top:8px"><div class="label">ASCII / Unicode Character</div><div class="value clickable" style="font-size:2rem" id="char" onclick="copyVal('char')">ÿ</div></div>
<script>
function convert(){const v=document.getElementById('input').value.trim();const base=parseInt(document.getElementById('inputBase').value);if(!v)return;let num;try{num=parseInt(v,base);if(isNaN(num))throw new Error;}catch{document.getElementById('input').style.borderColor='#da3633';setTimeout(()=>document.getElementById('input').style.borderColor='#30363d',1500);return;}document.getElementById('dec').textContent=num.toString(10);document.getElementById('hex').textContent=num.toString(16).toUpperCase();document.getElementById('bin').textContent=num.toString(2);document.getElementById('oct').textContent=num.toString(8);document.getElementById('char').textContent=num>=32&&num<=0x10FFFF?String.fromCodePoint(num):'⛔ (non-printable)';}
function copyVal(id){const val=document.getElementById(id).textContent;if(!val||val.startsWith('⛔'))return;navigator.clipboard.writeText(val).then(()=>{document.getElementById(id).style.color='#3fb950';setTimeout(()=>document.getElementById(id).style.color='#f0f6fc',1000);});}
document.getElementById('input').addEventListener('input',convert);
document.getElementById('inputBase').addEventListener('change',convert);
convert();
</script>
