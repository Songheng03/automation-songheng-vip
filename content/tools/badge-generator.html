function gen(){const l=encodeURIComponent(document.getElementById('label').value),s=encodeURIComponent(document.getElementById('score').value),c=document.getElementById('color').value,u='https://img.shields.io/badge/'+l+'-'+s+'%25-'+c+'?style=flat-square';document.getElementById('preview').innerHTML='<img src="'+u+'">',document.getElementById('md').textContent='!['+l+']('+u+')',document.getElementById('htmlOut').textContent='<img src="'+u+'" alt="'++'">'}
