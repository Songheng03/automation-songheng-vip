<div class="container">
  <h1>🔗 URL Encoder / Decoder</h1>
  <p class="subtitle">Percent-encode or decode URL strings. Instant conversion as you type.</p>

  <div class="card">
    <label for="input-text">Input</label>
    <textarea id="input-text" placeholder="Type or paste text here..." oninput="autoConvert()">https://example.com/path?query=hello world&name=John Doe</textarea>
  </div>

  <div class="flex">
    <button class="btn" onclick="encode()">⬆️ Encode</button>
    <button class="btn-secondary" onclick="decode()">⬇️ Decode</button>
    <button class="btn-secondary" onclick="document.getElementById('input-text').value='';document.getElementById('output-text').value='';">🗑️ Clear</button>
    <button class="btn-secondary" onclick="copyResult()">📋 Copy Result</button>
  </div>

  <div class="card">
    <label for="output-text">Result <span id="copy-msg" class="copy-msg"></span></label>
    <textarea id="output-text" readonly placeholder="Result will appear here..." style="min-height:80px;"></textarea>
  </div>

  <div class="card">
    <label>Quick Examples</label>
    <div style="display:flex; gap:8px; flex-wrap:wrap;">
      <button class="btn-secondary" onclick="setExample('encode','hello world & foo="bar"')">Encode: hello world</button>
      <button class="btn-secondary" onclick="setExample('decode','hello%20world%20%26%20foo%3D%22bar%22')">Decode: %20</button>
      <button class="btn-secondary" onclick="setExample('encode','https://example.com?a=1&b=2&c=hello there')">Encode URL</button>
      <button class="btn-secondary" onclick="setExample('encode','email+password@example.com?subject=hello world')">Encode Email URL</button>
    </div>
  </div>
</div>
<script>
function autoConvert() { /* Manual only */ }
function encode() {
  const input = document.getElementById('input-text').value;
  document.getElementById('output-text').value = encodeURIComponent(input);
}
function decode() {
  const input = document.getElementById('input-text').value;
  try { document.getElementById('output-text').value = decodeURIComponent(input); }
  catch(e) { document.getElementById('output-text').value = 'Error: Invalid URL encoding'; }
}
function copyResult() {
  const text = document.getElementById('output-text').value;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('copy-msg').textContent = '✓ Copied!';
    setTimeout(() => document.getElementById('copy-msg').textContent='', 2000);
  });
}
function setExample(action, text) {
  document.getElementById('input-text').value = text;
  if (action === 'encode') encode(); else decode();
}
</script>
