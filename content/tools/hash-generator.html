<h1>🔐 Hash Generator</h1>
<p>Generate cryptographic hashes from text. Supports MD5, SHA-1, SHA-256, SHA-512.</p>
<textarea id="input" placeholder="Type text to hash...">Hello, World!</textarea>
<div class="controls">
<button class="btn btn-primary" onclick="generateHashes()">🔐 Generate Hashes</button>

</div>
<div class="hash-grid" id="results"></div>
<script>
async function generateHashes(){const input=document.getElementById('input').value;if(!input)return;const enc=new TextEncoder();const data=enc.encode(input);const grid=document.getElementById('results');const algos=[{name:'MD5',algo:'MD5',fn:async(d)=>{const hash=await crypto.subtle.digest('SHA-256',d);const md5=await md5Hash(d);return md5}},{name:'SHA-1',algo:'SHA-1',fn:async(d)=>bytesToHex(await crypto.subtle.digest('SHA-1',d))},{name:'SHA-256',algo:'SHA-256',fn:async(d)=>bytesToHex(await crypto.subtle.digest('SHA-256',d))},{name:'SHA-512',algo:'SHA-512',fn:async(d)=>bytesToHex(await crypto.subtle.digest('SHA-512',d))}];let html='';for(const algo of algos){let hash;try{if(algo.name==='MD5'){hash=await md5Hash(data);}else{hash=bytesToHex(await crypto.subtle.digest(algo.algo,data));}}catch(e){hash='Error: '+e.message;}html+=`<div class="hash-row"><span class="hash-label">${algo.name}</span><span class="hash-value" onclick="copyText(this)" title="Click to copy">${hash}</span></div>`;}grid.innerHTML=html;}
function md5Hash(data){const hexChars='0123456789abcdef';const bytes=Array.from(new Uint8Array(data));let s=[],k=[];for(let i=0;i<64;i++)k[i]=Math.floor(Math.abs(Math.sin(i+1))*4294967296)&0xffffffff;const append=bytes.concat(128);for(let i=bytes.length+9;i%64!==0;i++)append.push(0);const lenBits=bytes.length*8;for(let i=0;i<8;i++)append.push((lenBits>>>i*8)&0xff);const chunks=[];for(let i=0;i<append.length;i+=64){const chunk=append.slice(i,i+64);const w=[];for(let j=0;j<16;j++){w[j]=chunk[j*4]|(chunk[j*4+1]<<8)|(chunk[j*4+2]<<16)|(chunk[j*4+3]<<24);}let a=0x67452301,b=0xefcdab89,c=0x98badcfe,d=0x10325476;for(let j=0;j<64;j++){let f,g;if(j<16){f=(b&c)|(~b&d);g=j;}else if(j<32){f=(d&b)|(~d&c);g=(5*j+1)%16;}else if(j<48){f=b^c^d;g=(3*j+5)%16;}else{f=c^(b|~d);g=(7*j)%16;}const temp=d;d=c;c=b;b=((a+f+k[j]+w[g])<<(s[j]||0)|(a+f+k[j]+w[g])>>>(32-(s[j]||0)))+b &0xffffffff>>>0;a=temp;}s=[0x67452301,0xefcdab89,0x98badcfe,0x10325476].map((v,i)=>[(v+a),(v+b),(v+c),(v+d)][i]);}return s.map(v=>v.toString(16).padStart(8,'0')).join('');}
function bytesToHex(buf){const bytes=new Uint8Array(buf);return Array.from(bytes).map(b=>b.toString(16).padStart(2,'0')).join('');}
function copyText(el){navigator.clipboard.writeText(el.textContent).then(()=>{el.textContent='✓ Copied!';setTimeout(()=>generateHashes(),1500);});}
function clearAll(){document.getElementById('input').value='';document.getElementById('results').innerHTML='';}
</script>
