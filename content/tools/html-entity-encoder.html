<h1>&amp; HTML Entity Encoder / Decoder</h1>
<p>Convert special characters to HTML entities and decode entities back to readable text.</p>
<textarea id="input" placeholder="Paste text with HTML entities or special chars..."><div class="header">Hello & Welcome</div></textarea>
<div class="controls">
<button class="btn btn-primary" onclick="encode()">🔒 Encode Entities</button>
<button class="btn btn-secondary" onclick="decode()">🔓 Decode Entities</button>
<button class="btn btn-secondary" onclick="clearAll()">Clear</button>
</div>
<div class="output-box" id="output">Results...</div>
<div class="controls"><button class="copy-btn" onclick="copyOutput()">📋 Copy</button><span id="info" style="color:#8b949e;font-size:.8rem"></span></div>
<script>
const ENTITY_MAP={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','/':'&#x2F;','`':'&#x60;','=':'&#x3D;','©':'&copy;','®':'&reg;','™':'&trade;','€':'&euro;','£':'&pound;','¥':'&yen;','→':'&rarr;','←':'&larr;','•':'&bull;','✓':'&check;','✗':'&cross;'};
function encode(){let text=document.getElementById('input').value;let result='';for(const ch of text){result+=ENTITY_MAP[ch]||ch;}document.getElementById('output').textContent=result;document.getElementById('info').textContent=`${text.length} → ${result.length} chars`;}
function decode(){let text=document.getElementById('input').value;const el=document.createElement('div');el.innerHTML=text;document.getElementById('output').textContent=el.textContent||el.innerText||'';document.getElementById('info').textContent='✓ Decoded';}
function clearAll(){document.getElementById('input').value='';document.getElementById('output').textContent='Results...';document.getElementById('info').textContent='';}
function copyOutput(){const t=document.getElementById('output').textContent;if(!t||t==='Results...')return;navigator.clipboard.writeText(t).then(()=>{const b=document.querySelector('.copy-btn');b.textContent='✓ Copied!';setTimeout(()=>b.textContent='📋 Copy',2000);});}
</script>
