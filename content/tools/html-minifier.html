<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;padding:20px;min-height:100vh}
.container{max-width:1400px;margin:0 auto}

.card{background:#1e293b;border-radius:12px;padding:24px;margin-bottom:20px}
label{display:block;font-weight:600;margin-bottom:8px;color:#38bdf8}
textarea{background:#0f172a;border:2px solid #334155;border-radius:8px;padding:12px;color:#e2e8f0;font-size:13px;width:100%;font-family:'Fira Code',monospace;resize:vertical;min-height:250px}
textarea:focus{outline:none;border-color:#38bdf8}

button{background:#38bdf8;color:#0f172a;border:none;padding:14px 28px;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;width:100%;margin-top:12px}
button:hover{background:#7dd3fc}

.btn-copy:hover{background:#86efac}
.options{display:flex;flex-wrap:wrap;gap:12px;margin:12px 0}
.option{display:flex;align-items:center;gap:6px}
.option input{width:auto}
.option label{margin:0;font-weight:400;font-size:14px}
.stats{display:flex;gap:20px;margin-top:16px}
.stat{background:#0f172a;padding:12px 20px;border-radius:8px;text-align:center;flex:1}
.stat-num{font-size:24px;font-weight:700;color:#38bdf8}
.stat-label{font-size:12px;color:#94a3b8}
.savings{color:#4ade80;font-size:24px;font-weight:700}
.cta{background:#1e293b;border-radius:12px;padding:20px;margin-top:30px;text-align:center;border:2px solid #38bdf8}
.cta h3{color:#38bdf8;margin-bottom:10px}
.cta a{color:#fbbf24;text-decoration:none;font-weight:600}
@media(max-width:768px){.row{grid-template-columns:1fr}}

<body>
<div class="container">
<h1>📦 HTML Minifier</h1>
<p class="subtitle">Compress HTML by removing whitespace, comments, and redundant code</p>

<div class="card">
<label>Paste your HTML:</label>
<textarea id="input" placeholder="<!DOCTYPE html>
<html>
<head>
  <title>My Page</title>
</head>
<body>
  <!-- This is a comment -->
  <h1>Hello World</h1>
</body>
</html>"></textarea>

<div class="options">
<div class="option">
<input type="checkbox" id="removeComments" checked>
<label for="removeComments">Remove comments</label>
</div>
<div class="option">
<input type="checkbox" id="removeWhitespace" checked>
<label for="removeWhitespace">Collapse whitespace</label>
</div>
<div class="option">
<input type="checkbox" id="removeEmptyAttrs">
<label for="removeEmptyAttrs">Remove empty attributes</label>
</div>
<div class="option">
<input type="checkbox" id="removeQuotes">
<label for="removeQuotes">Remove optional quotes</label>
</div>
</div>

<button onclick="minify()">📦 Minify HTML</button>
</div>

<div class="card">
<div class="row">
<div>
<label>Original:</label>
<textarea id="original" readonly></textarea>
</div>
<div>
<label>Minified:</label>
<textarea id="output" readonly></textarea>
</div>
</div>
<div class="stats" id="stats" style="display:none">
<div class="stat"><div class="stat-num" id="orig-size">0</div><div class="stat-label">Original (bytes)</div></div>
<div class="stat"><div class="stat-num" id="min-size">0</div><div class="stat-label">Minified (bytes)</div></div>
<div class="stat"><div class="savings" id="savings">0%</div><div class="stat-label">Saved</div></div>
</div>
<button class="btn-copy" onclick="copyResult()">📋 Copy Minified HTML</button>
</div>

<div class="cta">
<h3>Need Security Scanning?</h3>
<p>Get AI-powered vulnerability detection for your code.</p>
<p style="margin-top:12px"><a href="/api-playground">Try API Playground →</a></p>
</div>
</div>

<script>
function minify(){
  const input=document.getElementById('input').value;
  const original=document.getElementById('original');
  const output=document.getElementById('output');
  const stats=document.getElementById('stats');
  
  original.value=input;
  
  let result=input;
  
  if(document.getElementById('removeComments').checked){
    result=result.replace(/<!--[\s\S]*?-->/g,'');
  }
  
  if(document.getElementById('removeWhitespace').checked){
    result=result.replace(/\s+/g,' ');
    result=result.replace(/>\s+</g,'><');
    result=result.trim();
  }
  
  if(document.getElementById('removeEmptyAttrs').checked){
    result=result.replace(/\s+(id|class|style|name|value|alt|title)=""\s*/gi,' ');
  }
  
  if(document.getElementById('removeQuotes').checked){
    result=result.replace(/="([a-zA-Z0-9_-]+)"/g,'=$1');
  }
  
  output.value=result;
  
  const origSize=new Blob([input]).size;
  const minSize=new Blob([result]).size;
  const saved=origSize>0?Math.round((1-minSize/origSize)*100):0;
  
  stats.style.display='flex';
  document.getElementById('orig-size').textContent=origSize;
  document.getElementById('min-size').textContent=minSize;
  document.getElementById('savings').textContent=saved+'%';
}

function copyResult(){
  const text=document.getElementById('output').value;
  if(!text)return;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.querySelector('.btn-copy');
    btn.textContent='✓ Copied!';
    setTimeout(()=>{btn.textContent='📋 Copy Minified HTML'},2000);
  });
}
</script>
</body>
