<script>
function markdownToHTML(md){
  let html=md;
  
  // Headings
  html=html.replace(/^### (.*$)/gim,'<h3>$1</h3>');
  html=html.replace(/^## (.*$)/gim,'<h2>$1</h2>');
  html=html.replace(/^# (.*$)/gim,'<h1>$1</h1>');
  
  // Bold and italic
  html=html.replace(/\*\*\*(.*?)\*\*\*/g,'<strong><em>$1</em></strong>');
  html=html.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  html=html.replace(/\*(.*?)\*/g,'<em>$1</em>');
  
  // Code blocks
  html=html.replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>');
  
  // Inline code
  html=html.replace(/`(.*?)`/g,'<code>$1</code>');
  
  // Links
  html=html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');
  
  // Images
  html=html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">');
  
  // Blockquotes
  html=html.replace(/^> (.*$)/gim,'<blockquote>$1</blockquote>');
  
  // Unordered lists
  html=html.replace(/^\- (.*$)/gim,'<li>$1</li>');
  html=html.replace(/^\* (.*$)/gim,'<li>$1</li>');
  html=html.replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>');
  
  // Ordered lists
  html=html.replace(/^\d+\. (.*$)/gim,'<li>$1</li>');
  
  // Paragraphs
  html=html.replace(/\n\n/g,'</p><p>');
  html='<p>'+html+'</p>';
  html=html.replace(/<p><\/p>/g,'');
  html=html.replace(/<p>(<h[1-6]>)/g,'$1');
  html=html.replace(/(<\/h[1-6]>)<\/p>/g,'$1');
  html=html.replace(/<p>(<ul>)/g,'$1');
  html=html.replace(/(<\/ul>)<\/p>/g,'$1');
  html=html.replace(/<p>(<pre>)/g,'$1');
  html=html.replace(/(<\/pre>)<\/p>/g,'$1');
  html=html.replace(/<p>(<blockquote>)/g,'$1');
  html=html.replace(/(<\/blockquote>)<\/p>/g,'$1');
  
  return html;
}

function updatePreview(){
  const md=document.getElementById('markdown').value;
  document.getElementById('preview').innerHTML=markdownToHTML(md);
}

function showHTML(){
  const md=document.getElementById('markdown').value;
  const html=markdownToHTML(md);
  document.getElementById('htmlOutput').textContent=html;
}

function copyHTML(){
  const md=document.getElementById('markdown').value;
  const html=markdownToHTML(md);
  navigator.clipboard.writeText(html).then(()=>{
    const btn=document.querySelector('.btn-copy');
    btn.textContent='✓ Copied!';
    setTimeout(()=>{btn.textContent='📋 Copy HTML'},2000);
  });
}

document.getElementById('markdown').addEventListener('input',updatePreview);
updatePreview();
</script>
