*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;padding:20px}h1{text-align:center;margin:20px 0;font-size:2em;background:linear-gradient(135deg,#58a6ff,#bc8cff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.container{max-width:1200px;margin:0 auto}.editor-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:20px 0}textarea{width:100%;height:300px;background:#161b22;color:#c9d1d9;border:1px solid #30363d;border-radius:8px;padding:15px;font-family:monospace;font-size:14px;resize:vertical}textarea:focus{outline:none;border-color:#58a6ff}.btn-row{display:flex;gap:10px;justify-content:center;margin:15px 0;flex-wrap:wrap}button{padding:10px 24px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}.btn-primary{background:#238636;color:#fff}.btn-primary:hover{background:#2ea043}.btn-secondary{background:#30363d;color:#c9d1d9}.btn-secondary:hover{background:#484f58}#result{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:15px;min-height:300px;white-space:pre-wrap;font-family:monospace;font-size:14px;overflow:auto}.valid{border-color:#238636!important}.invalid{border-color:#f85149!important}.error-msg{color:#f85149;font-weight:bold;margin:10px 0}.success-msg{color:#3fb950;font-weight:bold;margin:10px 0}.stats{display:flex;gap:20px;justify-content:center;margin:10px 0;font-size:13px;color:#8b949e}footer{text-align:center;margin-top:40px;padding:20px;color:#8b949e;font-size:13px}footer a{color:#58a6ff;text-decoration:none}

<body>
<h1>📋 YAML Validator & Formatter</h1>

<script>
function parseYAML(s){if(typeof jsyaml!=='undefined')return{ok:true,data:jsyaml.load(s)};try{const r=simpleParse(s);return{ok:true,data:r}}catch(e){return{ok:false,error:e.message}}}
function simpleParse(s){const lines=s.split('\n'),root={};let stack=[{indent:-1,obj:root}];for(let i=0;i<lines.length;i++){const line=lines[i],trimmed=line.trim();if(!trimmed||trimmed.startsWith('#'))continue;const indent=line.search(/\S/);const m=trimmed.match(/^(\w[\w\s-]*?):\s*(.*)/);if(m){while(stack.length>1&&stack[stack.length-1].indent>=indent)stack.pop();const key=m[1].trim(),val=m[2].trim();const parent=stack[stack.length-1].obj;if(!val){parent[key]={};stack.push({indent,obj:parent[key]})}else if(val.startsWith('[')&&val.endsWith(']')){parent[key]=val.slice(1,-1).split(',').map(x=>x.trim().replace(/^['"]|['"]$/g,''))}else{const n=Number(val);parent[key]=isNaN(n)?val.replace(/^['"]|['"]$/g,''):n}}else if(trimmed.startsWith('- ')){while(stack.length>1&&stack[stack.length-1].indent>=indent)stack.pop();const parent=stack[stack.length-1].obj;const lastKey=Object.keys(parent).pop();if(lastKey&&!Array.isArray(parent[lastKey]))parent[lastKey]=[];const arr=Array.isArray(parent[lastKey])?parent[lastKey]:null;if(arr){const v=trimmed.slice(2).trim();const n=Number(v);arr.push(isNaN(n)?v.replace(/^['"]|['"]$/g,''):n)}}}return root}
function validate(){const input=document.getElementById('input').value,result=document.getElementById('result'),stats=document.getElementById('stats');if(!input.trim()){result.innerHTML='<span class="error-msg">Please enter YAML</span>';return}const lines=input.split('\n'),errors=[];lines.forEach((line,i)=>{if(line.includes('\t'))errors.push(`Line ${i+1}: Contains tab character`);const colonIdx=line.indexOf(':');if(colonIdx>0&&line[colonIdx+1]!==' '&&line[colonIdx+1]!=='\n'&&line.trim().length>colonIdx+1&&!line.trim().startsWith('-')&&!line.trim().startsWith('#')){const rest=line.slice(colonIdx+1).trim();if(rest&&!rest.startsWith('['))errors.push(`Line ${i+1}: Missing space after colon`)}});if(errors.length===0){result.innerHTML='<span class="success-msg">✅ YAML is valid!</span>';result.className='valid';stats.innerHTML=`<span>Lines: ${lines.length}</span><span>Size: ${new Blob([input]).size} bytes</span>`}else{result.innerHTML='<span class="error-msg">❌ Found '+errors.length+' issue(s):</span>\n'+errors.join('\n');result.className='invalid';stats.innerHTML=`<span>Errors: ${errors.length}</span>`}}
function format(){const input=document.getElementById('input').value,result=document.getElementById('result');try{const parsed=simpleParse(input);result.textContent=jsyaml?jsyaml.dump(parsed,{indent:2}):JSON.stringify(parsed,null,2);result.className='valid'}catch(e){result.innerHTML='<span class="error-msg">'+e.message+'</span>';result.className='invalid'}}
function toJSON(){const input=document.getElementById('input').value,result=document.getElementById('result');try{const parsed=simpleParse(input);result.textContent=JSON.stringify(parsed,null,2);result.className='valid'}catch(e){result.innerHTML='<span class="error-msg">'+e.message+'</span>';result.className='invalid'}}
function copyOutput(){navigator.clipboard.writeText(document.getElementById('result').textContent);document.getElementById('stats').innerHTML='<span style="color:#3fb950">✅ Copied!</span>'}
function loadSample(){document.getElementById('input').value=`# Application Configuration
app:
  name: my-web-app
  version: 2.1.0
  port: 3000
  debug: false

database:
  host: localhost
  port: 5432
  name: mydb
  pool_size: 10

features:
  - authentication
  - caching
  - rate-limiting

logging:
  level: info
  format: json
  output: [stdout, file]`}
</script>
