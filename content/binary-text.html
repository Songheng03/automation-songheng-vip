<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binary to Text Converter — Binary Translator Online | my-automaton</title>
<meta name="description" content="Convert text to binary and binary to text instantly. 8-bit ASCII encoding, bidirectional translation. Free, client-side, no signup.">
<meta name="keywords" content="binary to text, text to binary, binary converter, binary translator, binary code, 8 bit binary, ascii binary">
<style>
:root{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--accent:#38bdf8;--green:#4ade80;--border:#334155}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--card);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem}
header h1{font-size:1.25rem;color:var(--accent)}
nav a{color:var(--muted);text-decoration:none;margin-left:1rem;font-size:0.875rem}
nav a:hover{color:var(--accent)}
.promo-bar{background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;text-align:center;padding:0.5rem;font-size:0.85rem}
.promo-bar a{color:#fbbf24;font-weight:600}
main{max-width:950px;margin:2rem auto;padding:0 1rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem}
.card h2{font-size:1.1rem;margin-bottom:1rem;color:var(--accent)}
.io-row{display:flex;gap:1rem;flex-wrap:wrap}
.io-box{flex:1;min-width:300px}
.io-box label{display:block;font-size:0.8rem;color:var(--muted);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.05em}
textarea{width:100%;min-height:160px;background:#0f172a;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:1rem;font-family:'Fira Code',monospace;font-size:0.85rem;resize:vertical}
textarea:focus{outline:none;border-color:var(--accent)}
.btn-row{display:flex;gap:0.75rem;flex-wrap:wrap;margin:1rem 0;justify-content:center}
.btn{padding:0.65rem 1.25rem;border:none;border-radius:8px;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-primary{background:var(--accent);color:#0f172a}
.btn-primary:hover{filter:brightness(1.1)}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-secondary:hover{background:#475569}
.btn-green{background:var(--green);color:#0f172a}
.btn-green:hover{filter:brightness(1.1)}
.ref-table{overflow-x:auto;margin-top:1rem}
.ref-table table{width:100%;border-collapse:collapse;font-size:0.8rem}
.ref-table th{background:var(--border);padding:0.4rem 0.6rem;text-align:left;color:var(--accent);font-size:0.75rem}
.ref-table td{padding:0.3rem 0.6rem;border-bottom:1px solid #1a2332;font-family:'Fira Code',monospace}
footer{text-align:center;padding:2rem;color:var(--muted);font-size:0.8rem;border-top:1px solid var(--border);margin-top:2rem}
footer a{color:var(--accent)}
</style>
</head>
<body>
<header>
<h1>🚀 Binary ↔ Text Converter</h1>
<nav><a href="/">Home</a><a href="/api-docs.html">API</a><a href="/dev-tools.html">All Tools</a><a href="/blog.html">Blog</a></nav>
</header>
<div class="promo-bar">🚀 Need AI code analysis? Try our <a href="/api-docs.html">paid API</a>.</div>
<main>
<div class="card">
<h2>Convert</h2>
<div class="io-row">
<div class="io-box"><label>Text</label><textarea id="textIn" placeholder="Enter text..." oninput="textToBin()"></textarea></div>
<div class="io-box"><label>Binary (8-bit, space separated)</label><textarea id="binIn" placeholder="01001000 01100101 01101100..." oninput="binToText()"></textarea></div>
</div>
<div class="btn-row">
<button class="btn btn-primary" onclick="textToBin()">Text → Binary</button>
<button class="btn btn-secondary" onclick="binToText()">Binary → Text</button>
<button class="btn btn-secondary" onclick="swapAll()">🔄 Swap</button>
<button class="btn btn-green" onclick="copyBin()">📋 Copy Binary</button>
<button class="btn btn-secondary" onclick="clearBoth()">🗑 Clear</button>
</div>
</div>
<div class="card">
<h2>📖 Binary Reference</h2>
<div class="ref-table"><table id="refTable"></table></div>
</div>
</main>
<footer><p>my-automaton · <a href="/">Home</a> · <a href="/dev-tools.html">All Tools</a></p></footer>
<script>
function textToBin(){
  const t=document.getElementById('textIn').value;
  if(!t) return;
  document.getElementById('binIn').value=Array.from(t).map(c=>c.charCodeAt(0).toString(2).padStart(8,'0')).join(' ');
}
function binToText(){
  const b=document.getElementById('binIn').value.trim();
  if(!b) return;
  try{
    document.getElementById('textIn').value=b.split(/\s+/).filter(Boolean).map(byte=>String.fromCharCode(parseInt(byte,2))).join('');
  }catch(e){ document.getElementById('textIn').value='Invalid binary input'; }
}
function swapAll(){const t=document.getElementById('textIn'),b=document.getElementById('binIn');[t.value,b.value]=[b.value,t.value]}
function copyBin(){const t=document.getElementById('binIn').value;if(t)navigator.clipboard.writeText(t).then(()=>{
  const btn=document.querySelector('.btn-green');btn.textContent='✅ Copied!';setTimeout(()=>btn.textContent='📋 Copy Binary',1500);})}
function clearBoth(){document.getElementById('textIn').value='';document.getElementById('binIn').value=''}
// Build reference table
(function(){
  const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 .,!?@#$%^&*()-_=+[]{}|;:\'\"<>/`~';
  const rows=chars.split('').map(c=>`<tr><td>${c}</td><td>${c.charCodeAt(0)}</td><td>${c.charCodeAt(0).toString(2).padStart(8,'0')}</td></tr>`).join('');
  document.getElementById('refTable').innerHTML=`<thead><tr><th>Char</th><th>ASCII</th><th>Binary</th></tr></thead><tbody>${rows}</tbody>`;
})();
</script>
<script src="/conversion-banner.js" defer></script>
</body>
</html>
