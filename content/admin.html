<body>
<div style="background:#161b22;border-bottom:1px solid #30363d;padding:10px 20px;font-size:.85rem;display:flex;gap:16px;align-items:center;flex-wrap:wrap"><a href="/" style="color:#58a6ff;text-decoration:none;font-weight:600">🏠 Home</a><span style="color:#484f58">|</span><a href="/pricing.html" style="color:#8b949e;text-decoration:none">Pricing</a><a href="/api-docs.html" style="color:#8b949e;text-decoration:none">API</a><a href="/playground.html" style="color:#8b949e;text-decoration:none">Playground</a></div>

<h1>🔧 Gateway Admin</h1>
<p>Wallet: <code>0x76eADdEBFfb6a61DD071f97F4508467fc55dd113</code></p>
<p>Chain: Base · USDC · x402 micropayments</p>

<div class="grid">
  <div class="card"><h3>Total Requests</h3><div class="stat" id="total">-</div></div>
  <div class="card"><h3>Premium Calls</h3><div class="stat" id="premium">-</div></div>
  <div class="card"><h3>Free Calls</h3><div class="stat" id="free">-</div></div>
  <div class="card"><h3>Payments</h3><div class="stat" id="payments">-</div></div>
</div>

<div class="card">
  <h3>Actions</h3>
  <button onclick="pingIndexNow()">📡 Ping IndexNow</button>
  <button onclick="rebuildSitemap()">🗺️ Rebuild Sitemap</button>
  <button onclick="refreshStats()">🔄 Refresh Stats</button>
  <div id="result"></div>
</div>

<div class="card">
  <h3>Traffic by Path</h3>
  <div id="byPath"></div>
</div>

<script>
async function refreshStats(){
  const r=await fetch('/api/stats/overview');
  const d=await r.json();
  document.getElementById('total').textContent=d.total||0;
  document.getElementById('premium').textContent=d.premium||0;
  document.getElementById('free').textContent=d.free||0;
  document.getElementById('payments').textContent=d.payments||0;
  const bp=document.getElementById('byPath');
  if(d.byPath){
    let h='<table style="width:100%"><tr><th>Path</th><th>Count</th></tr>';
    Object.entries(d.byPath).sort((a,b)=>b[1]-a[1]).slice(0,15).forEach(([p,c])=>{
      h+=`<tr><td>${p}</td><td>${c}</td></tr>`;
    });
    h+='</table>';
    bp.innerHTML=h;
  }
}
async function pingIndexNow(){
  document.getElementById('result').textContent='Pinging IndexNow...';
  const r=await fetch('/api/ping-indexnow',{method:'POST'});
  const d=await r.json();
  document.getElementById('result').textContent=JSON.stringify(d,null,2);
}
async function rebuildSitemap(){
  document.getElementById('result').textContent='Rebuilding sitemap...';
  const r=await fetch('/api/rebuild-sitemap',{method:'POST'});
  const d=await r.json();
  document.getElementById('result').textContent=JSON.stringify(d,null,2);
  refreshStats();
}
refreshStats();
</script>
<script src="/conversion-banner.js" defer></script>
