<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Date Difference Calculator — Days Between Dates | my-automaton</title><meta name="description" content="Calculate the exact difference between two dates. Results in years, months, days, total days, weeks, hours, minutes. 100% free. No signup."><style>:root{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--accent:#38bdf8;--green:#4ade80;--border:#334155}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}header{background:var(--card);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap}header h1{font-size:1.25rem;color:var(--accent)}nav a{color:var(--muted);text-decoration:none;margin-left:1rem;font-size:.875rem}main{max-width:700px;margin:2rem auto;padding:0 1rem}.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1rem}.input-row{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1rem;align-items:end}.input-row label{font-size:.75rem;color:var(--muted);margin-bottom:.2rem;display:block}.input-row input{background:#0f172a;color:var(--text);border:1px solid var(--border);padding:.5rem .75rem;border-radius:8px;font-size:.9rem}.input-row input:focus{outline:none;border-color:var(--accent)}.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem}@media(max-width:500px){.result-grid{grid-template-columns:repeat(2,1fr)}}.result-card{background:#0f172a;border:1px solid var(--border);border-radius:10px;padding:1rem;text-align:center}.result-card .val{font-size:1.5rem;font-weight:700;color:var(--accent)}.result-card .lbl{font-size:.7rem;color:var(--muted);margin-top:.2rem}footer{text-align:center;padding:2rem;color:var(--muted);font-size:.8rem;border-top:1px solid var(--border);margin-top:2rem}footer a{color:var(--accent)}</style></head><body><header><h1>📅 Date Difference Calculator</h1><nav><a href="/">Home</a><a href="/dev-tools.html">Dev Tools</a><a href="/dev-tools-hub.html">Tools Hub</a></nav></header><main>
<div class="card"><div class="input-row"><div><label>Start Date</label><input type="date" id="startDate" oninput="calc()"></div><div><label>End Date</label><input type="date" id="endDate" oninput="calc()"></div></div><div class="result-grid"><div class="result-card"><div class="val" id="rYears">—</div><div class="lbl">Years</div></div><div class="result-card"><div class="val" id="rMonths">—</div><div class="lbl">Months</div></div><div class="result-card"><div class="val" id="rDays">—</div><div class="lbl">Days</div></div><div class="result-card"><div class="val" id="rTotalDays">—</div><div class="lbl">Total Days</div></div><div class="result-card"><div class="val" id="rWeeks">—</div><div class="lbl">Weeks</div></div><div class="result-card"><div class="val" id="rHours">—</div><div class="lbl">Hours</div></div></div></div></main><footer><p>my-automaton · Free Date Difference Calculator · <a href="/">Home</a> · <a href="/dev-tools-hub.html">All Tools</a></p></footer>
<script>
function calc(){const s=document.getElementById('startDate').value;const e=document.getElementById('endDate').value;if(!s||!e){document.querySelectorAll('#rYears,#rMonths,#rDays,#rTotalDays,#rWeeks,#rHours').forEach(el=>el.textContent='—');return}const start=new Date(s),end=new Date(e);const d=Math.floor((end-start)/86400000);const absd=Math.abs(d);const years=Math.floor(absd/365.25);const months=Math.floor(absd/30.44);const weeks=(absd/7).toFixed(1);const hours=absd*24;document.getElementById('rYears').textContent=years;document.getElementById('rMonths').textContent=months;document.getElementById('rDays').textContent=absd;document.getElementById('rTotalDays').textContent=absd;document.getElementById('rWeeks').textContent=weeks;document.getElementById('rHours').textContent=hours.toLocaleString()}
</script><script src="/conversion-banner.js" defer></script>
</body></html>
