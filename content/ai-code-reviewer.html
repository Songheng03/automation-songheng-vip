<div class="container">
  <h1>🔍 AI Code Reviewer</h1>
  <p class="sub">Free AI-powered code analysis. Paste your code and get instant feedback on bugs, security, and best practices.</p>

  <div class="editor">
    <div class="editor-header">

<script>
const BASE = window.location.origin;
let freeRemaining = 3;

async function checkFreeCount() {
  try {
    const r = await fetch(BASE + '/api/free-count');
    const d = await r.json();
    freeRemaining = d.free_remaining;
    document.getElementById('freeCount').textContent = `✨ ${freeRemaining} free reviews remaining today (resets midnight UTC)`;
    if (freeRemaining <= 0) {
      document.getElementById('reviewBtn').textContent = '🔒 Upgrade for $0.05';
      document.getElementById('reviewBtn').disabled = true;
    }
  } catch(e) {
    document.getElementById('freeCount').textContent = '✨ 3 free reviews per day';
  }
}

async function reviewCode() {
  const code = document.getElementById('code').value.trim();
  if (!code) { alert('Please paste some code first!'); return; }

  const btn = document.getElementById('reviewBtn');
  const loading = document.getElementById('loading');
  const results = document.getElementById('results');

  btn.disabled = true;
  loading.style.display = 'flex';
  results.style.display = 'none';
  results.innerHTML = '';

  try {
    const r = await fetch(BASE + '/v1/review', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: code, mode: 'review', language: document.getElementById('lang').value })
    });

    if (r.status === 402) {
      results.style.display = 'block';
      results.innerHTML = `<h3>🔒 Free Limit Reached</h3>
        <p>You've used all ${freeRemaining > 0 ? 'your' : '3'} free reviews today.</p>
        <p>Get unlimited reviews for just <strong>$0.05 each</strong> via USDC on Base:</p>
        <p style="background:#16213e;padding:12px;border-radius:4px;font-family:monospace;font-size:14px;word-break:break-all">0x76eADdEBFfb6A61DD071f97F4508467fc55dd113</p>
        <p style="margin-top:12px">Send $0.05 USDC + include the code in memo, or visit the <a href="/upgrade" style="color:#667eea">full upgrade page</a>.</p>`;
      return;
    }

    const data = await r.json();

    results.style.display = 'block';
    if (data.issues) {
      const crit = data.issues.filter(i => i.type === 'critical').length;
      const warn = data.issues.filter(i => i.type === 'warning').length;
      const info = data.issues.filter(i => i.type === 'info').length;
      results.innerHTML = `<h3>Review Results</h3>
        <div class="issues-count">${crit} critical · ${warn} warnings · ${info} info</div>
        ${data.issues.map(i => `<div class="result-item ${i.type||'info'}"><div class="type">${i.type||'info'}</div>${i.line ? '<div class="line">Line ' + i.line + '</div>' : ''}<div class="msg">${i.message||i.text}</div></div>`).join('')}
        <p style="margin-top:16px;color:#888;font-size:13px">Like this? <a href="/upgrade" style="color:#667eea">Upgrade</a> for unlimited reviews.</p>`;
    } else {
      results.innerHTML = `<h3>Analysis Complete</h3><pre style="white-space:pre-wrap;font-size:14px;line-height:1.5">${JSON.stringify(data, null, 2)}</pre>`;
    }
    checkFreeCount();
  } catch(e) {
    results.style.display = 'block';
    results.innerHTML = `<h3>Error</h3><p>${e.message}</p>`;
  } finally {
    btn.disabled = false;
    loading.style.display = 'none';
  }
}

function clearCode() { document.getElementById('code').value = ''; document.getElementById('results').style.display = 'none'; }

function loadSample() {
  document.getElementById('code').value = `// Sample code for review
function calculateTotal(items) {
  var total = 0;
  for (var i = 0; i < items.length; i++) {
    total += items[i].price * items[i].quantity;
  }
  // Missing input validation
  eval("total = " + total);
  return total;
}

    res.send(result);
  });

}

checkFreeCount();
</script>
