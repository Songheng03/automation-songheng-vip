<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>API Demo | my-automaton</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--accent:#38bdf8;--green:#4ade80;--border:#334155;--muted:#94a3b8}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem;max-width:700px;width:100%}
h1{color:var(--accent);font-size:1.4rem;margin-bottom:.5rem}
.sub{color:var(--muted);font-size:.8rem;margin-bottom:1.5rem}
.endpoint-select{display:flex;gap:.3rem;flex-wrap:wrap;margin-bottom:1rem}
.endpoint-select button{padding:.3rem .8rem;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);cursor:pointer;font-size:.65rem}
.endpoint-select button.active{background:var(--accent);color:#0f172a;border-color:var(--accent)}
textarea{width:100%;background:#0a0f1a;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:.75rem;font-family:"Fira Code",monospace;font-size:.75rem;resize:vertical;min-height:100px;margin-bottom:.75rem}
textarea:focus{outline:none;border-color:var(--accent)}
.result-box{background:#0a0f1a;border:1px solid var(--border);border-radius:8px;padding:.75rem;font-family:"Fira Code",monospace;font-size:.7rem;min-height:60px;max-height:250px;overflow-y:auto;color:var(--green);white-space:pre-wrap;word-break:break-word;margin-bottom:.75rem}
.result-box.error{color:#f87171}
.btn-row{display:flex;gap:.5rem;flex-wrap:wrap}
.btn{padding:.4rem 1.2rem;border:none;border-radius:8px;cursor:pointer;font-size:.75rem;font-weight:600}
.btn-primary{background:var(--accent);color:#0f172a}
.btn-green{background:var(--green);color:#0f172a}
.btn:hover{filter:brightness(1.15)}
.credit-info{font-size:.65rem;color:var(--muted);margin-top:.75rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
.credit-info a{color:var(--accent)}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:.3rem}
.status-dot.ok{background:var(--green)}
.status-dot.busy{background:#fbbf24;animation:pulse .6s infinite}
@keyframes pulse{50%{opacity:.3}}
</style>
</head>
<body>
<div class="card">
<h1>🤖 my-automaton AI API Demo</h1>
<p class="sub">Try the AI API for free (3 requests/day). Each endpoint costs 1-5 credits. <a href="/api-docs.html" style="color:var(--accent)">Full docs →</a></p>

<div class="endpoint-select">
  <button class="active" onclick="selectEndpoint('analyze')">Analyze 1¢</button>
  <button onclick="selectEndpoint('summarize')">Summarize 2¢</button>
  <button onclick="selectEndpoint('explain')">Explain Code 2¢</button>
  <button onclick="selectEndpoint('review')">Code Review 5¢</button>
</div>

<textarea id="inputText" placeholder="Enter text to analyze...">Artificial intelligence is transforming how we build software. AI agents can now autonomously write code, debug programs, and even manage infrastructure. This shift means developers spend less time on boilerplate and more time on creative problem-solving.</textarea>

<button class="btn btn-primary" onclick="callAPI()" id="callBtn">🚀 Call API</button>
<span style="font-size:.65rem;color:var(--muted);margin-left:.5rem" id="statusText"></span>

<div class="result-box" id="result">Click "Call API" to see the AI response...</div>

<div class="btn-row">
  <button class="btn btn-green" onclick="copyResult()">📋 Copy Result</button>
  <button class="btn btn-primary" onclick="clearAll()">🗑️ Clear</button>
</div>

<div class="credit-info">
  <span><span class="status-dot ok" id="statusDot"></span><span id="creditInfo">3 free requests/day</span></span>
  <span><a href="/api-docs.html">Pricing</a> · <a href="/dashboard.html">Get API Key</a></span>
</div>
</div>

<script>
let currentEndpoint='analyze';

function selectEndpoint(ep){
  currentEndpoint=ep;
  document.querySelectorAll('.endpoint-select button').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase().startsWith(ep)));
}

async function callAPI(){
  const input=document.getElementById('inputText').value.trim();
  if(!input){document.getElementById('result').textContent='Please enter some text';return}

  const btn=document.getElementById('callBtn');
  btn.disabled=true;
  btn.textContent='⏳ Processing...';
  document.getElementById('statusText').textContent='Calling DeepSeek AI...';
  document.getElementById('statusDot').className='status-dot busy';
  document.getElementById('result').textContent='Loading...';
  document.getElementById('result').className='result-box';

  try{
    const res=await fetch('/free/'+currentEndpoint,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text:input,mode:currentEndpoint})
    });

    const data=await res.json();
    if(res.status===402){
      document.getElementById('result').textContent='⚠️ Free daily limit reached (3/day). Get an API key for unlimited access: /dashboard.html';
      document.getElementById('result').className='result-box error';
    }else if(res.ok){
      document.getElementById('result').textContent=typeof data==='string'?data:JSON.stringify(data,null,2);
    }else{
      document.getElementById('result').textContent='Error: '+(data.error||res.statusText);
      document.getElementById('result').className='result-box error';
    }

    document.getElementById('creditInfo').textContent=`Free: ${data.remaining||'?'} remaining today`;
  }catch(e){
    document.getElementById('result').textContent='Network error: '+e.message;
    document.getElementById('result').className='result-box error';
  }

  btn.disabled=false;
  btn.textContent='🚀 Call API';
  document.getElementById('statusText').textContent='';
  document.getElementById('statusDot').className='status-dot ok';
}

function copyResult(){const r=document.getElementById('result').textContent;if(r&&r!=='Loading...')navigator.clipboard.writeText(r)}
function clearAll(){document.getElementById('inputText').value='';document.getElementById('result').textContent='Click "Call API" to see the AI response...';document.getElementById('result').className='result-box'}
</script>
<script src="/conversion-banner.js" defer></script>
</body>
</html>
