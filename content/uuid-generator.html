<script>
let bulkUUIDs=[];

function generateOne(){
  const uuid=crypto.randomUUID();
  document.getElementById('singleUUID').textContent=uuid;
  document.getElementById('versionTag').textContent='RFC 9562 · cryptographically secure · '+uuid.split('-')[2].charAt(0)+'xxx variant';
}

function copyOne(){
  const uuid=document.getElementById('singleUUID').textContent;
  if(uuid!=='Generate a UUID')navigator.clipboard.writeText(uuid);
}

function generateBulk(){
  const n=parseInt(document.getElementById('bulkCount').value)||10;
  bulkUUIDs=[];
  for(let i=0;i<Math.min(n,500);i++)bulkUUIDs.push(crypto.randomUUID());
  document.getElementById('bulkOutput').textContent=bulkUUIDs.join('\n');
}

function copyAll(){if(bulkUUIDs.length)navigator.clipboard.writeText(bulkUUIDs.join('\n'))}
function downloadUUIDs(){
  if(!bulkUUIDs.length)return;
  const blob=new Blob([bulkUUIDs.join('\n')],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='uuids.txt';a.click();URL.revokeObjectURL(a.href);
}

generateOne();
</script>
