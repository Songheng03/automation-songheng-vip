<style>
:root{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--accent:#38bdf8;--green:#4ade80;--red:#f87171;--yellow:#fbbf24;--border:#334155}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--card);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap}
header h1{font-size:1.25rem;color:var(--accent)}
nav a{color:var(--muted);text-decoration:none;margin-left:1rem;font-size:.875rem}
main{max-width:600px;margin:2rem auto;padding:0 1rem}
.pw-display{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.pw-display .pw-text{flex:1;min-width:200px;font-family:"Fira Code",monospace;font-size:1.5rem;font-weight:800;color:var(--green);word-break:break-all}
@media(max-width:450px){.pw-display .pw-text{font-size:1.1rem}}
.pw-display .copy-btn{padding:.4rem 1rem;border:none;border-radius:6px;background:var(--green);color:#0f172a;cursor:pointer;font-size:.7rem;font-weight:600}
.strength-bar{height:6px;border-radius:3px;margin-bottom:1rem;transition:all .3s;width:0;background:var(--red)}
.strength-label{font-size:.6rem;color:var(--muted);margin-bottom:.2rem;display:flex;justify-content:space-between}
.options{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1rem}
.opt{display:flex;align-items:center;gap:.5rem;font-size:.7rem;color:var(--muted);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.5rem .75rem;cursor:pointer}
.opt input[type="checkbox"]{accent-color:var(--accent)}
.len-row{display:flex;align-items:center;gap:.75rem;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.6rem .8rem;margin-bottom:1rem}
.len-row label{font-size:.7rem;color:var(--muted)}
.len-row input[type="range"]{flex:1;accent-color:var(--accent);min-width:80px}
.len-row .len-val{font-family:"Fira Code",monospace;font-size:.8rem;color:var(--accent);min-width:32px;text-align:right}
.btn-row{display:flex;gap:.5rem;flex-wrap:wrap}
.btn{padding:.4rem 1.2rem;border:none;border-radius:8px;cursor:pointer;font-size:.75rem;font-weight:600}
.btn-primary{background:var(--accent);color:#0f172a}

footer{text-align:center;padding:2rem;color:var(--muted);font-size:.8rem;border-top:1px solid var(--border);margin-top:2rem}footer a{color:var(--accent)}

<body>
<header><h1>🔐 Password Generator</h1><nav><a href="/">Home</a><a href="/dev-tools-hub.html">Tools Hub</a></nav></header>
<main>
<div class="pw-display">
  <span class="pw-text" id="password">Click Generate</span>
  <button class="copy-btn" onclick="copyPW()">📋 Copy</button>
</div>
<div class="strength-label"><span>Strength</span><span id="strengthText">—</span></div>
<div class="strength-bar" id="strengthBar"></div>

<div class="len-row">
  <label>Length</label>
  <input type="range" id="length" min="4" max="64" value="20" oninput="updateLen()">
  <span class="len-val" id="lenVal">20</span>
</div>

<div class="options">
  <label class="opt"><input type="checkbox" id="upper" checked onchange="generate()"> A-Z</label>
  <label class="opt"><input type="checkbox" id="lower" checked onchange="generate()"> a-z</label>
  <label class="opt"><input type="checkbox" id="numbers" checked onchange="generate()"> 0-9</label>
  <label class="opt"><input type="checkbox" id="symbols" checked onchange="generate()"> !@#$</label>
</div>

<div class="btn-row">
  <button class="btn btn-primary" onclick="generate()">🔄 Generate New</button>
</div>
</main>
<footer><p>my-automaton · Free Password Generator · <a href="/dev-tools-hub.html">All Tools</a></p></footer>
<script>
function updateLen(){
  document.getElementById('lenVal').textContent=document.getElementById('length').value;
  generate();
}

function generate(){
  const len=parseInt(document.getElementById('length').value);
  let chars='';
  if(document.getElementById('upper').checked)chars+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if(document.getElementById('lower').checked)chars+='abcdefghijklmnopqrstuvwxyz';
  if(document.getElementById('numbers').checked)chars+='0123456789';
  if(document.getElementById('symbols').checked)chars+='!@#$%^&*()-_=+[]{}|;:,.<>?/~`';

  if(!chars){
    document.getElementById('password').textContent='Select at least one character set';
    document.getElementById('strengthBar').style.width='0';
    document.getElementById('strengthText').textContent='—';
    return;
  }

  const array=new Uint32Array(len);
  crypto.getRandomValues(array);
  let pw='';
  for(let i=0;i<len;i++)pw+=chars[array[i]%chars.length];

  document.getElementById('password').textContent=pw;
  updateStrength(chars.length,len);
}

function updateStrength(poolSize,len){
  const bits=Math.log2(poolSize)*len;
  let color,label,width;
  if(bits<40){color='var(--red)';label='Weak';width='25%'}
  else if(bits<60){color='#fbbf24';label='Fair';width='50%'}
  else if(bits<80){color='var(--accent)';label='Good';width='75%'}
  else if(bits<100){color='var(--green)';label='Strong';width='90%'}
  else{color='var(--green)';label='Very Strong';width='100%'}

  document.getElementById('strengthBar').style.width=width;
  document.getElementById('strengthBar').style.background=color;
  document.getElementById('strengthText').textContent=label+' ('+Math.round(bits)+' bits)';
}

function copyPW(){
  const pw=document.getElementById('password').textContent;
  if(pw&&pw!=='Click Generate')navigator.clipboard.writeText(pw);
}

generate();
</script>
