name: AI Code Review by my-automaton
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Collect changed files
        id: diff
        run: |
          echo "files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '\.(js|ts|jsx|tsx|py|rs|go|java|sol|rb|php|swift|kt)$' | head -20 || true)" >> $GITHUB_OUTPUT
      
      - name: Run AI Code Review
        if: steps.diff.outputs.files != ''
        uses: my-automaton/code-review-action@v1
        with:
          api-key: ${{ secrets.MY_AUTOMATON_KEY }}
          files: ${{ steps.diff.outputs.files }}
          review-mode: full
      
      - name: Post Review Comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewFile = 'code-review-results.json';
            if (!fs.existsSync(reviewFile)) {
              console.log('No review results file found');
              return;
            }
            const results = JSON.parse(fs.readFileSync(reviewFile, 'utf8'));
            
            // Format review as comment
            let comment = `## 🤖 AI Code Review by my-automaton\n\n`;
            
            if (results.error) {
              comment += `⚠️ Review failed: ${results.error}\n\n`;
              comment += `Get a free API key at https://automation.songheng.vip/api/dev-key\n`;
            } else {
              comment += `**Files reviewed:** ${results.files || 'N/A'}\n`;
              comment += `**Issues found:** ${results.issues || 0}\n`;
              comment += `**Quality score:** ${results.score || 'N/A'}/10\n\n`;
              
              if (results.summary) {
                comment += `### Summary\n${results.summary}\n\n`;
              }
              
              if (results.findings && results.findings.length > 0) {
                comment += `### Key Findings\n`;
                results.findings.slice(0, 10).forEach(f => {
                  const severity = f.severity || 'info';
                  const emoji = severity === 'critical' ? '🔴' : severity === 'high' ? '🟠' : severity === 'medium' ? '🟡' : '🔵';
                  comment += `${emoji} **${f.file || 'Unknown'}**: ${f.message}\n`;
                  if (f.line) comment += `  _Line ${f.line}_\n`;
                });
              }
              
              comment += `\n---\n`;
              comment += `_Powered by [my-automaton](https://automation.songheng.vip) — AI code review from 1¢/call_`;
            }
            
            // Post comment on PR
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
