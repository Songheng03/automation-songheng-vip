<body>
<header><h1>🗺️ Free Sitemap Generator</h1><p>Generate XML sitemaps for any website — crawl up to 500 URLs</p></header>
<div class="container">
<div class="input-group">
<input type="url" id="urlInput" placeholder="https://example.com" value="https://automation.songheng.vip">
<button id="genBtn" onclick="generateSitemap()">Generate Sitemap</button>
</div>
<div class="loading" id="loading"><div class="spinner"></div><p>Crawling website...</p></div>
<div class="error-msg" id="errorMsg"></div>
<div class="result-card" id="resultCard">
  <div class="stats" id="statsGrid"></div>
  <button class="copy-btn" onclick="copySitemap()">📋 Copy XML</button>
  <h3>Sitemap XML</h3>
  <pre id="sitemapOutput"></pre>
</div>
</div>
<script>
async function generateSitemap(){
  const url = document.getElementById('urlInput').value.trim();
  if(!url){alert('Enter a URL');return}
  const btn = document.getElementById('genBtn');
  const loading = document.getElementById('loading');
  const errorMsg = document.getElementById('errorMsg');
  const resultCard = document.getElementById('resultCard');
  btn.disabled = true;
  loading.style.display = 'block';
  errorMsg.style.display = 'none';
  resultCard.style.display = 'none';
  try{
    const resp = await fetch('/api/sitemap', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({url, maxPages:500})
    });
    const data = await resp.json();
    if(!resp.ok) throw new Error(data.error||'Failed');
    showResults(data);
  }catch(e){
    errorMsg.textContent='Error: '+e.message;
    errorMsg.style.display='block';
  }finally{
    btn.disabled=false;
    loading.style.display='none';
  }
}
function showResults(d){
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-box"><div class="num">${d.urls||0}</div><div class="label">URLs Found</div></div>
    <div class="stat-box"><div class="num">${d.errors||0}</div><div class="label">Errors</div></div>
    <div class="stat-box"><div class="num">${(d.duration||0).toFixed(1)}s</div><div class="label">Duration</div></div>`;
  document.getElementById('sitemapOutput').textContent=d.sitemap||'No sitemap generated.';
  document.getElementById('resultCard').style.display='block';
}
async function copySitemap(){
  const text=document.getElementById('sitemapOutput').textContent;
  try{await navigator.clipboard.writeText(text);alert('Copied!');}catch{alert('Copy manually');}
}
</script>
