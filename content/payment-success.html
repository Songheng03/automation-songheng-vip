<div style="background:#161b22;border-bottom:1px solid #30363d;padding:10px 20px;font-size:.85rem;display:flex;gap:16px;align-items:center;flex-wrap:wrap"><a href="/" style="color:#58a6ff;text-decoration:none;font-weight:600">🏠 Home</a><span style="color:#484f58">|</span><a href="/pricing.html" style="color:#8b949e;text-decoration:none">Pricing</a><a href="/api-docs.html" style="color:#8b949e;text-decoration:none">API</a><a href="/playground.html" style="color:#8b949e;text-decoration:none">Playground</a></div>

  <div class="icon">✅</div>
  <h1>支付成功！</h1>
  <div class="sub">感谢你的购买。<br>你的 API Key 已生成，复制后即可使用：</div>
  <div class="key-box" id="keyBox">
    <label>🔑 你的 API Key</label>
    <div class="key-text" id="apiKey">加载中...</div>
    <div class="copied" id="copiedMsg">✅ 已复制到剪贴板</div>
  </div>
  <div class="detail">
    <div>Credits: <span id="credits">-</span></div>
    <div>已使用: <span id="used">0</span></div>

  <div class="cta">

  </div>

  </div>
</div>

<script>
// Get session_id from URL
const params = new URLSearchParams(window.location.search);
const sessionId = params.get('session_id');

async function fetchKey() {
  if (!sessionId) {
    document.getElementById('apiKey').textContent = '无会话 ID';
    return;
  }
  
  // Retry up to 5 times (webhook may be delayed)
  for (let i = 0; i < 5; i++) {
    try {
      const r = await fetch('/api/lookup-key?session_id=' + encodeURIComponent(sessionId));
      const data = await r.json();
      if (data.api_key) {
        document.getElementById('apiKey').textContent = data.api_key;
        document.getElementById('credits').textContent = data.credits;
        document.getElementById('used').textContent = data.used;
        document.getElementById('keyBox').style.borderColor = '#1a6b3c';
        
        // Auto-copy
        navigator.clipboard.writeText(data.api_key).then(() => {
          document.getElementById('copiedMsg').style.display = 'block';
        }).catch(() => {});
        return;
      }
    } catch(e) {}
    // Wait before retry
    await new Promise(r => setTimeout(r, 2000));
  }
  document.getElementById('apiKey').textContent = '支付确认中，请刷新页面...';
}

fetchKey();

// Click to copy
document.getElementById('apiKey').addEventListener('click', function() {
  const text = this.textContent;
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('copiedMsg').style.display = 'block';
    setTimeout(() => document.getElementById('copiedMsg').style.display = 'none', 2000);
  });
});
</script>
