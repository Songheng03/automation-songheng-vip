<script>
let mode='encode';
const presets={query:'q=hello+world&lang=en&page=1',path:'/users/john doe/profile%20pic.png',json:'{"name":"John","city":"New York"}'};
function setMode(m){mode=m;document.querySelectorAll('.mode-tabs button').forEach((b,i)=>b.classList.toggle('active',(i===0&&m==='encode')||(i===1&&m==='decode')));document.getElementById('inputLabel').textContent=m==='encode'?'Text to Encode':'Encoded URL';document.getElementById('outputLabel').textContent=m==='encode'?'Encoded Output':'Decoded Text';document.getElementById('output').placeholder=m==='encode'?'Encoded URL...':'Decoded text...';convert()}
function loadPreset(n){document.getElementById('input').value=presets[n];convert()}
function convert(){const v=document.getElementById('input').value;const o=document.getElementById('output');try{o.value=mode==='encode'?encodeURIComponent(v):decodeURIComponent(v)}catch(e){o.value='Error: '+e.message}}
function copyOutput(){const v=document.getElementById('output').value;if(v)navigator.clipboard.writeText(v)}
function swapIO(){const i=document.getElementById('input'),o=document.getElementById('output');[i.value,o.value]=[o.value,i.value];convert()}
setTimeout(convert,100);
