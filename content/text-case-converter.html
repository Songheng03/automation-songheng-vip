<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Text Case Converter — Uppercase, Lowercase, Title Case & More | my-automaton</title><meta name="description" content="Convert text to uppercase, lowercase, title case, sentence case, camel case, snake case, kebab case, and more. 100% free, instant conversion."><style>:root{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--accent:#38bdf8;--green:#4ade80;--border:#334155}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}header{background:var(--card);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap}header h1{font-size:1.25rem;color:var(--accent)}nav a{color:var(--muted);text-decoration:none;margin-left:1rem;font-size:.875rem}main{max-width:850px;margin:2rem auto;padding:0 1rem}.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1rem}textarea{width:100%;background:#0f172a;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:.75rem;font-family:"Fira Code",monospace;font-size:.8rem;resize:vertical;min-height:120px}textarea:focus{outline:none;border-color:var(--accent)}.case-options{display:flex;gap:.35rem;flex-wrap:wrap;margin:.5rem 0}.case-btn{padding:.3rem .7rem;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;font-size:.7rem}.case-btn:hover{border-color:var(--accent);color:var(--text)}.case-btn.active{background:var(--accent);color:#0f172a;border-color:var(--accent);font-weight:600}.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:.6rem}.result-card{background:#0a0f1a;border:1px solid var(--border);border-radius:10px;padding:.75rem}.result-card .case-name{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem}.result-card .case-value{font-family:"Fira Code",monospace;font-size:.75rem;color:var(--green);word-break:break-all}.result-card .copy-btn{font-size:.6rem;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:4px;cursor:pointer;padding:.1rem .4rem;float:right}.btn-row{display:flex;gap:.5rem;flex-wrap:wrap}.btn{padding:.4rem 1rem;border:none;border-radius:6px;cursor:pointer;font-size:.8rem;font-weight:600}.btn-primary{background:var(--accent);color:#0f172a}.btn-secondary{background:var(--border);color:var(--text)}.btn:hover{filter:brightness(1.15)}.char-stats{font-size:.7rem;color:var(--muted);margin-top:.4rem}footer{text-align:center;padding:2rem;color:var(--muted);font-size:.8rem;border-top:1px solid var(--border);margin-top:2rem}footer a{color:var(--accent)}</style></head><body><header><h1>🔤 Text Case Converter</h1><nav><a href="/">Home</a><a href="/dev-tools.html">Dev Tools</a><a href="/dev-tools-hub.html">Tools Hub</a></nav></header><main>
<div class="card"><textarea id="input" oninput="convertAll()" placeholder="Type or paste text here...">the quick brown fox JUMPS over the lazy dog</textarea>
<div class="char-stats" id="charStats">Characters: 44 | Words: 9</div></div>
<div class="result-grid" id="results"></div>
</main><footer><p>my-automaton · Free Text Case Converter · <a href="/">Home</a> · <a href="/dev-tools-hub.html">All Tools</a></p></footer>
<script>
function sentenceCase(s){return s.toLowerCase().replace(/(^\s*\w|[.!?]\s+\w)/g,c=>c.toUpperCase())}
function titleCase(s){return s.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase())}
function camelCase(s){return s.toLowerCase().replace(/[^a-z0-9]+(.)/g,(_,c)=>c.toUpperCase()).replace(/^[A-Z]/,c=>c.toLowerCase())}
function pascalCase(s){return s.toLowerCase().replace(/(?:^|[^a-z0-9]+)(.)/g,(_,c)=>c.toUpperCase())}
function snakeCase(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'')}
function kebabCase(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}
function constantCase(s){return s.toUpperCase().replace(/[^A-Z0-9]+/g,'_').replace(/^_|_$/g,'')}
function dotCase(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'.').replace(/^\.|\.$/g,'')}
function alternatingCase(s){return s.split('').map((c,i)=>i%2===0?c.toLowerCase():c.toUpperCase()).join('')}
function inverseCase(s){return s.split('').map(c=>c===c.toUpperCase()?c.toLowerCase():c.toUpperCase()).join('')}
const cases=[
  {name:'lowercase',fn:s=>s.toLowerCase()},{name:'UPPERCASE',fn:s=>s.toUpperCase()},
  {name:'Sentence case',fn:sentenceCase},{name:'Title Case',fn:titleCase},
  {name:'camelCase',fn:camelCase},{name:'PascalCase',fn:pascalCase},
  {name:'snake_case',fn:snakeCase},{name:'kebab-case',fn:kebabCase},
  {name:'CONSTANT_CASE',fn:constantCase},{name:'dot.case',fn:dotCase},
  {name:'aLtErNaTiNg',fn:alternatingCase},{name:'iNVERSE cASE',fn:inverseCase}
];
function convertAll(){
  const s=document.getElementById('input').value;
  document.getElementById('charStats').textContent='Characters: '+s.length+' | Words: '+(s.trim()?s.trim().split(/\s+/).length:0);
  document.getElementById('results').innerHTML=cases.map(c=>'<div class="result-card"><button class="copy-btn" onclick="event.stopPropagation();navigator.clipboard.writeText(\''+(c.fn(s).replace(/'/g,"\\'"))+'\')">📋</button><div class="case-name">'+c.name+'</div><div class="case-value">'+(s?c.fn(s):'—')+'</div></div>').join('');
}
setTimeout(convertAll,100);
</script><script src="/conversion-banner.js" defer></script>
</body></html>
