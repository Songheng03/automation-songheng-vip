name: AI Code Review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    name: Review PR with AI
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: AI Code Review
        uses: ./github-action
        with:
          api-key: ${{ secrets.AUTOMATON_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
