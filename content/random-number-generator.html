<script>
function randU32(){const a=new Uint32Array(1);crypto.getRandomValues(a);return a[0]}
function randFloat(){return randU32()/0x100000000}
function generate(){
  const min=parseFloat(document.getElementById('min').value)||1;
  const max=parseFloat(document.getElementById('max').value)||100;
  const count=Math.min(parseInt(document.getElementById('count').value)||5,100);
  const type=document.getElementById('type').value;
  const nums=[];
  for(let i=0;i<count;i++){
    if(type==='int'){const range=max-min+1;nums.push(Math.floor(randFloat()*range)+min)}
    else{nums.push(Math.round((randFloat()*(max-min)+min)*100)/100)}
  }
  window._nums=nums;
  if(count===1){
    document.getElementById('singleResult').innerHTML='<div class="num">'+nums[0]+'</div><div class="range">Between '+min+' and '+max+'</div>';
    document.getElementById('multiResult').innerHTML='';
  }else{
    document.getElementById('singleResult').innerHTML='';
    document.getElementById('multiResult').innerHTML=nums.map((n,i)=>'<div class="result-box">#'+(i+1)+'<br>'+n+'</div>').join('');
  }
  const sum=nums.reduce((a,b)=>a+b,0);const avg=sum/nums.length;
  const uniq=new Set(nums).size;
  document.getElementById('stats').innerHTML='Sum: <strong>'+sum.toLocaleString()+'</strong> | Average: <strong>'+avg.toFixed(2)+'</strong> | Unique: <strong>'+uniq+'</strong> | Count: <strong>'+count+'</strong> | Range: '+min+' – '+max;
}
function copyAll(){if(window._nums)navigator.clipboard.writeText(window._nums.join(', '));}
function resetFields(){document.getElementById('min').value=1;document.getElementById('max').value=100;document.getElementById('count').value=5;document.getElementById('type').value='int';generate()}
generate();
</script><script src="/conversion-banner.js" defer></script>
