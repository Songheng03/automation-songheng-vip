<header><h1>#️⃣ Hash Generator</h1><nav><a href="/">Home</a><a href="/dev-tools.html">Tools</a><a href="/api-playground.html">API</a></nav></header>

<script>
let currentMode='text';

async function hashText(){
  const text=document.getElementById('textInput')?.value||'';
  if(!text.trim()){showEmpty();return}
  await computeHashes(text);
}

async function hashFile(file){
  const buf=await file.arrayBuffer();
  await computeHashes(new Uint8Array(buf));
}

async function computeHashes(input){
  const encoder=new TextEncoder();
  const data=typeof input==='string'?encoder.encode(input):input;

  const algorithms=[
    ['MD5','md5-unavailable'],
    ['SHA-1','SHA-1'],
    ['SHA-256','SHA-256'],
    ['SHA-384','SHA-384'],
    ['SHA-512','SHA-512'],
  ];

  let html='';
  for(const[name,algo]of algorithms){
    let hash;
    if(algo==='md5-unavailable'){
      hash='MD5 unavailable (Web Crypto), use SHA-256 instead';
    }else{
      try{
        const buf=await crypto.subtle.digest(algo,data);
        hash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
      }catch(e){hash='Error: '+e.message}
    }
    html+=`<div class="hash-row"><span class="name">${name}</span><span class="value">${hash}</span><button class="copy-btn" onclick="copyHash(this)">📋</button></div>`;
  }
  document.getElementById('hashGrid').innerHTML=html;
}

function showEmpty(){
  document.getElementById('hashGrid').innerHTML='<div style="text-align:center;color:var(--muted);font-size:.7rem;padding:1rem">Enter text or select a file to generate hashes</div>';
}

function copyHash(btn){const v=btn.parentElement.querySelector('.value').textContent;if(v&&!v.startsWith('MD5 unavail'))navigator.clipboard.writeText(v)}

function switchMode(mode){
  currentMode=mode;
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.mode-tab').forEach((t,i)=>{if((i===0&&mode==='text')||(i===1&&mode==='file'))t.classList.add('active')});

  const box=document.getElementById('contentBox');
  if(mode==='text'){
    box.innerHTML=`<textarea id="textInput" placeholder="Enter text to hash..." oninput="hashText()">Hello, World!</textarea><div class="btn-row"><button class="btn btn-primary" onclick="hashText()">🔄 Generate Hashes</button></div>`;
    hashText();
  }else{
    box.innerHTML=`<div class="file-drop" onclick="this.querySelector('input').click()">📁 Drop a file here or click to select<input type="file" onchange="hashFile(this.files[0])"></div>`;
  }
}

setTimeout(hashText,50);
</script>
