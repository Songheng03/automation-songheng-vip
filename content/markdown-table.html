<header><h1>📋 Markdown Table Generator</h1><nav><a href="/">Home</a><a href="/dev-tools.html">Tools</a><a href="/api-playground.html">API</a></nav></header>
<main>
<div class="dim">

  <label>Cols:</label>

<script>
function buildEditor(){
  const rows=parseInt(document.getElementById('rows').value)||3;
  const cols=parseInt(document.getElementById('cols').value)||4;
  
  let html='<table><thead><tr>';
  for(let c=0;c<cols;c++)html+=`<th><input type="text" id="h${c}" placeholder="Header ${c+1}" oninput="generateMD()"></th>`;
  html+='</tr></thead><tbody>';
  for(let r=0;r<rows;r++){
    html+='<tr>';
    for(let c=0;c<cols;c++)html+=`<td><input type="text" id="r${r}c${c}" placeholder="Cell ${r+1},${c+1}" oninput="generateMD()"></td>`;
    html+='</tr>';
  }
  html+='</tbody></table>';
  document.getElementById('editor').innerHTML=html;
  generateMD();
}

function generateMD(){
  const cols=parseInt(document.getElementById('cols').value)||4;
  const rows=parseInt(document.getElementById('rows').value)||3;

  const headers=[];
  for(let c=0;c<cols;c++){
    const el=document.getElementById(`h${c}`);
    headers.push(el?.value||`Header ${c+1}`);
  }

  const cells=[];
  for(let r=0;r<rows;r++){
    const row=[];
    for(let c=0;c<cols;c++){
      const el=document.getElementById(`r${r}c${c}`);
      row.push(el?.value||`Cell ${r+1},${c+1}`);
    }
    cells.push(row);
  }

  // Generate markdown
  let md=`| ${headers.join(' | ')} |\n`;
  md+=`|${headers.map(()=>'---').join(' | ')}|\n`;
  cells.forEach(row=>{md+=`| ${row.join(' | ')} |\n`});

  document.getElementById('mdOutput').textContent=md;

  // Preview
  let preview=`<table><thead><tr>${headers.map(h=>`<th>${escapeHtml(h)}</th>`).join('')}</tr></thead><tbody>`;
  cells.forEach(row=>{preview+=`<tr>${row.map(c=>`<td>${escapeHtml(c)}</td>`).join('')}</tr>`});
  preview+='</tbody></table>';
  document.getElementById('mdPreview').innerHTML=preview;
}

function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function copyMarkdown(){const v=document.getElementById('mdOutput').textContent;if(v)navigator.clipboard.writeText(v)}

buildEditor();
</script>
