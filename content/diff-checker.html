<style>

body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.input-card textarea{width:100%;background:#0a0f1a;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:.75rem;font-family:"Fira Code",monospace;font-size:.7rem;resize:vertical;min-height:250px;line-height:1.5}
.input-card textarea:focus{outline:none;border-color:var(--accent)}
.btn-row{display:flex;gap:.5rem;flex-wrap:wrap;margin:.75rem 0;justify-content:center}
.btn{padding:.4rem 1.2rem;border:none;border-radius:8px;cursor:pointer;font-size:.75rem;font-weight:600}

.btn:hover{filter:brightness(1.15)}
.preset-row{display:flex;gap:.3rem;flex-wrap:wrap;justify-content:center;margin-bottom:.75rem}
.preset-row button{padding:.15rem .7rem;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--muted);cursor:pointer;font-size:.6rem}
.preset-row button:hover{border-color:var(--accent)}
.diff-output{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;max-height:400px;overflow-y:auto;font-family:"Fira Code",monospace;font-size:.75rem;line-height:1.6}

<body>
<header><h1>🔍 Diff Checker</h1><nav><a href="/">Home</a><a href="/dev-tools-hub.html">Tools Hub</a></nav></header>
<main>
<div class="preset-row">
  <span style="font-size:.65rem;color:var(--muted);align-self:center">Samples: </span>
  <button onclick="loadPreset('code')">Code Fix</button>
  <button onclick="loadPreset('config')">Config Change</button>
  <button onclick="loadPreset('text')">Text Edit</button>
</div>
<div class="grid-2">
  <div class="input-card"><h3>Original (A)</h3><textarea id="textA" placeholder="Original text..." oninput="runDiff()">function greet(name) {
  console.log("Hello, " + name);
  return true;
}
const user = "Alice";
greet(user);</textarea></div>
  <div class="input-card"><h3>Modified (B)</h3><textarea id="textB" placeholder="Modified text..." oninput="runDiff()">function greet(name, greeting) {
  console.log(greeting + ", " + name);
  return name;
}
const user = "Bob";
greet(user, "Hi");</textarea></div>

  <button class="btn btn-primary" onclick="runDiff()">🔍 Compare</button>
  <button class="btn btn-green" onclick="swapTexts()">⇄ Swap A/B</button>
  <button class="btn btn-primary" onclick="clearAll()">🗑️ Clear</button>
</div>

<script>
const presets={
  code:{a:'function greet(name) {\n  console.log("Hello, " + name);\n  return true;\n}\nconst user = "Alice";\ngreet(user);',b:'function greet(name, greeting) {\n  console.log(greeting + ", " + name);\n  return name;\n}\nconst user = "Bob";\ngreet(user, "Hi");'},
  config:{a:'{\n  "host": "localhost",\n  "port": 3000,\n  "debug": false,\n  "cache": true\n}',b:'{\n  "host": "0.0.0.0",\n  "port": 8080,\n  "debug": true,\n  "cache": false,\n  "ssl": true\n}'},
  text:{a:'The quick brown fox jumped over the lazy dog.\nIt was a sunny day in the park.\nChildren were playing on the swings.',b:'The fast brown fox leaped over the sleepy dog.\nIt was a cloudy day at the beach.\nDogs were running on the sand.'}
};

function loadPreset(k){document.getElementById('textA').value=presets[k].a;document.getElementById('textB').value=presets[k].b;runDiff()}

function swapTexts(){
  const a=document.getElementById('textA').value;
  const b=document.getElementById('textB').value;
  document.getElementById('textA').value=b;
  document.getElementById('textB').value=a;
  runDiff();
}

function clearAll(){
  document.getElementById('textA').value='';
  document.getElementById('textB').value='';
  document.getElementById('diffOutput').innerHTML='Enter text to compare';
  document.getElementById('statsBar').innerHTML='';
}

function lcs(a,b){
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},()=>Array(n+1).fill(0));
  for(let i=1;i<=m;i++)
    for(let j=1;j<=n;j++)
      dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);
  const result=[];
  let i=m,j=n;
  while(i>0&&j>0){
    if(a[i-1]===b[j-1]){result.unshift(a[i-1]);i--;j--}
    else if(dp[i-1][j]>dp[i][j-1])i--;
    else j--;
  }
  return result;
}

function runDiff(){
  const aLines=document.getElementById('textA').value.split('\n');
  const bLines=document.getElementById('textB').value.split('\n');
  
  if(!document.getElementById('textA').value.trim()&&!document.getElementById('textB').value.trim()){
    document.getElementById('diffOutput').innerHTML='<span style="color:var(--muted)">Enter text in both panes and click Compare</span>';
    document.getElementById('statsBar').innerHTML='';
    return;
  }

  // Simple line-by-line diff
  const maxLen=Math.max(aLines.length,bLines.length);
  let added=0,removed=0,unchanged=0;
  let html='';

  for(let i=0;i<Math.min(aLines.length,bLines.length);i++){
    if(aLines[i]===bLines[i]){
      html+='<span class="diff-same">  '+escapeHtml(aLines[i])+'</span>\n';
      unchanged++;
    }else{
      if(aLines[i]){html+='<span class="diff-removed">- '+escapeHtml(aLines[i])+'</span>\n';removed++;}
      if(bLines[i]){html+='<span class="diff-added">+ '+escapeHtml(bLines[i])+'</span>\n';added++;}
    }
  }

  // Extra lines
  for(let i=aLines.length;i<bLines.length;i++){
    html+='<span class="diff-added">+ '+escapeHtml(bLines[i])+'</span>\n';added++;
  }
  for(let i=bLines.length;i<aLines.length;i++){
    html+='<span class="diff-removed">- '+escapeHtml(aLines[i])+'</span>\n';removed++;
  }

  document.getElementById('diffOutput').innerHTML=html||'No differences found';
  document.getElementById('statsBar').innerHTML=`
    <span class="stat">Total: ${aLines.length+bLines.length} lines</span>
    <span class="stat added">+${added} added</span>
    <span class="stat removed">-${removed} removed</span>
    <span class="stat">${unchanged} unchanged</span>
  `;
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

runDiff();
</script>
