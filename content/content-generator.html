<h1>📝 AI Content Generator</h1>
<p class="subtitle">Generate blog posts, tutorials, API docs, changelogs, and READMEs with DeepSeek AI. 3 free per day.</p>

<div class="remaining">Remaining today: <span id="remainingCount">3</span></div>

<div class="row-2">
  <div class="form-group">
    <label>Content Type</label>
    <select id="contentType">
      <option value="blog-post">📰 Blog Post</option>
      <option value="tutorial">📚 Tutorial</option>
      <option value="api-docs">🔌 API Documentation</option>
      <option value="changelog">📋 Changelog</option>
      <option value="readme">📖 README</option>
      <option value="seo-article">🌐 SEO Article</option>
      <option value="landing-page">🏠 Landing Page Copy</option>
      <option value="newsletter">📧 Newsletter</option>
    </select>
  </div>
  <div class="form-group">
    <label>Tone / Style</label>
    <select id="tone">
      <option value="professional">Professional</option>
      <option value="conversational">Conversational</option>
      <option value="technical">Technical</option>
      <option value="casual">Casual</option>
      <option value="persuasive">Persuasive</option>
      <option value="humorous">Humorous</option>
    </select>
  </div>
</div>

<div class="form-group">
  <label>Topic / Title</label>
  <input type="text" id="topic" placeholder="e.g., Getting Started with Microservices Architecture">
</div>

<div class="form-group">
  <label>Key Points (optional — one per line)</label>
  <textarea id="keyPoints" placeholder="Key point 1&#10;Key point 2&#10;Key point 3"></textarea>
</div>

<button id="generateBtn" class="btn">✨ Generate Content</button>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <p style="margin-top:0.5rem;color:#666;">Generating content with AI...</p>
</div>

<div class="output-box" id="outputBox">
  <h3>📄 Generated Content</h3>
  <div class="output-content" id="outputContent"></div>
  <div class="output-actions">
    <button id="copyBtn">📋 Copy</button>
    <button id="copyHtmlBtn">🔗 Copy HTML</button>
  </div>
</div>

<div id="toast" class="copy-toast">Copied!</div>

<script>
const remainingSpan = document.getElementById('remainingCount');
const generateBtn = document.getElementById('generateBtn');
const loading = document.getElementById('loading');
const outputBox = document.getElementById('outputBox');
const outputContent = document.getElementById('outputContent');

async function checkRemaining() {
  try {
    const r = await fetch('/api/content-generator/remaining');
    const d = await r.json();
    remainingSpan.textContent = d.remaining;
  } catch(e) {}
}
checkRemaining();

generateBtn.addEventListener('click', async () => {
  const type = document.getElementById('contentType').value;
  const tone = document.getElementById('tone').value;
  const topic = document.getElementById('topic').value.trim();
  const keyPoints = document.getElementById('keyPoints').value.trim();
  
  if(!topic) { alert('Enter a topic or title'); return; }
  
  generateBtn.disabled = true;
  generateBtn.textContent = '⏳ Generating...';
  outputBox.style.display = 'none';
  loading.style.display = 'block';
  
  try {
    const res = await fetch('/api/content-generator', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({type, tone, topic, keyPoints})
    });
    const data = await res.json();
    loading.style.display = 'none';
    
    if(data.error) {
      if(res.status === 402) {
        alert('Free limit reached! Send $0.02 USDC to 0x76eADdEBFfb6A61DD071f97F4508467fc55dd113 on Base');
      } else {
        alert('Error: '+data.error);
      }
      generateBtn.disabled = false;
      generateBtn.textContent = '✨ Generate Content';
      return;
    }
    
    if(data.content) {
      outputContent.innerHTML = data.content;
      outputBox.style.display = 'block';
      remainingSpan.textContent = data.remaining;
    }
  } catch(e) {
    loading.style.display = 'none';
    alert('Error: '+e.message);
  }
  generateBtn.disabled = false;
  generateBtn.textContent = '✨ Generate Content';
});

document.getElementById('copyBtn').addEventListener('click', () => {
  const text = outputContent.textContent;
  navigator.clipboard.writeText(text).then(() => showToast());
});

document.getElementById('copyHtmlBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(outputContent.innerHTML).then(() => showToast());
});

function showToast() {
  const t = document.getElementById('toast');
  t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 2000);
}
</script>
