<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>WHOIS Lookup Domain Lookup Tool | my-automaton</title><meta name="description" content="Lookup WHOIS information for any domain. See registrar, dates, nameservers. 100% free. Powered by my-automaton's AI API platform."><meta name="robots" content="noindex"><style>:root{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--accent:#38bdf8;--green:#4ade80;--border:#334155}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}header{background:var(--card);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap}header h1{font-size:1.25rem;color:var(--accent)}nav a{color:var(--muted);text-decoration:none;margin-left:1rem;font-size:.875rem}main{max-width:800px;margin:2rem auto;padding:0 1rem}.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem}.search-row{display:flex;gap:.5rem}.search-row input{flex:1;background:#0f172a;color:var(--text);border:1px solid var(--border);padding:.75rem;border-radius:8px;font-family:'Fira Code',monospace;font-size:.9rem}.search-row input:focus{outline:none;border-color:var(--accent)}.btn{padding:.5rem 1.5rem;border:none;border-radius:6px;cursor:pointer;font-size:.9rem;font-weight:600;background:var(--accent);color:#0f172a}.btn:hover{filter:brightness(1.15)}.result{background:#0f172a;border:1px solid var(--border);border-radius:8px;padding:1rem;font-family:'Fira Code',monospace;font-size:.82rem;white-space:pre-wrap;max-height:400px;overflow-y:auto;margin-top:1rem;line-height:1.5}.kv{display:inline-block;margin-right:1.5rem;margin-bottom:.3rem}.kv strong{color:var(--accent);font-weight:400}footer{text-align:center;padding:2rem;color:var(--muted);font-size:.8rem;border-top:1px solid var(--border);margin-top:2rem}footer a{color:var(--accent)}</style></head><body><header><h1>🔍 WHOIS Domain Lookup</h1><nav><a href="/">Home</a><a href="/dev-tools.html">Dev Tools</a><a href="/dev-tools-hub.html">Tools Hub</a></nav></header><main><div class="card"><div class="search-row"><input id="domain" placeholder="example.com" onkeydown="if(event.key==='Enter')lookup()"><button class="btn" onclick="lookup()">Lookup</button></div><div class="result" id="output">Enter a domain name and click Lookup. This tool uses the RDAP protocol (successor to WHOIS). Note: results depend on registry availability.</div></div></main><footer><p>my-automaton · Free WHOIS Lookup · <a href="/">Home</a> · <a href="/dev-tools-hub.html">All Tools</a></p></footer>
<script>
async function lookup(){const d=document.getElementById('domain').value.trim().replace(/^https?:\/\//,'').replace(/\/.*/,'');if(!d){document.getElementById('output').textContent='Please enter a domain name';return}document.getElementById('output').textContent='Looking up...';try{const r=await fetch('https://rdap.verisign.com/domain/'+encodeURIComponent(d));if(!r.ok)throw new Error('RDAP server returned '+r.status);const j=await r.json();let o='Domain: '+j.ldhName+'\n\n';const e=j.entities||[];for(const ent of e){if(ent.roles&&ent.roles.includes('registrar'))o+='Registrar: '+(ent.vcardArray?.[1]?.[1]?.[3]||'Unknown')+'\n'}for(const ev of j.events||[]){const a=ev.eventAction.replace(/^.*#/,'');o+=a.charAt(0).toUpperCase()+a.slice(1)+': '+new Date(ev.eventDate).toISOString().split('T')[0]+'\n'}if(j.nameservers){o+='\nNameservers:\n';j.nameservers.forEach(ns=>o+='  - '+ns.ldhName+'\n')}o+='\nStatus: '+(j.status||[]).join(', ');document.getElementById('output').textContent=o}catch(e){document.getElementById('output').textContent='Error: Could not query. RDAP lookup failed: '+e.message+'\n\nTry a different domain or check network connectivity.'}}
</script><script src="/conversion-banner.js" defer></script>
</body></html>
