<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch & Countdown Timer — Free Online Timer | my-automaton</title>
<meta name="description" content="Free online stopwatch and countdown timer. Stopwatch with lap recording, countdown timer with audio alert. 100% client-side, no signup.">
<style>
:root{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--accent:#38bdf8;--green:#4ade80;--red:#f87171;--border:#334155}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--card);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem}
header h1{font-size:1.25rem;color:var(--accent)}
nav a{color:var(--muted);text-decoration:none;margin-left:1rem;font-size:0.875rem}
nav a:hover{color:var(--accent)}
main{max-width:800px;margin:2rem auto;padding:0 1rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem}
.card h2{font-size:1.1rem;margin-bottom:1rem;color:var(--accent)}
.timer-display{text-align:center;font-size:3.5rem;font-weight:900;font-family:'Fira Code',monospace;color:var(--green);padding:1.5rem;background:#0f172a;border-radius:12px;border:1px solid var(--border);margin:1rem 0;letter-spacing:0.1em}
.btn-row{display:flex;gap:0.75rem;flex-wrap:wrap;justify-content:center;margin:1rem 0}
.btn{padding:0.65rem 1.25rem;border:none;border-radius:8px;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-primary{background:var(--accent);color:#0f172a}
.btn-primary:hover{filter:brightness(1.1)}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{filter:brightness(1.1)}
.btn-secondary{background:var(--border);color:var(--text)}
.laps{margin-top:0.5rem;max-height:200px;overflow-y:auto}
.laps .lap{display:flex;justify-content:space-between;padding:0.4rem 0.75rem;border-bottom:1px solid var(--border);font-size:0.85rem;font-family:'Fira Code',monospace}
.laps .lap:nth-child(odd){background:rgba(255,255,255,0.02)}
.time-inputs{display:flex;gap:0.5rem;align-items:center;justify-content:center;margin:1rem 0;flex-wrap:wrap}
.time-inputs input{width:65px;background:#0f172a;border:1px solid var(--border);color:var(--text);padding:0.6rem;border-radius:6px;font-family:'Fira Code',monospace;font-size:1.1rem;text-align:center}
.time-inputs span{color:var(--muted)}
footer{text-align:center;padding:2rem;color:var(--muted);font-size:0.8rem;border-top:1px solid var(--border);margin-top:2rem}
footer a{color:var(--accent)}
</style>
</head>
<body>
<header><h1>⏱ Stopwatch & Timer</h1>
<nav><a href="/">Home</a><a href="/dev-tools.html">All Tools</a><a href="/blog.html">Blog</a></nav></header>
<main>
<div class="card">
<h2>⏱ Stopwatch</h2>
<div class="timer-display" id="swDisplay">00:00:00.00</div>
<div class="btn-row">
<button class="btn btn-primary" id="swStartBtn" onclick="swStart()">▶ Start</button>
<button class="btn btn-secondary" onclick="swLap()">🏁 Lap</button>
<button class="btn btn-red" onclick="swReset()">↺ Reset</button>
</div>
<div class="laps" id="swLaps"></div>
</div>
<div class="card">
<h2>🔔 Countdown Timer</h2>
<div class="time-inputs">
<input type="number" id="ctHours" value="0" min="0" max="99" placeholder="HH"><span>h</span>
<input type="number" id="ctMins" value="5" min="0" max="59" placeholder="MM"><span>m</span>
<input type="number" id="ctSecs" value="0" min="0" max="59" placeholder="SS"><span>s</span>
</div>
<div class="timer-display" id="ctDisplay" style="color:var(--accent)">00:05:00</div>
<div class="btn-row">
<button class="btn btn-primary" id="ctStartBtn" onclick="ctStart()">▶ Start</button>
<button class="btn btn-secondary" onclick="ctPause()">⏸ Pause</button>
<button class="btn btn-red" onclick="ctReset()">↺ Reset</button>
</div>
</div>
</main>
<footer><p>my-automaton · <a href="/">Home</a> · <a href="/dev-tools.html">All Tools</a></p></footer>
<script>
let swInterval,swStarted=0,swElapsed=0,swLapTime=0,swLaps=[];
function fmt(ms){const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000),cs=Math.floor((ms%1000)/10);return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'.'+String(cs).padStart(2,'0');}
function swStart(){
  const btn=document.getElementById('swStartBtn');
  if(swStarted){clearInterval(swInterval);swStarted=0;swElapsed+=Date.now()-swLapTime;btn.textContent='▶ Start';btn.className='btn btn-primary';return;}
  swStarted=1;swLapTime=Date.now();btn.textContent='⏸ Pause';btn.className='btn btn-red';
  swInterval=setInterval(()=>{
    const total=swElapsed+(Date.now()-swLapTime);
    document.getElementById('swDisplay').textContent=fmt(total);
  },10);
}
function swLap(){
  if(!swStarted)return;
  const total=swElapsed+(Date.now()-swLapTime);
  swLaps.unshift(fmt(total));
  swElapsed=0;swLapTime=Date.now();
  document.getElementById('swLaps').innerHTML=swLaps.map((l,i)=>`<div class="lap"><span>Lap ${swLaps.length-i}</span><span>${l}</span></div>`).join('');
}
function swReset(){clearInterval(swInterval);swStarted=0;swElapsed=0;swLaps=[];document.getElementById('swDisplay').textContent='00:00:00.00';document.getElementById('swStartBtn').textContent='▶ Start';document.getElementById('swStartBtn').className='btn btn-primary';document.getElementById('swLaps').innerHTML='';}
let ctInterval,ctRunning=0,ctRemaining;
function ctStart(){
  if(ctRunning){return;}
  const h=parseInt(document.getElementById('ctHours').value)||0,m=parseInt(document.getElementById('ctMins').value)||0,s=parseInt(document.getElementById('ctSecs').value)||0;
  if(ctRemaining===undefined) ctRemaining=(h*3600+m*60+s)*1000;
  if(ctRemaining<=0) return;
  ctRunning=1;document.getElementById('ctStartBtn').textContent='▶ Running...';
  ctInterval=setInterval(()=>{
    ctRemaining-=10;if(ctRemaining<=0){ctRemaining=0;clearInterval(ctInterval);document.getElementById('ctDisplay').textContent='00:00:00';ctRunning=0;document.getElementById('ctStartBtn').textContent='▶ Start';try{const ctx=new AudioContext();const o=ctx.createOscillator();o.type='sine';o.frequency.value=800;o.connect(ctx.destination);o.start();setTimeout(()=>o.stop(),500);}catch(e){}}
    document.getElementById('ctDisplay').textContent=fmt(ctRemaining);
  },10);
}
function ctPause(){clearInterval(ctInterval);ctRunning=0;document.getElementById('ctStartBtn').textContent='▶ Resume';}
function ctReset(){clearInterval(ctInterval);ctRunning=0;ctRemaining=undefined;document.getElementById('ctDisplay').textContent='00:00:00';document.getElementById('ctStartBtn').textContent='▶ Start';}
</script>
<script src="/conversion-banner.js" defer></script>
</body>
</html>
