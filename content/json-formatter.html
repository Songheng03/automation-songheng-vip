<script>
const samples={simple:'{"name":"Alice","age":28,"active":true}',nested:'{"user":{"name":"Bob","address":{"city":"Boston","state":"MA"}},"scores":[85,92,78]}',array:'[{"id":1,"name":"Widget","price":9.99},{"id":2,"name":"Gadget","price":24.50},{"id":3,"name":"Doohickey","price":3.25}]',complex:'{"store":{"name":"TechShop","location":{"lat":40.7128,"lng":-74.006},"inventory":[{"item":"laptop","price":999.99,"stock":42,"specs":{"ram":"16GB","ssd":"512GB"}},{"item":"phone","price":699.99,"stock":128,"specs":{"ram":"8GB","storage":"256GB"}}],"open":true,"rating":4.5,"tags":["electronics","computers"]}}'};
let lastParsed=null;
function load(n){document.getElementById('jsonInput').value=samples[n];format()}
function parse(){document.getElementById('errorMsg').textContent='';document.getElementById('successMsg').textContent='';try{return JSON.parse(document.getElementById('jsonInput').value)}catch(e){document.getElementById('errorMsg').textContent='❌ '+e.message;return null}}
function autoFormat(){const t=setTimeout(()=>{clearTimeout(t);format()},400)}
function format(){
  const d=parse();if(!d)return;
  const formatted=JSON.stringify(d,null,2);
  document.getElementById('jsonInput').value=formatted;lastParsed=d;
  document.getElementById('successMsg').textContent='✅ Valid JSON';
  renderStats(d);renderTree(d);
}
function minify(){
  const d=parse();if(!d){return}
  const m=JSON.stringify(d);
  document.getElementById('jsonInput').value=m;lastParsed=d;
  document.getElementById('successMsg').textContent='✅ Minified ('+m.length+' chars)';
  renderStats(d);renderTree(d);
}
function validate(){const d=parse();if(d){document.getElementById('successMsg').textContent='✅ Valid JSON — '+JSON.stringify(d).length+' chars';renderStats(d);renderTree(d)}}
function renderStats(d){
  const s=JSON.stringify(d);
  let keys=0;function countKeys(o){if(Array.isArray(o))o.forEach(countKeys);else if(o&&typeof o==='object'){Object.keys(o).forEach(k=>{keys++;countKeys(o[k])})}}
  countKeys(d);
  const depth=function getDepth(o){if(!o||typeof o!=='object')return 0;if(Array.isArray(o))return 1+Math.max(0,...o.map(getDepth));return 1+Math.max(0,...Object.values(o).map(getDepth))}(d);
  document.getElementById('stats').innerHTML='<span>📏 '+s.length+' chars</span><span>🔑 '+keys+' keys</span><span>📊 depth: '+depth+'</span><span>'+(Array.isArray(d)?'📋 array['+d.length+']':'📦 object')+'</span>';
}
function renderTree(d,indent=0){
  if(d===null)return'<span class="tree-null">null</span>';
  if(typeof d==='boolean')return'<span class="tree-bool">'+d+'</span>';
  if(typeof d==='number')return'<span class="tree-number">'+d+'</span>';
  if(typeof d==='string')return'<span class="tree-string">"'+d.replace(/"/g,'&quot;')+'"</span>';
  if(Array.isArray(d)){
    if(d.length===0)return'<span class="tree-bracket">[]</span>';
    const id='arr_'+Math.random().toString(36).slice(2);
    let html='<span class="toggle" onclick="toggleNode(\''+id+'\')" id="t_'+id+'">▼</span><span class="tree-bracket">[</span><span id="c_'+id+'"><br>';
    html+=d.map((v,i)=>'  '.repeat(indent+1)+'<span class="tree-key">'+i+':</span> '+renderTree(v,indent+1)+(i<d.length-1?',':'')).join('<br>');
    html+='</span><span class="tree-bracket">]</span>';
    return html;
  }
  if(typeof d==='object'){
    const keys=Object.keys(d);
    if(keys.length===0)return'<span class="tree-bracket">{}</span>';
    const id='obj_'+Math.random().toString(36).slice(2);
    let html='<span class="toggle" onclick="toggleNode(\''+id+'\')" id="t_'+id+'">▼</span><span class="tree-bracket">{</span><span id="c_'+id+'"><br>';
    html+=keys.map((k,i)=>'  '.repeat(indent+1)+'<span class="tree-key">"'+k+'":</span> '+renderTree(d[k],indent+1)+(i<keys.length-1?',':'')).join('<br>');
    html+='</span><span class="tree-bracket">}</span>';
    return html;
  }
  return String(d);
}
function toggleNode(id){
  const c=document.getElementById('c_'+id),t=document.getElementById('t_'+id);
  if(c.style.display==='none'){c.style.display='';t.textContent='▼'}else{c.style.display='none';t.textContent='▶'}
}
function copyFormatted(){if(lastParsed)navigator.clipboard.writeText(JSON.stringify(lastParsed,null,2))}
function downloadJSON(){if(lastParsed){const a=document.createElement('a');a.href='data:application/json,'+encodeURIComponent(JSON.stringify(lastParsed,null,2));a.download='formatted.json';a.click()}}
setTimeout(format,200);
</script><script src="/conversion-banner.js" defer></script>
