<script>
function syntaxJSON(obj){
  const s=JSON.stringify(obj,null,2);
  return s.replace(/("(?:[^"\\]|\\.)*")\s*:/g,'<span class="json-key">$1</span>:')
    .replace(/: (".*?")/g,': <span class="json-str">$1</span>')
    .replace(/: (\d+\.?\d*)/g,': <span class="json-num">$1</span>')
    .replace(/: (true|false)/g,': <span class="json-bool">$1</span>')
    .replace(/: (null)/g,': <span class="json-null">$1</span>');
}
function decodeJWT(){
  const v=document.getElementById('jwtInput').value.trim();
  const r=document.getElementById('results'),e=document.getElementById('errMsg');
  if(!v){r.style.display='none';e.textContent='';return}
  const parts=v.split('.');
  if(parts.length!==3){e.textContent='❌ Invalid JWT: must have 3 parts (header.payload.signature)';r.style.display='none';return}
  e.textContent='';
  try{
    const header=JSON.parse(atob(parts[0].replace(/-/g,'+').replace(/_/g,'/')));
    const payload=JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')));
    r.style.display='block';
    document.getElementById('headerOut').innerHTML=syntaxJSON(header);
    document.getElementById('payloadOut').innerHTML=syntaxJSON(payload);
    document.getElementById('sigOut').textContent=parts[2].substring(0,50)+(parts[2].length>50?'...':'');
    const alg=header.alg||'unknown';
    const ab=document.getElementById('algBadge');
    ab.textContent='Algorithm: '+alg;
    ab.className='badge '+(alg.startsWith('HS')?'badge-ok ':alg==='none'?'badge-err ':'badge-warn ');
    const claims=[];
    const now=Math.floor(Date.now()/1000);
    for(const[k,v]of Object.entries(payload)){
      let display=v;
      if(k==='iat'||k==='exp'||k==='nbf'){
        const d=new Date(v*1000);
        const extra=k==='exp'?(v<now?' ⚠️ EXPIRED':` (${Math.floor((v-now)/60)}min left)`):k==='iat'?' (issued)':'';
        display=v+' — '+d.toLocaleString()+extra;
      }
      claims.push({key:k,val:String(display)});
    }
    if(payload.exp){
      const expired=payload.exp<now;
      claims.unshift({key:'Status',val:expired?'⚠️ EXPIRED':'✅ Valid'+(payload.iat?' (issued '+new Date(payload.iat*1000).toLocaleString()+')':'')});
    }
    document.getElementById('claimsOut').innerHTML=claims.map(c=>'<div class="claim-item"><div class="key">'+c.key+'</div><div class="val">'+c.val+'</div></div>').join('');
  }catch(err){e.textContent='❌ Decode failed: '+err.message;r.style.display='none'}
}
setTimeout(decodeJWT,100);
