<div style="background:#161b22;border-bottom:1px solid #30363d;padding:10px 20px;font-size:.85rem;display:flex;gap:16px;align-items:center;flex-wrap:wrap"><a href="/" style="color:#58a6ff;text-decoration:none;font-weight:600">🏠 Home</a><span style="color:#484f58">|</span><a href="/pricing.html" style="color:#8b949e;text-decoration:none">Pricing</a><a href="/api-docs.html" style="color:#8b949e;text-decoration:none">API</a><a href="/playground.html" style="color:#8b949e;text-decoration:none">Playground</a></div>
<h1>📋 PasteBin</h1><p style="color:#888">Share code or text. No signup required.</p>
<textarea id="paste-input" placeholder="Paste your code or text here..."></textarea><br>
<button onclick="createPaste()">Create Paste</button>
<div class="result" id="result"><strong>Paste created!</strong><br><a id="paste-link" href="#" target="_blank"></a><br><span id="paste-id" style="color:#666;font-size:.85rem"></span></div>
<script>async function createPaste(){const c=document.getElementById('paste-input').value.trim();if(!c)return alert('Enter text');try{const r=await fetch('/api/paste',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:c})});const d=await r.json();document.getElementById('result').style.display='block';document.getElementById('paste-link').textContent=window.location.origin+'/paste/'+d.id;document.getElementById('paste-link').href='/paste/'+d.id;document.getElementById('paste-id').textContent='ID: '+d.id}catch(e){alert('Error: '+e.message)}}</script><div class="share-bar" style="position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;gap:8px;background:rgba(0,0,0,0.85);padding:10px 14px;border-radius:30px;backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(0,0,0,0.3)">
<button onclick="window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(document.title)+'&url='+encodeURIComponent(location.href),'_blank')" style="background:#1DA1F2;border:none;color:white;padding:8px 12px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:bold">X</button>
<button onclick="window.open('https://www.linkedin.com/sharing/share-offsite/?url='+encodeURIComponent(location.href),'_blank')" style="background:#0A66C2;border:none;color:white;padding:8px 12px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:bold">in</button>
<button onclick="window.open('https://reddit.com/submit?url='+encodeURIComponent(location.href)+'&title='+encodeURIComponent(document.title),'_blank')" style="background:#FF4500;border:none;color:white;padding:8px 12px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:bold">r</button>
</div>
<script src="/js/share-widget.js"></script>
<script src="/conversion-banner.js" defer></script>
</body></html>
