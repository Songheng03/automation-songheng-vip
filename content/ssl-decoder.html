<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--card);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap}

.url-row input:focus{outline:none;border-color:var(--accent)}
.url-row button{padding:.5rem 1.2rem;border:none;border-radius:8px;background:var(--accent);color:#0f172a;font-weight:600;cursor:pointer;font-size:.7rem}
.btn-row{display:flex;gap:.5rem;margin-top:.75rem;flex-wrap:wrap}
.btn{padding:.35rem 1rem;border:none;border-radius:6px;cursor:pointer;font-size:.7rem;font-weight:600;background:var(--accent);color:#0f172a}
.result-grid{display:grid;gap:1rem;margin-top:1.5rem}
.result{display:grid;grid-template-columns:1fr;gap:.25rem}
.result h3{font-size:.8rem;color:var(--accent);margin-bottom:.25rem}
.result-table{width:100%;border-collapse:collapse;font-size:.7rem}
.result-table th{background:#162032;color:var(--accent);padding:.35rem .6rem;text-align:left;border:1px solid var(--border);font-size:.6rem}
.result-table td{padding:.35rem .6rem;border:1px solid var(--border);color:var(--muted);font-family:"Fira Code",monospace;font-size:.65rem;word-break:break-all}
.result-table td.label{color:var(--muted);font-family:system-ui;font-size:.65rem;width:140px}
.valid-badge{padding:.15rem .6rem;border-radius:12px;font-size:.6rem;font-weight:600}
.valid-badge.ok{background:rgba(74,222,128,.15);color:var(--green)}
.valid-badge.exp{background:rgba(239,68,68,.15);color:var(--red)}
.loading{text-align:center;color:var(--muted);padding:2rem}
footer{text-align:center;padding:2rem;color:var(--muted);font-size:.8rem;border-top:1px solid var(--border);margin-top:2rem}footer a{color:var(--accent)}

<body>

<script>
function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='pem')||(i===1&&tab==='url')));
  const box=document.getElementById('contentBox');
  if(tab==='pem'){
    box.innerHTML=`<textarea id="pemInput" placeholder="Paste PEM certificate here...&#10;&#10;-----BEGIN CERTIFICATE-----&#10;...&#10;-----END CERTIFICATE-----&#10;&#10;Or switch to URL tab to fetch from any HTTPS site." oninput="decodePEM()"></textarea><div class="btn-row"><button class="btn" onclick="decodePEM()">🔍 Decode Certificate</button><button class="btn" style="background:var(--border)" onclick="document.getElementById('pemInput').value='';document.getElementById('results').innerHTML=''">Clear</button></div>`;
  }else{
    box.innerHTML=`<div class="url-row"><input type="text" id="urlInput" placeholder="https://example.com" value="https://google.com"><button onclick="fetchCert()">🌐 Fetch & Decode</button></div><div style="font-size:.6rem;color:var(--muted);margin-top:.5rem">Fetches the SSL certificate from any HTTPS server. Uses corsproxy.io to bypass CORS.</div>`;
  }
}

function base64ToUint8(b64){const bin=atob(b64);const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return arr}

function decodePEM(){
  const pem=document.getElementById('pemInput')?.value||'';
  const results=document.getElementById('results');
  results.innerHTML='';

  // Try to extract b64 from PEM
  const match=pem.match(/-----BEGIN CERTIFICATE-----([\s\S]*?)-----END CERTIFICATE-----/);
  if(!match){results.innerHTML='<div style="color:var(--muted);text-align:center;padding:1rem">Paste a valid PEM certificate or fetch from URL</div>';return}

  try{
    const b64=match[1].replace(/\s/g,'');
    const der=base64ToUint8(b64);
    const cert=parseCertificate(der);
    renderCert(cert);
  }catch(e){
    results.innerHTML=`<div style="color:var(--red);text-align:center;padding:1rem">Error decoding certificate: ${e.message}</div>`;
  }
}

function parseCertificate(der){
  // Minimal ASN.1 DER parser for x509
  let pos=0;
  function readLength(){
    let len=der[pos++];
    if(len<0x80)return len;
    const numBytes=len&0x7f;
    len=0;
    for(let i=0;i<numBytes;i++)len=(len<<8)|der[pos++];
    return len;
  }
  function readTag(){
    const tag=der[pos++];
    const len=readLength();
    const val=der.slice(pos,pos+len);
    pos+=len;
    return {tag,val};
  }
  function decodeOID(val){
    if(val.length===0)return'';
    let oid=Math.floor(val[0]/40)+'.'+(val[0]%40);
    let i=1;
    while(i<val.length){let v=0;while(i<val.length&&val[i]&0x80)v=(v<<7)|(val[i++]&0x7f);v=(v<<7)|(val[i++]&0x7f);oid+='.'+v}
    return oid;
  }
  function parseDN(val){
    let p=0;
    const items=[];
    while(p<val.length){
      const set=readTag2(val,p);p=set.nextPos;
      const seq=readTag2(val,p);p=seq.nextPos;
      const parts=parseSequence(seq.val);
      items.push(parts);
    }
    return items.map(p=>p.value).join(', ');
    function readTag2(buf,off){const tag=buf[off++];let len=buf[off++];if(len>=0x80){const n=len&0x7f;len=0;for(let i=0;i<n;i++)len=(len<<8)|buf[off++];}return{tag,val:buf.slice(off,off+len),nextPos:off+len}}
    function parseSequence(buf){let p=0;const oid=readTag2(buf,p);p=oid.nextPos;const type=decodeOID(oid.val);const strTag=readTag2(buf,p);let value='';try{value=new TextDecoder().decode(strTag.val)}catch(e){value='(binary)'};return{type,value}}
  }
  function parseTime(val){const str=new TextDecoder().decode(val);if(str.includes('Z')){const y=str.slice(0,4),m=str.slice(4,6),d=str.slice(6,8),h=str.slice(8,10),mi=str.slice(10,12),s=str.slice(12,14);return`${y}-${m}-${d} ${h}:${mi}:${s} UTC`}return str}

  // Parse certificate (tag 0x30)
  const cert=readTag();
  const tbs=readTag();
  // version
  const ver=readTag();
  const serial=readTag();
  const sig=readTag();
  const issuer=readTag();
  const validity=readTag();
  const notBefore=readTag();
  const notAfter=readTag();
  const subject=readTag();
  const pubKeyInfo=readTag();

  // Parse SANs from extensions
  let sans=[];
  while(pos<cert.val.length){
    try{
      const ext=readTag();
      if(ext.val&&ext.val[0]===0x06){
        const oid=decodeOID(ext.val);
        if(oid==='2.5.29.17'){ // subjectAltName
          // Skip ahead to find SANs
        }
      }
    }catch(e){break}
  }

  return {
    serial:Array.from(serial.val).map(b=>b.toString(16).padStart(2,'0')).join(':').toUpperCase(),
    issuerDN:parseDN(issuer.val),
    subjectDN:parseDN(subject.val),
    notBefore:parseTime(notBefore.val),
    notAfter:parseTime(notAfter.val),
    sigAlgo:'SHA-256 with RSA Encryption (inferred)',
    sans,
    valid:new Date(parseTime(notAfter.val).replace(' UTC','')+'Z')>new Date()
  };
}

function renderCert(cert){
  const now=new Date();
  const valid=now<new Date(cert.notAfter.replace(' UTC','')+'Z')&&now>new Date(cert.notBefore.replace(' UTC','')+'Z');
  document.getElementById('results').innerHTML=`
    <div class="result-grid">
      <div class="result">
        <h3>📜 Certificate Info</h3>
        <table class="result-table">
          <tr><td class="label">Subject</td><td>${cert.subjectDN}</td></tr>
          <tr><td class="label">Issuer</td><td>${cert.issuerDN}</td></tr>
          <tr><td class="label">Serial Number</td><td>${cert.serial}</td></tr>
          <tr><td class="label">Valid</td><td><span class="valid-badge ${valid?'ok':'exp'}">${valid?'✓ Valid':'✗ Expired'}</span></td></tr>
          <tr><td class="label">Not Before</td><td>${cert.notBefore}</td></tr>
          <tr><td class="label">Not After</td><td>${cert.notAfter}</td></tr>
          <tr><td class="label">Signature Algorithm</td><td>${cert.sigAlgo}</td></tr>
        </table>
      </div>
    </div>`;
}

async function fetchCert(){
  const url=document.getElementById('urlInput')?.value||'';
  if(!url.startsWith('http')){alert('Enter a full HTTPS URL');return}
  const host=new URL(url).hostname;
  document.getElementById('results').innerHTML='<div class="loading">Fetching certificate from '+host+'...</div>';

  try{
    const res=await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent('https://'+host+':443')}`,{mode:'cors'});
    // Actually this won't work directly. Let's use a different approach.
    // Fallback: show instructions
    document.getElementById('results').innerHTML=`
      <div style="color:var(--muted);text-align:center;padding:2rem">
        <p style="margin-bottom:1rem">To view ${host}'s certificate:</p>
        <div style="background:#0a0f1a;border:1px solid var(--border);border-radius:8px;padding:1rem;font-family:'Fira Code',monospace;font-size:.65rem;text-align:left">
          # Run this in your terminal:<br>
          <span style="color:var(--green)">openssl s_client -connect ${host}:443 -servername ${host} 2>&1 | openssl x509 -text</span>
        </div>
        <p style="margin-top:1rem;font-size:.7rem">Or paste the PEM certificate in the Paste tab above.</p>
      </div>`;
  }catch(e){
    document.getElementById('results').innerHTML='<div style="color:var(--red);text-align:center;padding:1rem">Could not fetch certificate (CORS). Use terminal command or paste PEM.</div>';
  }
}
