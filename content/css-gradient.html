<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Gradient Generator — Create CSS Gradients Online | my-automaton</title>
<meta name="description" content="Create beautiful CSS linear and radial gradients. Add multiple color stops, adjust angles, copy CSS code instantly. 100% free, no signup, client-side.">
<style>
:root{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--accent:#38bdf8;--green:#4ade80;--border:#334155}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--card);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap}
header h1{font-size:1.25rem;color:var(--accent)}
nav a{color:var(--muted);text-decoration:none;margin-left:1rem;font-size:.875rem}
main{max-width:700px;margin:2rem auto;padding:0 1.5rem}
.preview-area{height:200px;border-radius:12px;margin-bottom:1rem;transition:background .2s;border:1px solid var(--border)}
.controls{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.controls select{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:.35rem .5rem;font-size:.65rem}
.controls input[type="range"]{accent-color:var(--accent);width:100px}
.controls label{font-size:.65rem;color:var(--muted)}
.stops{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.stop-item{display:flex;align-items:center;gap:.3rem;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.4rem .6rem}
.stop-item input[type="color"]{width:28px;height:28px;border:none;background:none;cursor:pointer;padding:0}
.stop-item input[type="color"]::-webkit-color-swatch-wrapper{padding:0}
.stop-item input[type="color"]::-webkit-color-swatch{border:none;border-radius:4px}
.stop-item input[type="range"]{width:70px;accent-color:var(--accent)}
.stop-item span{font-size:.55rem;color:var(--muted);min-width:30px;text-align:right;font-family:"Fira Code",monospace}
.stop-item .remove-btn{padding:.15rem .4rem;border:1px solid var(--border);border-radius:4px;background:transparent;color:#f87171;cursor:pointer;font-size:.6rem}
.code-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem}
.code-box h3{font-size:.8rem;color:var(--accent);margin-bottom:.5rem;display:flex;justify-content:space-between;align-items:center}
.code-box pre{background:#0a0f1a;border-radius:8px;padding:.75rem;font-family:"Fira Code",monospace;font-size:.7rem;color:var(--green);white-space:pre-wrap;word-break:break-all;margin:0}
.btn-row{display:flex;gap:.5rem;margin-top:.5rem}
.btn{padding:.35rem 1rem;border:none;border-radius:6px;cursor:pointer;font-size:.7rem;font-weight:600}
.btn-primary{background:var(--accent);color:#0f172a}
.btn-green{background:var(--green);color:#0f172a}
.btn:hover{filter:brightness(1.15)}
footer{text-align:center;padding:2rem;color:var(--muted);font-size:.8rem;border-top:1px solid var(--border);margin-top:2rem}footer a{color:var(--accent)}
</style>
</head>
<body>
<header><h1>🎨 CSS Gradient Generator</h1><nav><a href="/">Home</a><a href="/dev-tools.html">Tools</a><a href="/api-playground.html">API</a></nav></header>
<main>
<div class="preview-area" id="preview"></div>
<div class="controls">
  <label>Type:</label>
  <select id="gradientType" onchange="updateGradient()">
    <option value="linear">Linear</option>
    <option value="radial">Radial</option>
  </select>
  <label>Angle:</label>
  <input type="range" id="angle" min="0" max="360" value="135" oninput="updateAngle()">
  <span style="font-family:'Fira Code',monospace;font-size:.65rem;color:var(--accent)" id="angleVal">135°</span>
</div>
<div class="stops" id="stopsContainer"></div>
<div style="margin-bottom:.5rem"><button class="btn btn-primary" onclick="addStop()" style="font-size:.6rem;padding:.2rem .7rem">+ Add Color Stop</button></div>
<div class="code-box">
  <h3>📋 CSS Code <button class="btn btn-green" onclick="copyCSS()" style="font-size:.6rem;padding:.2rem .7rem">📋 Copy</button></h3>
  <pre id="cssOutput"></pre>
</div>
</main>
<footer><p>my-automaton · Free CSS Gradient Generator · <a href="/dev-tools.html">All Tools</a> · <a href="/api-docs.html">API Docs</a></p></footer>
<script>
let stops=[{color:'#667eea',pos:0},{color:'#764ba2',pos:100}];

function renderStops(){
  const c=document.getElementById('stopsContainer');
  c.innerHTML=stops.map((s,i)=>`
    <div class="stop-item">
      <input type="color" value="${s.color}" onchange="updateStopColor(${i},this.value)">
      <input type="range" min="0" max="100" value="${s.pos}" oninput="updateStopPos(${i},this.value)" title="Position">
      <span>${s.pos}%</span>
      ${stops.length>2?`<button class="remove-btn" onclick="removeStop(${i})">✕</button>`:''}
    </div>
  `).join('');
}

function updateStopColor(i,v){stops[i].color=v;updateGradient()}
function updateStopPos(i,v){stops[i].pos=parseInt(v);renderStops();updateGradient()}
function removeStop(i){stops.splice(i,1);renderStops();updateGradient()}
function addStop(){const mid=stops.length>1?Math.round((stops[stops.length-1].pos+stops[0].pos)/2):50;stops.push({color:'#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0'),pos:mid});stops.sort((a,b)=>a.pos-b.pos);renderStops();updateGradient()}

function updateAngle(){
  const v=document.getElementById('angle').value;
  document.getElementById('angleVal').textContent=v+'°';
  updateGradient();
}

function buildGradient(){
  const type=document.getElementById('gradientType').value;
  const angle=document.getElementById('angle').value;
  const sorted=[...stops].sort((a,b)=>a.pos-b.pos);
  const colorStops=sorted.map(s=>`${s.color} ${s.pos}%`).join(', ');

  if(type==='linear')return `linear-gradient(${angle}deg, ${colorStops})`;
  return `radial-gradient(circle, ${colorStops})`;
}

function updateGradient(){
  const grad=buildGradient();
  document.getElementById('preview').style.background=grad;
  document.getElementById('cssOutput').textContent=`background: ${grad};`;
}

function copyCSS(){const css=document.getElementById('cssOutput').textContent;if(css)navigator.clipboard.writeText(css)}

renderStops();
updateGradient();
</script>
<script src="/conversion-banner.js" defer></script>
</body>
</html>
