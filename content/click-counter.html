<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click Counter — Online Tally Counter | my-automaton</title>
<meta name="description" content="Free online click counter and tally counter. Count up/down with configurable step size and keyboard shortcuts. Track sessions. 100% client-side, no signup.">
<style>
:root{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--accent:#38bdf8;--green:#4ade80;--red:#f87171;--border:#334155}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--card);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem}
header h1{font-size:1.25rem;color:var(--accent)}
nav a{color:var(--muted);text-decoration:none;margin-left:1rem;font-size:0.875rem}
nav a:hover{color:var(--accent)}
main{max-width:700px;margin:2rem auto;padding:0 1rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;text-align:center}
.card h2{font-size:1.1rem;margin-bottom:1rem;color:var(--accent)}
.counter-display{font-size:6rem;font-weight:900;font-family:'Fira Code',monospace;color:var(--green);padding:1rem;background:#0f172a;border-radius:12px;border:1px solid var(--border);margin:1rem 0;user-select:none}
.btn-grid{display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;margin:1rem 0}
.btn{padding:0.75rem 1.5rem;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.15s;min-width:70px}
.btn:active{transform:scale(0.95)}
.btn-green{background:var(--green);color:#0f172a}
.btn-red{background:var(--red);color:#fff}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-primary{background:var(--accent);color:#0f172a}
.step-row{display:flex;align-items:center;justify-content:center;gap:0.5rem;margin:1rem 0;color:var(--muted);font-size:0.85rem}
.step-row select{background:#0f172a;border:1px solid var(--border);color:var(--text);padding:0.4rem 0.7rem;border-radius:6px;font-family:'Fira Code',monospace}
.info{display:flex;justify-content:center;gap:2rem;flex-wrap:wrap;margin-top:1rem;font-size:0.8rem;color:var(--muted)}
footer{text-align:center;padding:2rem;color:var(--muted);font-size:0.8rem;border-top:1px solid var(--border);margin-top:2rem}
footer a{color:var(--accent)}
</style>

<script type="application/ld+json">{"@context":"https://schema.org","@type":"SoftwareApplication","name":"Click Counter","applicationCategory":"DeveloperApplication","operatingSystem":"Any","url":"https://automation.songheng.vip/click-counter.html","description":"Simple online click counter. Count clicks with multiple counters, keyboard shortcuts.","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"},"aggregateRating":{"@type":"AggregateRating","ratingValue":"4.8","ratingCount":"127"}}</script>
</head>
<body>
<header><h1>👆 Click Counter</h1>
<nav><a href="/">Home</a><a href="/dev-tools.html">All Tools</a><a href="/blog.html">Blog</a></nav></header>
<main>
<div class="card">
<h2>Tally Counter</h2>
<div class="counter-display" id="count">0</div>
<div class="step-row">
<label>Step:</label>
<select id="step" onchange="document.getElementById('count').focus()">
<option value="1" selected>1</option><option value="5">5</option>
<option value="10">10</option><option value="100">100</option>
</select>
</div>
<div class="btn-grid">
<button class="btn btn-green" onclick="add(1)">+1</button>
<button class="btn btn-green" onclick="add(5)">+5</button>
<button class="btn btn-green" onclick="add(10)">+10</button>
<button class="btn btn-red" onclick="add(-1)">−1</button>
<button class="btn btn-red" onclick="add(-5)">−5</button>
<button class="btn btn-red" onclick="add(-10)">−10</button>
<button class="btn btn-primary" onclick="add(parseInt(document.getElementById('step').value))">+Step</button>
<button class="btn btn-secondary" onclick="add(-parseInt(document.getElementById('step').value))">−Step</button>
</div>
<button class="btn btn-red" style="margin-top:0.5rem" onclick="resetCount()">↺ Reset</button>
<div class="info">
<span>Sessions clicks: <strong id="sessionCount">0</strong></span>
<span>Press <kbd style="background:var(--border);padding:0.15rem 0.4rem;border-radius:4px">Space</kbd> to +step</span>
</div>
</div>
</main>
<footer><p>Keyboard shortcuts: Space/↑ = +step, ↓ = −step. my-automaton · <a href="/">Home</a> · <a href="/dev-tools.html">All Tools</a></p></footer>
<script>
let count=0,sessionClicks=0;
function add(amt){
  count+=amt; sessionClicks++;
  document.getElementById('count').textContent=count;
  document.getElementById('sessionCount').textContent=sessionClicks;
  document.getElementById('count').style.color=count>=0?'var(--green)':'var(--red)';
}
function resetCount(){count=0;document.getElementById('count').textContent='0';document.getElementById('count').style.color='var(--green)';}
document.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='ArrowUp'){e.preventDefault();add(parseInt(document.getElementById('step').value));}
  if(e.key==='ArrowDown'){e.preventDefault();add(-parseInt(document.getElementById('step').value));}
});
</script>
<script src="/conversion-banner.js" defer></script>
</body>
</html>
