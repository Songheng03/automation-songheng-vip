# my-automaton AI Code Review — GitHub Action
# Add to your repo: .github/workflows/ai-code-review.yml
#
# Automatically reviews every pull request using my-automaton's AI.
# Free tier: 3 reviews/day. Paid: buy credits at https://automation.songheng.vip/get-started.html
#
# Wallet: 0x76eADdEBFfb6A61DD071f97F4508467fc55dd113 (Base chain)
# Docs: https://automation.songheng.vip/api-docs.html

name: AI Code Review
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- . \
            | grep -v '^diff --git' \
            | grep -v '^index ' \
            | grep -v '^--- ' \
            | grep -v '^\+\+\+ ' \
            | head -20000)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Detect languages
        id: languages
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- .)
          EXTS=""
          for f in $FILES; do
            case "$f" in
              *.js|*.jsx) EXTS="$EXTS javascript" ;;
              *.ts|*.tsx) EXTS="$EXTS typescript" ;;
              *.py) EXTS="$EXTS python" ;;
              *.go) EXTS="$EXTS go" ;;
              *.rs) EXTS="$EXTS rust" ;;
              *.java) EXTS="$EXTS java" ;;
              *.sol) EXTS="$EXTS solidity" ;;
              *.rb) EXTS="$EXTS ruby" ;;
              *.php) EXTS="$EXTS php" ;;
              *.swift) EXTS="$EXTS swift" ;;
              *.kt) EXTS="$EXTS kotlin" ;;
              *.c|*.cpp|*.h) EXTS="$EXTS cpp" ;;
              *.cs) EXTS="$EXTS csharp" ;;
            esac
          done
          LANG=$(echo "$EXTS" | tr ' ' '\n' | sort -u | head -1)
          echo "language=${LANG:-javascript}" >> $GITHUB_OUTPUT

      - name: Submit for AI Review
        id: review
        run: |
          if [ -z "${{ secrets.MY_AUTOMATON_KEY }}" ]; then
            # Free tier — 3/day per IP
            ENDPOINT="https://automation.songheng.vip/free/review"
          else
            ENDPOINT="https://automation.songheng.vip/v1/review"
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$ENDPOINT" \
            -H "Content-Type: application/json" \
            ${MY_AUTOMATON_KEY:+-H "X-API-Key: ${{ secrets.MY_AUTOMATON_KEY }}"} \
            -d "{
              \"code\": $(echo '${{ steps.diff.outputs.diff }}' | jq -Rs .),
              \"language\": \"${{ steps.languages.outputs.language }}\",
              \"context\": {
                \"repo\": \"${{ github.repository }}\",
                \"pr\": ${{ github.event.pull_request.number }},
                \"author\": \"${{ github.event.pull_request.user.login }}\"
              }
            }")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = JSON.parse(`${{ steps.review.outputs.body }}`);
            const httpCode = Number(`${{ steps.review.outputs.http_code }}`);
            
            if (httpCode === 402) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 🤖 AI Code Review — Credits Exhausted\n\nMy API credits are used up for today.\n[Get an API key](https://automation.songheng.vip/get-started.html) to continue using automated reviews.\n\n*Powered by [my-automaton](https://automation.songheng.vip)*`
              });
              return;
            }

            if (httpCode !== 200 || !body) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## ❌ AI Code Review — Error\n\nUnable to review this PR. HTTP ${httpCode}\n\n*Powered by [my-automaton](https://automation.songheng.vip)*`
              });
              return;
            }

            const score = body.score || body.quality_score || 'N/A';
            const issues = body.issues || body.findings || [];
            const summary = body.summary || body.overview || '';

            let reviewBody = `## 🤖 AI Code Review\n\n`;
            reviewBody += `**Quality Score:** ${score}\n\n`;
            
            if (summary) {
              reviewBody += `${summary}\n\n`;
            }

            if (issues.length > 0) {
              reviewBody += `### Issues Found (${issues.length})\n\n`;
              reviewBody += `| Severity | Issue | Line |\n|----------|-------|------|\n`;
              for (const issue of issues.slice(0, 20)) {
                const sev = issue.severity || issue.type || 'info';
                const emoji = sev.toLowerCase().includes('critical') || sev.toLowerCase().includes('high') ? '🔴' :
                              sev.toLowerCase().includes('medium') ? '🟡' : '🟢';
                reviewBody += `| ${emoji} ${sev} | ${(issue.message || issue.description || '').slice(0, 100)} | ${issue.line || issue.start_line || 'N/A'} |\n`;
              }
              reviewBody += '\n';
            }

            reviewBody += `---\n*Reviewed by [my-automaton](https://automation.songheng.vip) · [Get your own API key](https://automation.songheng.vip/get-started.html)*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: reviewBody
            });
