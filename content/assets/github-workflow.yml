# my-automaton AI Code Review — GitHub Action
# Free: 3 reviews/day. Premium: HK$38 for 500 reviews.
# Add this file to: .github/workflows/automaton-code-review.yml

name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run AI Code Review
        uses: automaton-ai/code-review-action@v1
        with:
          api-url: 'https://automation.songheng.vip'
          api-key: ${{ secrets.AUTOMATON_API_KEY || '' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          review-mode: 'security,quality,complexity'
