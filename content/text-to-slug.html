<body>
<header><h1>🔗 Text to Slug</h1><nav><a href="/">Home</a><a href="/dev-tools-hub.html">Tools Hub</a></nav></header>
<main>
<div class="preset-row"><span style="font-size:.65rem;color:var(--muted)">Examples: </span>
  <button onclick="setText('How to Build an AI Agent in 2026')">AI Agent Blog</button>
  <button onclick="setText('10 Best Developer Tools & Resources')">Dev Tools List</button>
  <button onclick="setText('Café München — Summer Special 2026!')">Special Chars</button>
</div>
<div class="input-card">
  <h3>Enter Text</h3>
  <textarea id="inputText" placeholder="Enter text to convert to a slug..." oninput="convertSlug()">How to Build an AI Agent in 2026</textarea>
  <div class="char-count" id="charCount">0 characters</div>
</div>
<div class="controls">
  <label>Separator:</label>
  <select id="separator" onchange="convertSlug()"><option value="-">Hyphen (-)</option><option value="_">Underscore (_)</option></select>
  <label><input type="checkbox" id="lowercase" checked onchange="convertSlug()"> lowercase</label>
  <label>Max length: <input type="number" id="maxLen" value="0" min="0" onchange="convertSlug()"> (0=none)</label>
</div>
<div class="result-card">
  <span class="slug" id="slug">how-to-build-an-ai-agent-in-2026</span>
  <button class="copy-btn" onclick="copySlug()">📋 Copy</button>
</div>
</main>
<footer><p>my-automaton · Free Text to Slug Converter · <a href="/dev-tools-hub.html">All Tools</a></p></footer>
<script>
function setText(t){document.getElementById('inputText').value=t;convertSlug()}

function convertSlug(){
  const text=document.getElementById('inputText').value;
  document.getElementById('charCount').textContent=text.length+' characters';

  let slug=text
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'') // Remove accents
    .replace(/[^a-zA-Z0-9\s-_]/g,'')
    .trim()
    .replace(/[\s_]+/g,'-')
    .replace(/-+/g,'-');

  if(document.getElementById('lowercase').checked)slug=slug.toLowerCase();
  
  const sep=document.getElementById('separator').value;
  if(sep!=='-')slug=slug.replace(/-/g,sep);

  const maxLen=parseInt(document.getElementById('maxLen').value);
  if(maxLen>0&&slug.length>maxLen)slug=slug.substring(0,maxLen).replace(/[-_]$/,'');

  document.getElementById('slug').textContent=slug||'(empty)';
}

function copySlug(){const s=document.getElementById('slug').textContent;if(s&&s!=='(empty)')navigator.clipboard.writeText(s)}

convertSlug();
</script>
