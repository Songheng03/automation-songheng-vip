<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--orange:#d2991d;--purple:#a371f7}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;text-align:center}
header h1{font-size:1.5rem} header p{color:var(--muted);font-size:.85rem;margin-top:4px}
.container{max-width:860px;margin:0 auto;padding:24px 16px}
input[type=text]{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:14px 16px;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:.9rem}
input[type=text]:focus{outline:none;border-color:var(--accent)}
.samples{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap}
.sample-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.78rem}
.sample-btn:hover{border-color:var(--text);color:var(--text)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px}
.card .label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.card .value{font-family:'JetBrains Mono',monospace;font-size:.82rem;word-break:break-all}
.params-section{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-top:12px;overflow:hidden}
.params-section h3{padding:10px 16px;font-size:.82rem;border-bottom:1px solid var(--border);color:var(--accent)}
.param-table{width:100%;border-collapse:collapse}
.param-table td{padding:8px 12px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:.78rem}
.param-table td:first-child{color:var(--orange);width:180px}
.param-table td:last-child{word-break:break-all}
.empty{text-align:center;color:var(--muted);padding:20px;font-size:.85rem}
.sponsor{text-align:center;margin-top:32px;padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:8px}
.sponsor p{color:var(--muted);font-size:.85rem;margin-bottom:8px}
.sponsor a{color:var(--accent)}
.error{background:rgba(248,81,73,.1);border:1px solid var(--red);color:var(--red);padding:12px 16px;border-radius:8px;margin-top:12px;display:none;font-size:.85rem}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 24px;border-radius:20px;font-size:.85rem;z-index:100;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
.btn{padding:10px 20px;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--text);margin-right:8px;margin-top:12px}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
</style>

<body>
<header><h1>🔗 URL Parser</h1><p>Parse and decompose any URL into its components — protocol, host, path, query, hash</p></header>
<div class="container">
<div class="samples">
<button class="sample-btn" onclick="loadSample('complex')">Complex URL</button>
<button class="sample-btn" onclick="loadSample('api')">REST API</button>
<button class="sample-btn" onclick="loadSample('ftp')">FTP URL</button>
<button class="sample-btn" onclick="loadSample('data')">Data URI</button>
</div>
<input type="text" id="urlInput" placeholder="Paste a URL to parse... e.g. https://user:pass@example.com:8080/path?q=hello&page=1#section" oninput="parseURL()">
<div class="error" id="errorBox"></div>
<div class="actions"><button class="btn btn-primary" onclick="parseURL()">🔍 Parse</button><button class="btn" onclick="copyAll()">📋 Copy JSON</button></div>

<div class="grid" id="urlGrid"></div>
<div class="params-section"><h3 id="paramsTitle">Query Parameters (0)</h3><table class="param-table" id="paramsBody"><tr><td colspan="2" class="empty">No query parameters found</td></tr></table></div>

<div class="sponsor"><p>💡 <strong>Building APIs?</strong> Get AI-powered code reviews and security scans.</p><p><a href="/">Browse API Docs</a> · <a href="/api-playground.html">Try Playground</a></p></div>
<div class="toast" id="toast"></div>
</div>

<script>
const samples = {
  complex: 'https://john:secret@api.example.com:8443/v2/users?page=1&limit=50&sort=name&filter=active#results',
  api: 'https://jsonplaceholder.typicode.com/posts/1?utm_source=twitter&utm_medium=social',
  ftp: 'ftp://anonymous@ftp.example.com:21/pub/files/readme.txt',
  data: 'data:text/html;base64,PGgxPkhlbGxvPC9oMT4='
};

function loadSample(name) { document.getElementById('urlInput').value = samples[name]; parseURL(); }

function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }

function parseURL() {
  const raw = document.getElementById('urlInput').value.trim();
  const errBox = document.getElementById('errorBox');
  errBox.style.display = 'none';
  const grid = document.getElementById('urlGrid');
  
  if (!raw) { grid.innerHTML = '<div class="empty" style="grid-column:1/-1;padding:32px">Enter a URL to parse its components</div>'; document.getElementById('paramsBody').innerHTML='<tr><td colspan="2" class="empty">No query parameters found</td></tr>'; document.getElementById('paramsTitle').textContent='Query Parameters (0)'; return; }
  
  try {
    const u = new URL(raw);
    const components = [
      ['href', u.href],
      ['protocol', u.protocol],
      ['host', u.host],
      ['hostname', u.hostname],
      ['port', u.port || '(default)'],
      ['origin', u.origin],
      ['pathname', u.pathname],
      ['search', u.search || '(none)'],
      ['hash', u.hash || '(none)'],
      ['username', u.username || '(none)'],
      ['password', u.password ? '••••••' : '(none)'],
    ];
    
    grid.innerHTML = components.map(([label, val]) => `<div class="card"><div class="label">${label}</div><div class="value">${val}</div></div>`).join('');
    
    const params = new URLSearchParams(u.search);
    const entries = [...params.entries()];
    document.getElementById('paramsTitle').textContent = `Query Parameters (${entries.length})`;
    
    if (entries.length === 0) {
      document.getElementById('paramsBody').innerHTML = '<tr><td colspan="2" class="empty">No query parameters found</td></tr>';
    } else {
      document.getElementById('paramsBody').innerHTML = entries.map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('');
    }
  } catch(e) {
    errBox.textContent = '❌ Invalid URL: ' + e.message;
    errBox.style.display = '';
    grid.innerHTML = '';
  }
}

function copyAll() {
  const raw = document.getElementById('urlInput').value.trim();
  if (!raw) return;
  try {
    const u = new URL(raw);
    const obj = { href: u.href, protocol: u.protocol, host: u.host, hostname: u.hostname, port: u.port || null, origin: u.origin, pathname: u.pathname, search: u.search, hash: u.hash, username: u.username || null, query: Object.fromEntries(new URLSearchParams(u.search)) };
    navigator.clipboard.writeText(JSON.stringify(obj, null, 2)).then(() => showToast('✅ Copied!'));
  } catch(e) {}
}
</script>

</body>
