<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Markdown Editor - Live Preview</title>
<meta name="description" content="Free online Markdown editor with live preview. Write Markdown and see it rendered instantly. 100% client-side.">
<link rel="canonical" href="https://automation.songheng.vip/markdown-editor.html">
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;text-align:center}
header h1{font-size:1.5rem} header p{color:var(--muted);font-size:.85rem;margin-top:4px}
.split{display:flex;gap:12px;padding:12px;height:calc(100vh - 130px);flex-wrap:wrap}
.split textarea{flex:1;min-width:280px;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:16px;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:.82rem;resize:none}
.split textarea:focus{outline:none;border-color:var(--accent)}
.split .preview{flex:1;min-width:280px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;overflow-y:auto;line-height:1.7}
.split .preview h1,.preview h2,.preview h3{color:var(--accent);margin:12px 0 6px}
.split .preview code{background:var(--bg);padding:2px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:.82rem}
.split .preview pre{background:var(--bg);padding:14px;border-radius:8px;overflow-x:auto;border:1px solid var(--border);margin:8px 0}
.split .preview pre code{background:none;padding:0}
.split .preview blockquote{border-left:3px solid var(--accent);padding-left:12px;color:var(--muted);margin:8px 0}
.split .preview a{color:var(--accent)}
.split .preview ul,.preview ol{padding-left:20px}
.sponsor{text-align:center;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:.82rem}
.sponsor a{color:var(--accent)}
</style>
</head>
<body>
<header><h1>📝 Markdown Editor</h1><p>Write Markdown on the left, see the preview on the right.</p></header>
<div class="container">
<div class="split">
  <textarea id="mdInput" oninput="renderMD()" placeholder="# Hello World
Type Markdown here...

**Bold** and *italic* text.

- List item 1
- List item 2

> A blockquote

`inline code`"># 👋 Markdown Editor
Type **Markdown** on the left, see the *preview* here!

## Features
- **Bold** and *italic*
- Lists and blockquotes
- `inline code`

> Start typing or paste your Markdown...</textarea>
  <div class="preview" id="mdPreview"></div>
</div>
<div class="sponsor"><p>💡 Need <strong>AI to format your content</strong>? <a href="/api-playground.html">Try our API</a>.</p></div>
</div>
<script>
function renderMD(){
  let t=document.getElementById('mdInput').value;
  t=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t=t.replace(/^#{4}\s(.+)/gm,'<h4>$1</h4>');
  t=t.replace(/^#{3}\s(.+)/gm,'<h3>$1</h3>');
  t=t.replace(/^#{2}\s(.+)/gm,'<h2>$1</h2>');
  t=t.replace(/^#{1}\s(.+)/gm,'<h1>$1</h1>');
  t=t.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/\*(.+?)\*/g,'<em>$1</em>');
  t=t.replace(/`([^`]+)`/g,'<code>$1</code>');
  t=t.replace(/^>\s(.+)/gm,'<blockquote>$1</blockquote>');
  t=t.replace(/^-{3,}/gm,'<hr>');
  t=t.replace(/^\- (.+)/gm,'<ul><li>$1</li></ul>');
  t=t.replace(/<\/ul>\n<ul>/g,'');
  t=t.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');
  t='<div>'+t.replace(/\n\n/g,'</div><div>').replace(/\n/g,'<br>')+'</div>';
  document.getElementById('mdPreview').innerHTML=t;
}
renderMD();
</script>
<script src="/conversion-banner.js" defer></script>
</body>
</html>
